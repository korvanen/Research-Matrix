<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Framework — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=9fa06a28">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-keywords.js?v=7"></script>
  <script src="../utilities/utils-shared.js?v=0067db69"></script>
  <script src="../utilities/utils-synthesis.js?v=a2582885"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body {
      display: flex; flex-direction: column;
      background: var(--md-sys-color-background);
      font-family: var(--font-family);
      color: var(--md-sys-color-on-background);
    }

    /* ── Topbar ── */

    /* ── Body / nav rail area ── */
    .fw-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ── Dimension filter bar ── */
    .fw-dim-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding: 8px 14px; border-bottom: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low);
    }
    .fw-dim-btn {
      height: 30px; padding: 0 14px; border-radius: 15px;
      border: 1px solid var(--md-sys-color-outline-variant);
      background: transparent; font-size: 12px; font-weight: 500; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant); white-space: nowrap;
    }
    .fw-dim-btn.active {
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-secondary-container); border-color: transparent;
    }

    /* ── Main scroll area ── */
    .fw-main { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
    .fw-scroll { flex: 1; overflow-y: auto; padding: 20px 24px 60px; scrollbar-width: thin; }
    .fw-scroll::-webkit-scrollbar { width: 4px; }
    .fw-scroll::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 2px; }

    /* ── Table ── */
    .fw-section { margin-bottom: 32px; }
    .fw-dim-hdr {
      padding: 11px 16px; font-size: 15px; font-weight: 700; color: #fff; border-radius: 6px 6px 0 0;
    }
    .fw-table {
      width: 100%; border-collapse: collapse;
      border: 1px solid var(--md-sys-color-outline-variant); border-top: none;
      font-size: 13px;
    }
    .fw-table th {
      padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      background: var(--md-sys-color-surface-container);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
    }
    .fw-table td {
      padding: 8px 12px; vertical-align: top;
      border-bottom: 1px solid var(--md-sys-color-outline-variant); line-height: 1.5;
    }
    .fw-table tr:last-child td { border-bottom: none; }
    .fw-id   { font-size: 11px; font-weight: 700; color: var(--md-sys-color-on-surface-variant); width: 60px; white-space: nowrap; }
    .fw-cat  { width: 80px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .fw-cat.what { color: #1565c0; }
    .fw-cat.why  { color: #e65100; }
    .fw-cat.who  { color: #2e7d32; }
    .fw-cat.how  { color: #6a1b9a; }
    .fw-sep td { padding: 0; height: 3px; background: var(--md-sys-color-surface-container); }
    .fw-p-name td { font-size: 13px; font-weight: 600; padding: 7px 12px 5px; }
    .fw-no-note { font-style: italic; color: var(--md-sys-color-outline); font-size: 12px; }
    .fw-rule-edit {
      display: block; width: 100%; min-height: 32px; padding: 4px 6px;
      border-radius: 4px; border: 1px solid transparent;
      font-family: var(--font-family); font-size: 13px; line-height: 1.5;
      color: var(--md-sys-color-on-surface); cursor: text; outline: none;
      transition: border-color .12s;
    }
    .fw-rule-edit:focus { border-color: var(--md-sys-color-primary); background: color-mix(in srgb,var(--md-sys-color-primary) 3%,transparent); }
    .fw-rule-edit.no-note { color: var(--md-sys-color-outline); font-style: italic; }
    .fw-editable {
      cursor: text; outline: none; min-height: 36px; padding: 6px 8px;
      border-radius: 4px; border: 1px solid transparent;
      transition: border-color .12s; display: block;
      font-family: var(--font-family); font-size: 13px; line-height: 1.5;
    }
    .fw-editable:focus { border-color: var(--md-sys-color-primary); }
    .fw-editable.gap {
      color: var(--md-sys-color-on-surface-variant);
      background: rgba(255,193,7,.1); border-color: rgba(255,193,7,.4); font-style: italic;
    }
    .fw-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 320px; gap: 10px; text-align: center; padding: 48px 24px;
      color: var(--md-sys-color-on-surface-variant); font-size: 14px;
    }
    .fw-empty p { margin: 0; }

    /* ── Panel controls ── */
    .fw-panel-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); padding: 8px 0 4px; }
    .fw-panel-input {
      width: 100%; height: 32px; padding: 0 10px; margin: 3px 0 8px;
      border: 1px solid var(--md-sys-color-outline-variant); border-radius: 4px;
      background: transparent; font-family: var(--font-family); font-size: 12px; color: inherit; outline: none;
    }
    .fw-panel-input:focus { border-color: var(--md-sys-color-primary); }
    .fw-panel-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; height: 32px; border-radius: 16px; border: none; cursor: pointer;
      font-family: var(--font-family); font-size: 12px; font-weight: 500; margin-bottom: 6px;
    }
    .fw-panel-btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    .fw-panel-btn-tonal   { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
    .fw-panel-btn-ghost   { background: transparent; color: var(--md-sys-color-on-surface-variant); border: 1px solid var(--md-sys-color-outline-variant); }
    .fw-panel-status { font-size: 11px; color: var(--md-sys-color-on-surface-variant); padding: 2px 0 4px; }

    /* ── Schema editor ── */
    .fw-schema-item {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      padding: 5px 0; border-bottom: 1px solid var(--md-sys-color-outline-variant);
    }
    .fw-schema-item:last-of-type { border-bottom: none; }
    .fw-schema-label {
      flex: 1; font-size: 12px; font-weight: 500;
      color: var(--md-sys-color-on-surface);
    }
    .fw-schema-key {
      font-size: 10px; font-weight: 600; letter-spacing: .05em;
      color: var(--md-sys-color-on-surface-variant); min-width: 36px;
    }
    .fw-schema-btn {
      height: 22px; padding: 0 8px; border-radius: 11px; border: none;
      background: transparent; font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant);
    }
    .fw-schema-btn:hover { background: var(--md-sys-color-surface-container-high); }
    .fw-schema-btn.del:hover { color: var(--md-sys-color-error); }
    .fw-schema-add {
      width: 100%; height: 28px; margin-top: 6px; border-radius: 14px;
      border: 1px dashed var(--md-sys-color-outline-variant);
      background: transparent; font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--md-sys-color-primary);
    }
    .fw-schema-add:hover { background: color-mix(in srgb,var(--md-sys-color-primary) 6%,transparent); }
    .fw-schema-input {
      flex: 1; height: 26px; padding: 0 8px;
      border: 1px solid var(--md-sys-color-primary); border-radius: 4px;
      background: transparent; font-size: 12px; color: inherit; outline: none;
    }
    .fw-reg-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .fw-schema-desc {
      width: 100%; margin-top: 4px; padding: 4px 8px; border-radius: 6px;
      font-size: 11px; line-height: 1.5; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant);
      background: var(--md-sys-color-surface-container-low);
      border: 1px solid transparent;
      transition: border-color .12s;
    }
    .fw-schema-desc:hover { border-color: var(--md-sys-color-outline-variant); }
    .fw-schema-desc-input {
      width: 100%; margin-top: 4px; padding: 4px 8px; border-radius: 6px;
      font-size: 11px; line-height: 1.5; resize: vertical; min-height: 40px;
      color: inherit; background: transparent; outline: none;
      border: 1px solid var(--md-sys-color-primary);
      font-family: var(--font-family);
    }

    /* ── Diff modal ── */
    .fw-modal-bg { position: fixed; inset: 0; z-index: 8000; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; }
    .fw-modal-bg.open { display: flex; }
    .fw-modal { background: var(--md-sys-color-surface); border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.22); }
    .fw-modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .fw-modal-body { max-height: 300px; overflow-y: auto; font-size: 13px; line-height: 1.6; color: var(--md-sys-color-on-surface-variant); margin-bottom: 18px; }
    .fw-diff-added   { padding: 2px 0; color: #2e7d32; }
    .fw-diff-removed { padding: 2px 0; color: #b71c1c; }
    .fw-modal-foot { display: flex; gap: 8px; justify-content: flex-end; }
    .fw-btn { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 16px; border-radius: 17px; border: none; cursor: pointer; font-family: var(--font-family); font-size: 13px; font-weight: 500; }
    .fw-btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    .fw-btn-primary:disabled { opacity: .38; cursor: not-allowed; }
    .fw-btn-ghost   { background: transparent; color: var(--md-sys-color-on-surface-variant); border: 1px solid var(--md-sys-color-outline-variant); }
  </style>
</head>
<body>

  <div class="fw-body" id="fw-body"></div>

  <!-- Diff modal -->
  <div class="fw-modal-bg" id="fw-diff-modal">
    <div class="fw-modal">
      <div class="fw-modal-title">Preview changes</div>
      <div class="fw-modal-body" id="fw-diff-body"></div>
      <div class="fw-modal-foot">
        <button class="fw-btn fw-btn-ghost" id="fw-diff-cancel">Cancel</button>
        <button class="fw-btn fw-btn-primary" id="fw-diff-confirm">Write to sheet</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    var SY = window.SynthesisData;
    if (!SY) { document.body.innerHTML = '<p style="padding:24px">utils-synthesis.js not loaded.</p>'; return; }

    // ── State ────────────────────────────────────────────────────────────────
    var _activeDim   = 'all';
    var _pendingWrite = null;

    function _h(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Column titles (editable, persisted) ───────────────────────────────
    var _COL_DEFAULTS = ['Rule / Constraint', 'Move / Intervention', 'Metric / Proof'];
    var _COL_STORAGE  = 'df_fw_col_titles';
    function _getColTitles() {
      try { var s = JSON.parse(localStorage.getItem(_COL_STORAGE)); if (Array.isArray(s) && s.length >= 1) return s; } catch(e){}
      return _COL_DEFAULTS.slice();
    }
    function _setColTitles(titles) {
      try { localStorage.setItem(_COL_STORAGE, JSON.stringify(titles)); } catch(e){}
    }

    // ── Panel HTML ───────────────────────────────────────────────────────────
    var _globalHtml = window.GlobalPanel.html();

    var _schemaHtml = '<div id="fw-schema-body"></div>';

    var _syncHtml =
      '<div class="fw-panel-label">Apps Script URL</div>' +
      '<input class="fw-panel-input" id="fw-script-url" type="url" placeholder="https://script.google.com/...">' +
      '<button class="fw-panel-btn fw-panel-btn-ghost" id="fw-script-save-btn">Save URL</button>' +
      '<div class="fw-panel-label">Write to sheet</div>' +
      '<button class="fw-panel-btn fw-panel-btn-primary" id="fw-write-btn">Write to sheet</button>' +
      '<div class="fw-panel-label">Export</div>' +
      '<button class="fw-panel-btn fw-panel-btn-ghost" id="fw-csv-btn">Export CSV</button>' +
      '<button class="fw-panel-btn fw-panel-btn-ghost" id="fw-md-btn">Export Markdown</button>';

    // ── Nav rail ─────────────────────────────────────────────────────────────
    var _paneEl = document.getElementById('fw-body');
    var _nav = window.PPNavRail.create(_paneEl, {
      toolName: 'Framework',
      defaultOpen: true,
      panelSections: [
        { label: 'Global', html: _globalHtml },
        { label: 'Schema', html: _schemaHtml },
        { label: 'Sync',   html: _syncHtml },
      ],
    });

    // Build main area
    _nav.mainEl.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;';
    _nav.mainEl.innerHTML =
      '<div class="fw-dim-bar" id="fw-dim-bar"></div>' +
      '<div class="fw-scroll" id="fw-scroll"></div>';

    injectToolNav('framework.html');
    window.GlobalPanel.init({
      onSettingsChanged: function(s) {
      },
    });



    // ── Sync panel ────────────────────────────────────────────────────────────
    function _updateSyncStatus() {
      var lastSync = SY.getLastSync ? SY.getLastSync() : null;
      var scriptUrl = SY.getScriptUrl();
      var btn = document.getElementById('fw-write-btn');
      if (btn) {
        btn.disabled = !scriptUrl;
        btn.title = scriptUrl ? '' : 'Set Apps Script URL first';
      }
    }

    function _loadScriptUrl() {
      var url = SY.getScriptUrl();
      var inp = document.getElementById('fw-script-url');
      if (inp && url) inp.value = url;
      _updateSyncStatus();
    }

    document.getElementById('fw-script-save-btn').addEventListener('click', function(){
      var url = (document.getElementById('fw-script-url')||{}).value||'';
      SY.setScriptUrl(url.trim());
      var btn = document.getElementById('fw-script-save-btn');
      btn.textContent = 'Saved';
      setTimeout(function(){ btn.textContent = 'Save URL'; }, 1800);
    });

    document.getElementById('fw-write-btn').addEventListener('click', _writeToSheet);

    document.getElementById('fw-csv-btn').addEventListener('click', function(){
      _dl(SY.exportCSV(), 'framework-'+Date.now()+'.csv', 'text/csv');
    });
    document.getElementById('fw-md-btn').addEventListener('click', function(){
      _dl(SY.exportMarkdown(), 'framework-'+Date.now()+'.md', 'text/markdown');
    });

    function _dl(content, name, mime) {
      var b = new Blob([content],{type:mime}), u = URL.createObjectURL(b);
      var a = document.createElement('a'); a.href=u; a.download=name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(u); }, 2000);
    }

    // ── Write flow ────────────────────────────────────────────────────────────
    async function _writeToSheet() {
      var scriptUrl = SY.getScriptUrl();
      if (!scriptUrl) { alert('Paste your Apps Script URL in the Sync panel and save it.'); return; }
      var sheetUrl = typeof getSavedSheetUrl === 'function' ? getSavedSheetUrl() : '';
      if (!sheetUrl) { alert('No sheet URL saved. Load a sheet from the home page first.'); return; }

      var grid = SY.buildFrameworkGrid();
      _pendingWrite = { scriptUrl:scriptUrl, sheetUrl:sheetUrl, tabName:'FRAMEWORK', grid:grid };

      var bodyEl = document.getElementById('fw-diff-body');
      bodyEl.innerHTML = '<p style="color:var(--md-sys-color-on-surface-variant)">Reading current sheet…</p>';
      document.getElementById('fw-diff-modal').classList.add('open');

      var existing = null;
      try {
        var tabs = await SY.readFramework(scriptUrl, sheetUrl);
        var fwTab = tabs.find(function(t){ return t.name && t.name.indexOf('FRAMEWORK') !== -1; });
        if (fwTab) { existing = fwTab.rows; SY.setFrameworkTabs([{ name:fwTab.name, grid:fwTab.rows }]); }
      } catch(e) { console.warn('[framework] read error:', e.message); }

      var diff = SY.diffFramework(existing, grid);
      var html = '<p><strong>'+diff.unchanged+'</strong> rows unchanged</p>';
      if (diff.added.length) {
        html += '<p><strong>'+diff.added.length+'</strong> rows added:</p>';
        diff.added.slice(0,20).forEach(function(r){ html += '<div class="fw-diff-added">+ '+_h(r)+'</div>'; });
        if (diff.added.length > 20) html += '<div style="font-style:italic;color:var(--md-sys-color-on-surface-variant)">…and '+(diff.added.length-20)+' more</div>';
      }
      if (diff.removed.length) {
        html += '<p><strong>'+diff.removed.length+'</strong> rows removed:</p>';
        diff.removed.slice(0,20).forEach(function(r){ html += '<div class="fw-diff-removed">− '+_h(r)+'</div>'; });
      }
      if (!diff.added.length && !diff.removed.length)
        html += '<p style="color:var(--md-sys-color-on-surface-variant)">No structural changes — only editable fields may have been updated.</p>';
      bodyEl.innerHTML = html;
    }

    document.getElementById('fw-diff-cancel').addEventListener('click', function(){
      document.getElementById('fw-diff-modal').classList.remove('open');
      _pendingWrite = null;
    });

    document.getElementById('fw-diff-confirm').addEventListener('click', async function(){
      if (!_pendingWrite) return;
      var btn = document.getElementById('fw-diff-confirm');
      btn.disabled = true; btn.textContent = 'Writing…';
      try {
        await SY.writeFramework(_pendingWrite.scriptUrl, _pendingWrite.sheetUrl, _pendingWrite.tabName, _pendingWrite.grid);
        document.getElementById('fw-diff-modal').classList.remove('open');
        _updateSyncStatus();
        _pendingWrite = null;
      } catch(e) {
        alert('Write failed: '+e.message+'\n\nCheck Apps Script URL and deployment permissions.');
      }
      btn.disabled = false; btn.textContent = 'Write to sheet';
    });

    // ── Load from sheet on startup ────────────────────────────────────────────
    function _loadFromSheet() {
      var scriptUrl = SY.getScriptUrl();
      var sheetUrl  = typeof getSavedSheetUrl === 'function' ? getSavedSheetUrl() : '';
      if (!scriptUrl || !sheetUrl) return;
      SY.readFramework(scriptUrl, sheetUrl).then(function(tabs){
        var fw = tabs.find(function(t){ return t.name && t.name.indexOf('FRAMEWORK') !== -1; });
        if (!fw) return;
        SY.setFrameworkTabs([{ name:fw.name, grid:fw.rows }]);
        SY.loadFromFrameworkTab(fw.rows);
        render();
        _updateSyncStatus();
      }).catch(function(){});
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      var ps = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      var as = SY.getAssignments().filter(function(a){ return a.status === 'confirmed'; });

      var byDim = {}, dimOrder = [];
      ps.forEach(function(p){
        var d = p.dimensionHint || 'Undimensioned';
        if (!byDim[d]) { byDim[d] = []; dimOrder.push(d); }
        byDim[d].push(p);
      });

      // Dimension filter buttons
      var dimBar = document.getElementById('fw-dim-bar');
      var dimHtml = '<button class="fw-dim-btn'+(_activeDim==='all'?' active':'')+'" data-dim="all">All</button>';
      dimOrder.forEach(function(d){ dimHtml += '<button class="fw-dim-btn'+(_activeDim===d?' active':'')+'" data-dim="'+_h(d)+'">'+_h(d)+'</button>'; });
      dimBar.innerHTML = dimHtml;
      dimBar.querySelectorAll('.fw-dim-btn').forEach(function(b){
        b.addEventListener('click', function(){ _activeDim = b.dataset.dim; render(); });
      });

      var scroll = document.getElementById('fw-scroll');
      var filtered = ps.filter(function(p){ return _activeDim==='all' || (p.dimensionHint||'Undimensioned')===_activeDim; });

      if (!filtered.length) {
        scroll.innerHTML =
          '<div class="fw-empty">' +
          '<p style="font-size:16px;font-weight:500;color:var(--md-sys-color-on-surface)">No named principles yet</p>' +
          '<p>Name clusters in the Clusters tool to start building the framework.</p>' +
          '</div>';
        return;
      }

      var byDim2 = {}, dimOrder2 = [];
      filtered.forEach(function(p){
        var d = p.dimensionHint || 'Undimensioned';
        if (!byDim2[d]) { byDim2[d] = []; dimOrder2.push(d); }
        byDim2[d].push(p);
      });

      var byP = {};
      as.forEach(function(a){ if (!byP[a.principleId]) byP[a.principleId]=[]; byP[a.principleId].push(a); });

      var _regs     = SY.getRegisters();
      var REGS      = _regs.map(function(r){ return r.key; });
      var REG_LABEL = {};
      _regs.forEach(function(r){ REG_LABEL[r.key] = r.label; });
      var html = '';

      dimOrder2.forEach(function(dim){
        var dps   = byDim2[dim];
        var color = dps[0] ? dps[0].color : '#555';
        var _ct   = _getColTitles();
        var _numCols = _ct.length;
        var _totalCols = _numCols + 2; // ID + Category + data columns
        var colWidth = Math.floor(75 / _numCols); // distribute ~75% among data columns

        html += '<div class="fw-section">';
        html += '<div class="fw-dim-hdr" style="background:'+_h(color)+'">The '+_h(dim)+' Dimension</div>';
        html += '<table class="fw-table"><colgroup><col style="width:60px"><col style="width:80px">';
        for (var ci = 0; ci < _numCols; ci++) html += '<col style="width:'+colWidth+'%">';
        html += '</colgroup>';
        html += '<thead><tr><th>ID</th><th>Category</th>';
        for (var ci = 0; ci < _numCols; ci++) html += '<th>'+_h(_ct[ci])+'</th>';
        html += '</tr></thead><tbody>';

        dps.forEach(function(p){
          var pId  = p.sheetId || ('P-'+String(p.seq).padStart(2,'0'));
          var pAs  = byP[p.id] || [];
          var byReg = {};
          REGS.forEach(function(k){ byReg[k] = []; });
          pAs.forEach(function(a){ if (byReg[a.register]) byReg[a.register].push(a); });

          html += '<tr class="fw-sep"><td colspan="'+_totalCols+'"></td></tr>';
          html += '<tr class="fw-p-name"><td class="fw-id">'+_h(pId)+'</td><td colspan="'+(_totalCols-1)+'" style="font-weight:600">'+_h(p.name)+(p.description?' <span style="font-weight:400;font-size:12px;color:var(--md-sys-color-on-surface-variant)"> — '+_h(p.description)+'</span>':'')+'</td></tr>';

          // Get stored text per column per register
          var ctbr = p.colTextByReg || {};
          // Backward compat: migrate moveByReg/metricByReg
          var mbr = p.moveByReg || {};
          var tbr = p.metricByReg || {};

          REGS.forEach(function(reg){
            var regAs = byReg[reg];

            // Group entries by column
            var byCols = [];
            for (var i = 0; i < _numCols; i++) byCols.push([]);
            regAs.forEach(function(a){
              var col = (a.column != null && a.column >= 0 && a.column < _numCols) ? a.column : 0;
              byCols[col].push(a);
            });
            var maxRows = 1;
            for (var i = 0; i < _numCols; i++) if (byCols[i].length > maxRows) maxRows = byCols[i].length;

            for (var ri = 0; ri < maxRows; ri++) {
              html += '<tr>';
              if (ri === 0) {
                html += '<td class="fw-id" rowspan="'+maxRows+'"></td>';
                html += '<td class="fw-cat '+reg+'" rowspan="'+maxRows+'">'+REG_LABEL[reg]+'</td>';
              }
              for (var ci = 0; ci < _numCols; ci++) {
                var colAs = byCols[ci];
                if (ri < colAs.length) {
                  var a = colAs[ri];
                  var ruleText = (SY.resolveNoteKey(a.noteKey)||{text:''}).text;
                  var parsed   = typeof parseCitation === 'function' ? parseCitation(ruleText) : { body:ruleText, citation:null };
                  var pillHtml = parsed.citation
                    ? ' <span class="pp-cite-pill" style="background:'+_h(p.color||'#555')+';color:#fff">'+_h(parsed.citation)+'</span>'
                    : '';
                  html += '<td><div class="fw-rule-edit has-ref" contenteditable="false" data-pid="'+_h(p.id)+'" data-reg="'+reg+'" data-col="'+ci+'">'+_h(parsed.body)+pillHtml+'</div></td>';
                } else if (ri === 0) {
                  // Editable cell — read from colTextByReg, falling back to legacy fields
                  var prefill = (ctbr[ci] && ctbr[ci][reg]) ? ctbr[ci][reg] : (ci===1 ? mbr[reg] : ci===2 ? tbr[reg] : '') || '';
                  var rowspan = maxRows - colAs.length;
                  html += rowspan > 1 ? '<td rowspan="'+rowspan+'">' : '<td>';
                  html += '<div class="fw-editable'+(prefill?'':' gap')+'" contenteditable="true" spellcheck="false" data-pid="'+_h(p.id)+'" data-reg="'+reg+'" data-col="'+ci+'">'+(prefill||'Click to add...')+'</div></td>';
                }
              }
              html += '</tr>';
            }
          });
        });

        html += '</tbody></table></div>';
      });

      scroll.innerHTML = html;
      _bindEditables(scroll);
    }

    function _bindEditables(container) {
      container.querySelectorAll('[contenteditable="true"]').forEach(function(el){
        el.addEventListener('focus', function(){
          if (el.textContent.trim() === 'Click to add...') el.textContent = '';
        });
        el.addEventListener('blur', function(){
          var v     = el.textContent.trim();
          var pid   = el.dataset.pid;
          var reg   = el.dataset.reg;
          var col   = parseInt(el.dataset.col);
          if (!v) { el.textContent = 'Click to add...'; el.classList.add('gap'); }
          else el.classList.remove('gap');
          var val = (v === 'Click to add...') ? '' : v;
          var p = SY.getPrinciples().find(function(x){ return x.id === pid; }); if (!p) return;
          // Save to colTextByReg generic store
          var ctbr = Object.assign({}, p.colTextByReg || {});
          if (!ctbr[col]) ctbr[col] = {};
          ctbr[col][reg] = val;
          var update = { colTextByReg: ctbr };
          // Keep legacy fields in sync for backward compat
          if (col === 1) { var mbr = Object.assign({}, p.moveByReg || {}); mbr[reg] = val; update.moveByReg = mbr; }
          if (col === 2) { var tbr = Object.assign({}, p.metricByReg || {}); tbr[reg] = val; update.metricByReg = tbr; }
          SY.updatePrinciple(pid, update);
        });
        el.addEventListener('keydown', function(e){
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
        });
      });
    }

    // ── Events ────────────────────────────────────────────────────────────────
    window.addEventListener('sheet-loaded', function(){
      render();
      renderSchema();
      _loadFromSheet();
      var ps = SY.getPrinciples().filter(function(p){ return p.named&&!p.archived; });
      if (_nav && _nav.subtitleEl) _nav.subtitleEl.textContent = ps.length + ' principles';
    });

    // ── Schema editor ────────────────────────────────────────────────────────
    var REG_COLORS = { what:'#1565c0', why:'#e65100', who:'#2e7d32', how:'#6a1b9a' };

    function renderSchema() {
      var el = document.getElementById('fw-schema-body');
      if (!el) return;
      var regs = SY.getRegisters();
      var dims = SY.getDimensions();

      var html = '<div class="fw-panel-label">Questions (registers)</div>';
      regs.forEach(function(r){
        var col = REG_COLORS[r.key] || 'var(--md-sys-color-primary)';
        var desc = SY.getSchemaDescription('registers', r.key);
        html += '<div class="fw-schema-item" data-rkey="'+_h(r.key)+'">';
        html += '<span class="fw-reg-color" style="background:'+col+'"></span>';
        html += '<span class="fw-schema-key">'+_h(r.key)+'</span>';
        html += '<span class="fw-schema-label">'+_h(r.label)+'</span>';
        html += '<button class="fw-schema-btn" data-action="edit-reg" data-key="'+_h(r.key)+'">Edit</button>';
        html += '<button class="fw-schema-btn del" data-action="del-reg" data-key="'+_h(r.key)+'">Delete</button>';
        html += '<div class="fw-schema-desc" data-action="edit-desc" data-desc-type="registers" data-desc-key="'+_h(r.key)+'">'+(desc ? _h(desc) : '<span style="opacity:.4">+ Add description…</span>')+'</div>';
        html += '</div>';
      });
      html += '<button class="fw-schema-add" data-action="add-reg">+ Add question</button>';

      html += '<div class="fw-panel-label" style="margin-top:10px">Dimensions</div>';
      dims.forEach(function(d){
        var desc = SY.getSchemaDescription('dimensions', d);
        html += '<div class="fw-schema-item" data-dim="'+_h(d)+'">';
        html += '<span class="fw-schema-label">'+_h(d)+'</span>';
        html += '<button class="fw-schema-btn" data-action="edit-dim" data-dim="'+_h(d)+'">Edit</button>';
        html += '<button class="fw-schema-btn del" data-action="del-dim" data-dim="'+_h(d)+'">Delete</button>';
        html += '<div class="fw-schema-desc" data-action="edit-desc" data-desc-type="dimensions" data-desc-key="'+_h(d)+'">'+(desc ? _h(desc) : '<span style="opacity:.4">+ Add description…</span>')+'</div>';
        html += '</div>';
      });
      html += '<button class="fw-schema-add" data-action="add-dim">+ Add dimension</button>';

      html += '<div class="fw-panel-label" style="margin-top:10px">Columns</div>';
      var _ct = _getColTitles();
      _ct.forEach(function(title, ci){
        var desc = SY.getSchemaDescription('columns', String(ci));
        html += '<div class="fw-schema-item" data-col="'+ci+'">';
        html += '<span class="fw-schema-label">'+_h(title)+'</span>';
        html += '<button class="fw-schema-btn" data-action="edit-col" data-col="'+ci+'">Edit</button>';
        if (_ct.length > 1) html += '<button class="fw-schema-btn del" data-action="del-col" data-col="'+ci+'">Delete</button>';
        html += '<div class="fw-schema-desc" data-action="edit-desc" data-desc-type="columns" data-desc-key="'+ci+'">'+(desc ? _h(desc) : '<span style="opacity:.4">+ Add description…</span>')+'</div>';
        html += '</div>';
      });
      html += '<button class="fw-schema-add" data-action="add-col">+ Add column</button>';

      el.innerHTML = html;

      // Wire events
      el.querySelectorAll('[data-action=edit-reg]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var key = btn.dataset.key;
          var reg = SY.getRegisters().find(function(r){ return r.key===key; });
          if (!reg) return;
          var item = btn.closest('.fw-schema-item');
          _inlineEdit(item, reg.label, function(newLabel){
            var newKey = newLabel.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12) || key;
            var affectedCount = SY.getAssignments().filter(function(a){ return a.register===key; }).length;
            var msg = newKey !== key
              ? affectedCount + ' assigned entr'+(affectedCount===1?'y':'ies')+' will be re-registered as "'+newKey+'". Continue?'
              : null;
            if (!msg || confirm(msg)) {
              SY.updateRegister(key, newKey, newLabel);
              render(); renderSchema();
            } else { renderSchema(); }
          });
        });
      });

      el.querySelectorAll('[data-action=del-reg]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var key = btn.dataset.key;
          var count = SY.getAssignments().filter(function(a){ return a.register===key; }).length;
          if (confirm('Delete register "'+key+'"? '+count+' assigned entr'+(count===1?'y':'ies')+' will become unassigned.')) {
            SY.deleteRegister(key);
            render(); renderSchema();
          }
        });
      });

      el.querySelectorAll('[data-action=add-reg]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var label = prompt('New question label (e.g. WHEN?):');
          if (!label || !label.trim()) return;
          var key = label.trim().toLowerCase().replace(/[^a-z0-9]/g,'').replace(/\?+$/,'').slice(0,12);
          if (!key) return;
          SY.addRegister(key, label.trim());
          render(); renderSchema();
        });
      });

      el.querySelectorAll('[data-action=edit-dim]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var dim = btn.dataset.dim;
          var item = btn.closest('.fw-schema-item');
          _inlineEdit(item, dim, function(newName){
            if (!newName.trim()) { renderSchema(); return; }
            SY.updateDimension(dim, newName.trim());
            render(); renderSchema();
          });
        });
      });

      el.querySelectorAll('[data-action=del-dim]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var dim = btn.dataset.dim;
          var affected = SY.getPrinciples().filter(function(p){ return p.dimensionHint===dim; }).length;
          var msg = 'Delete dimension "'+dim+'"?';
          if (affected) msg += ' '+affected+' principle'+(affected===1?'':'s')+" will lose their dimension and their entries will be unassigned.";
          if (confirm(msg)) { SY.deleteDimension(dim); render(); renderSchema(); }
        });
      });

      el.querySelectorAll('[data-action=add-dim]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var name = prompt('New dimension name (e.g. Ecological):');
          if (!name || !name.trim()) return;
          SY.addDimension(name.trim());
          renderSchema();
        });
      });

      // Column title editing
      el.querySelectorAll('[data-action=edit-col]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var ci   = parseInt(btn.dataset.col);
          var ct   = _getColTitles();
          var item = btn.closest('.fw-schema-item');
          _inlineEdit(item, ct[ci], function(newTitle){
            if (newTitle && newTitle !== ct[ci]) {
              ct[ci] = newTitle;
              _setColTitles(ct);
              render();
            }
            renderSchema();
          });
        });
      });

      el.querySelectorAll('[data-action=del-col]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var ci = parseInt(btn.dataset.col);
          var ct = _getColTitles();
          if (ct.length <= 1) return;
          // Count entries assigned to this column
          var affected = SY.getAssignments().filter(function(a){ return a.column === ci; }).length;
          var msg = 'Delete column "' + ct[ci] + '"?';
          if (affected) msg += ' ' + affected + ' assigned entr' + (affected===1?'y':'ies') + ' will move to column 0.';
          if (!confirm(msg)) return;
          ct.splice(ci, 1);
          _setColTitles(ct);
          // Reassign entries: shift columns above deleted index down
          var as = SY.getAssignments();
          as.forEach(function(a){
            if (a.column === ci) a.column = 0;
            else if (a.column > ci) a.column = a.column - 1;
          });
          // Shift colTextByReg indices
          SY.getPrinciples().forEach(function(p){
            var ctbr = p.colTextByReg; if (!ctbr) return;
            var newCtbr = {};
            Object.keys(ctbr).forEach(function(k){
              var ki = parseInt(k);
              if (ki === ci) return; // drop deleted column
              var newIdx = ki > ci ? ki - 1 : ki;
              newCtbr[newIdx] = ctbr[k];
            });
            SY.updatePrinciple(p.id, { colTextByReg: newCtbr });
          });
          // Shift schema descriptions
          var sd = SY.getSchemaDescriptions();
          if (sd.columns) {
            var newCols = {};
            Object.keys(sd.columns).forEach(function(k){
              var ki = parseInt(k);
              if (ki === ci) return;
              newCols[ki > ci ? ki - 1 : ki] = sd.columns[k];
            });
            sd.columns = newCols;
            try { localStorage.setItem('sy2_schema_desc', JSON.stringify(sd)); } catch(e){}
          }
          render(); renderSchema();
        });
      });

      el.querySelectorAll('[data-action=add-col]').forEach(function(btn){
        btn.addEventListener('click', function(){
          var name = prompt('New column title:');
          if (!name || !name.trim()) return;
          var ct = _getColTitles();
          ct.push(name.trim());
          _setColTitles(ct);
          render(); renderSchema();
        });
      });

      // Description editing (inline textarea)
      el.querySelectorAll('[data-action=edit-desc]').forEach(function(descEl){
        descEl.addEventListener('click', function(){
          var type = descEl.dataset.descType;
          var key  = descEl.dataset.descKey;
          var current = SY.getSchemaDescription(type, key);
          var ta = document.createElement('textarea');
          ta.className = 'fw-schema-desc-input';
          ta.value = current;
          ta.placeholder = 'Describe this item…';
          descEl.style.display = 'none';
          descEl.parentNode.insertBefore(ta, descEl.nextSibling);
          ta.focus();
          function finish() {
            var val = ta.value.trim();
            SY.setSchemaDescription(type, key, val);
            ta.remove();
            renderSchema();
          }
          ta.addEventListener('blur', finish);
          ta.addEventListener('keydown', function(e){
            if (e.key==='Escape') { ta.remove(); renderSchema(); }
          });
        });
      });
    }

    function _inlineEdit(itemEl, currentVal, onConfirm) {
      var labelEl = itemEl.querySelector('.fw-schema-label');
      if (!labelEl) return;
      var inp = document.createElement('input');
      inp.className = 'fw-schema-input';
      inp.value = currentVal;
      itemEl.insertBefore(inp, labelEl);
      labelEl.style.display = 'none';
      inp.focus(); inp.select();
      function finish(){ onConfirm(inp.value.trim()); }
      inp.addEventListener('keydown', function(e){
        if (e.key==='Enter') { e.preventDefault(); finish(); }
        if (e.key==='Escape') { renderSchema(); }
      });
      inp.addEventListener('blur', finish);
    }
    document.addEventListener('DOMContentLoaded', function(){
      _loadScriptUrl();
      render();
      renderSchema();
      var ps = SY.getPrinciples().filter(function(p){ return p.named&&!p.archived; });
      if (_nav && _nav.subtitleEl) _nav.subtitleEl.textContent = ps.length + ' principles';
    });

  })();
  </script>
</body>
</html>
