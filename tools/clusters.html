<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Clusters — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=9fa06a28">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-keywords.js?v=7"></script>
  <script src="../utilities/utils-shared.js?v=0067db69"></script>
  <script src="../utilities/utils-synthesis.js?v=a2582885"></script>
  <script src="../utilities/utils-panel.js?v=7"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body {
      display: flex; flex-direction: column;
      background: var(--md-sys-color-background);
      font-family: var(--font-family);
      color: var(--md-sys-color-on-background);
    }

    /* ── Topbar ── */
    .cl-topbar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      height: 48px; padding: 0 12px;
      background: var(--md-sys-color-surface-container);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
    }
    .cl-topbar-title { font-size: 16px; font-weight: 500; flex: 1; }
    .cl-emb-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--md-sys-color-outline); transition: background .3s; flex-shrink: 0;
    }
    .cl-emb-dot.ready   { background: #2e7d32; }
    .cl-emb-dot.loading { background: var(--md-sys-color-primary); animation: cl-pulse 1.2s infinite; }
    @keyframes cl-pulse { 0%,100%{opacity:.3;} 50%{opacity:1;} }
    .cl-emb-text { font-size: 11px; color: var(--md-sys-color-on-surface-variant); }

    /* ── Sub-tabs ── */
    .cl-subtabs {
      flex-shrink: 0; display: flex; align-items: stretch;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-low); padding: 0 4px;
    }
    .cl-subtab {
      display: flex; align-items: center; gap: 6px;
      height: 40px; padding: 0 16px; border: none; background: transparent;
      font-family: var(--font-family); font-size: 13px; font-weight: 500;
      color: var(--md-sys-color-on-surface-variant); cursor: pointer;
      position: relative; overflow: hidden; white-space: nowrap;
    }
    .cl-subtab::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; }
    .cl-subtab.active { color: var(--md-sys-color-primary); }
    .cl-subtab.active::after { background: var(--md-sys-color-primary); }
    .cl-subtab-n {
      height: 16px; min-width: 16px; padding: 0 4px; border-radius: 8px;
      background: var(--md-sys-color-surface-container-highest);
      color: var(--md-sys-color-on-surface-variant);
      font-size: 10px; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .cl-subtab.active .cl-subtab-n {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    /* ── Body ── */
    .cl-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    /* ── Views ── */
    .cl-view { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .cl-view[hidden] { display: none; }

    /* ── Visual view: just holds the canvas injected by utils-clusters.js ── */
    #cl-visual-pane { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ════ PRINCIPLES VIEW ════ */
    .cl-pr-layout { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .cl-named-col {
      flex: 0 0 50%; display: flex; flex-direction: column; overflow: hidden;
      border-right: 1px solid var(--md-sys-color-outline-variant);
    }
    .cl-pool-col { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; }
    .cl-col-hdr {
      flex-shrink: 0; padding: 10px 14px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      display: flex; align-items: center; gap: 8px;
      background: var(--md-sys-color-surface-container-low); position: sticky; top: 0; z-index: 2;
    }
    .cl-col-hdr-btn {
      margin-left: auto; height: 26px; padding: 0 10px; border-radius: 13px;
      border: 1px solid var(--md-sys-color-outline-variant); background: transparent;
      font-family: var(--font-family); font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant);
    }
    .cl-col-hdr-btn:hover { background: var(--md-sys-color-surface-container-high); }
    .cl-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; }
    .cl-scroll::-webkit-scrollbar { width: 4px; }
    .cl-scroll::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 2px; }

    /* Principle card */
    .cl-pr-card { margin: 10px 12px 4px; border-radius: 8px; border: 1px solid var(--md-sys-color-outline-variant); overflow: hidden; }
    .cl-pr-head {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; user-select: none;
    }
    .cl-pr-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cl-pr-name { flex: 1; font-size: 14px; font-weight: 500; }
    .cl-pr-meta { font-size: 11px; color: var(--md-sys-color-on-surface-variant); }
    .cl-chevron { font-size: 10px; color: var(--md-sys-color-on-surface-variant); transition: transform .15s; }
    .cl-chevron.open { transform: rotate(90deg); }
    .cl-pr-body { display: none; border-top: 1px solid var(--md-sys-color-outline-variant); }
    .cl-pr-body.open { display: block; }
    .cl-pr-note { display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
    .cl-pr-note:last-of-type { border-bottom: none; }
    .cl-pr-note.changed { background: rgba(255,193,7,.08); }
    .cl-pr-note-content { flex: 1; min-width: 0; }
    .cl-pr-note-text { font-size: 12px; line-height: 1.45; }
    .cl-pr-note-src { font-size: 10px; color: var(--md-sys-color-on-surface-variant); margin-top: 2px; }
    .cl-pr-note-changed { font-size: 10px; color: #f57f17; margin-top: 2px; }
    .cl-reg-tiny {
      height: 20px; padding: 0 6px; border-radius: 10px; border: none;
      font-size: 9px; font-weight: 700; letter-spacing: .04em; cursor: pointer; opacity: .4;
    }
    .cl-reg-tiny.active { opacity: 1; }
    .cl-reg-tiny.what { background: rgba(21,101,192,.15); color: #1565c0; }
    .cl-reg-tiny.why  { background: rgba(230,81,0,.15);   color: #e65100; }
    .cl-reg-tiny.who  { background: rgba(46,125,50,.15);  color: #2e7d32; }
    .cl-reg-tiny.how  { background: rgba(106,27,154,.15); color: #6a1b9a; }
    .cl-pr-foot {
      display: flex; gap: 6px; padding: 8px 12px;
      border-top: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-lowest); flex-wrap: wrap;
    }
    .cl-pending-banner {
      background: rgba(21,101,192,.07); border-bottom: 1px solid rgba(21,101,192,.15);
      padding: 7px 12px; font-size: 11px; color: #1565c0;
      display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }

    /* Pool clusters */
    .cl-pool-card { margin: 10px 12px 4px; border-radius: 8px; border: 1px dashed var(--md-sys-color-outline-variant); overflow: hidden; }
    .cl-pool-head { display: flex; align-items: center; gap: 8px; padding: 9px 12px; cursor: pointer; }
    .cl-pool-label { flex: 1; font-size: 13px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cl-pool-body { display: none; }
    .cl-pool-body.open { display: block; }
    .cl-pool-note { display: flex; align-items: flex-start; gap: 7px; padding: 7px 12px; border-top: 1px solid var(--md-sys-color-outline-variant); }
    .cl-pool-note-inner { flex: 1; min-width: 0; }
    .cl-pool-note-text { font-size: 12px; line-height: 1.45; }
    .cl-pool-note-src { font-size: 10px; color: var(--md-sys-color-on-surface-variant); margin-top: 2px; }
    .cl-assign-btn {
      height: 22px; padding: 0 8px; border-radius: 11px; border: none;
      background: var(--md-sys-color-surface-container-highest); color: var(--md-sys-color-on-surface-variant);
      font-size: 10px; font-weight: 500; cursor: pointer; flex-shrink: 0;
    }
    .cl-assign-btn:hover { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
    .cl-pool-foot {
      display: flex; gap: 6px; padding: 8px 12px;
      border-top: 1px solid var(--md-sys-color-outline-variant);
      background: var(--md-sys-color-surface-container-lowest); flex-wrap: wrap;
    }
    .cl-singleton-section { padding: 10px 14px; }
    .cl-singleton-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 7px; }
    .cl-singleton-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .cl-singleton {
      display: flex; align-items: center; gap: 4px; height: 26px; max-width: 200px; padding: 0 10px;
      border-radius: 13px; background: var(--md-sys-color-surface-container-highest);
      font-size: 11px; color: var(--md-sys-color-on-surface-variant); cursor: pointer; overflow: hidden;
    }
    .cl-singleton span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cl-singleton:hover { background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); }
    .cl-empty { flex: none; padding: 24px 16px; font-size: 13px; color: var(--md-sys-color-on-surface-variant); text-align: center; }

    /* Buttons */
    .cl-btn {
      display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 12px;
      border-radius: 15px; border: none; cursor: pointer;
      font-family: var(--font-family); font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .cl-btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    .cl-btn-tonal   { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); }
    .cl-btn-ghost   { background: transparent; color: var(--md-sys-color-on-surface-variant); border: 1px solid var(--md-sys-color-outline-variant); }
    .cl-btn-ghost:hover { background: color-mix(in srgb,var(--md-sys-color-on-surface) 6%,transparent); }
    .cl-btn-danger  { background: transparent; color: var(--md-sys-color-error); border: 1px solid color-mix(in srgb,var(--md-sys-color-error) 40%,transparent); }

    /* Badges */
    .cl-badge { display: inline-flex; align-items: center; height: 18px; padding: 0 6px; border-radius: 9px; font-size: 10px; font-weight: 600; }
    .cl-badge-auto     { background: rgba(21,101,192,.12); color: #1565c0; }
    .cl-badge-conf     { background: rgba(46,125,50,.1);   color: #2e7d32; }
    .cl-badge-changed  { background: rgba(255,193,7,.18);  color: #f57f17; }
    .cl-sugg { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; background: color-mix(in srgb,var(--md-sys-color-primary) 10%,transparent); color: var(--md-sys-color-primary); white-space: nowrap; }

    /* Cite pill */
    .cl-cite-pill { display: inline-flex; align-items: center; height: 16px; padding: 0 6px; border-radius: 8px; font-size: 10px; font-weight: 600; color: #fff; white-space: nowrap; vertical-align: middle; }
    .cl-sim-badge {
      display: inline-flex; align-items: center; height: 16px; padding: 0 6px;
      border-radius: 8px; font-size: 9px; font-weight: 700; white-space: nowrap;
      background: var(--md-sys-color-surface-container-highest);
      font-variant-numeric: tabular-nums;
    }

    /* Assign popover */
    .cl-pop {
      position: fixed; z-index: 9999; min-width: 180px;
      background: var(--md-sys-color-surface-container); border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.18); overflow: hidden; display: none;
    }
    .cl-pop.open { display: block; }
    .cl-pop-label { padding: 8px 12px 4px; font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); }
    .cl-pop-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; font-size: 13px; transition: background .1s; }
    .cl-pop-item:hover { background: color-mix(in srgb,var(--md-sys-color-on-surface) 6%,transparent); }
    .cl-pop-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cl-pop-new { color: var(--md-sys-color-primary); font-weight: 500; }

    /* Principle modal */
    .cl-modal-bg { position: fixed; inset: 0; z-index: 8100; background: rgba(0,0,0,.4); display: none; align-items: center; justify-content: center; }
    .cl-modal-bg.open { display: flex; }
    .cl-modal { background: var(--md-sys-color-surface); border-radius: 12px; padding: 24px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,.22); }
    .cl-modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .cl-modal-foot { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
    .cl-field { margin-bottom: 14px; }
    .cl-fl { font-size: 11px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 5px; display: block; }
    .cl-input { width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--md-sys-color-outline); border-radius: 4px; background: transparent; font-family: var(--font-family); font-size: 14px; color: inherit; outline: none; }
    .cl-input:focus { border: 2px solid var(--md-sys-color-primary); padding: 0 11px; }
    .cl-dim-chips { display: flex; gap: 5px; flex-wrap: wrap; }
    .cl-dim-chip { height: 28px; padding: 0 12px; border-radius: 14px; border: 1px solid var(--md-sys-color-outline-variant); background: transparent; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--md-sys-color-on-surface-variant); }
    .cl-dim-chip.active { background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container); border-color: transparent; }

    /* Panel controls */
    .cl-panel-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); padding: 8px 0 4px; }
  </style>
</head>
<body>

  <div class="cl-body" id="cl-body">
    <!-- PPNavRail injected here -->
  </div>

  <!-- Assign popover -->
  <div class="cl-pop" id="cl-pop">
    <div class="cl-pop-label">Assign to principle</div>
    <div id="cl-pop-list"></div>
    <div class="cl-pop-item cl-pop-new" id="cl-pop-new">+ New principle</div>
  </div>

  <!-- Principle modal -->
  <div class="cl-modal-bg" id="cl-modal-bg">
    <div class="cl-modal">
      <div class="cl-modal-title" id="cl-modal-title">New principle</div>
      <div class="cl-field">
        <label class="cl-fl">Name</label>
        <input class="cl-input" id="cl-modal-name" placeholder="e.g. Threshold Gradient" autocomplete="off">
      </div>
      <div class="cl-field">
        <label class="cl-fl">Dimension</label>
        <div class="cl-dim-chips" id="cl-modal-dims">
          <button class="cl-dim-chip" data-dim="Physical">Physical</button>
          <button class="cl-dim-chip" data-dim="Social">Social</button>
          <button class="cl-dim-chip" data-dim="Organisational">Organisational</button>
          <button class="cl-dim-chip" data-dim="Temporal">Temporal</button>
          <button class="cl-dim-chip" data-dim="Economic">Economic</button>
        </div>
      </div>
      <div class="cl-field">
        <label class="cl-fl">Description <span style="font-weight:400;opacity:.5">(influences clustering)</span></label>
        <textarea class="cl-input" id="cl-modal-desc" placeholder="Describe what this principle captures…" style="min-height:50px;resize:vertical;line-height:1.5;padding:8px 10px;font-family:var(--font-family)"></textarea>
      </div>
      <div class="cl-modal-foot">
        <button class="cl-btn cl-btn-ghost" id="cl-modal-cancel">Cancel</button>
        <button class="cl-btn cl-btn-primary" id="cl-modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <script>
  (function(){
    var SY = window.SynthesisData;
    if (!SY) { document.body.innerHTML = '<p style="padding:24px">utils-synthesis.js not loaded.</p>'; return; }

    // ── State ────────────────────────────────────────────────────────────────
    var _emb       = new Map();   // noteKey → Float32Array
    var _embReady  = false;
    var _embedding = false;
    var _view      = 'principles';
    var _openP     = new Set();
    var _openCl    = new Set();
    var _clusters  = null;
    var _thresh    = SY.getSettings().threshold;
    var _assignCtx = null;
    var _pModalCb  = null;
    var _clusterTool = null;   // handle returned by initClustersTool

    function _h(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Panel HTML ───────────────────────────────────────────────────────────
    var _tabsSectionHtml =
      '<div class="pp-panel-tabs">' +
        '<button class="pp-panel-tab active" data-clview="principles">' +
          'Principles <span class="pp-panel-tab-n" id="cl-n-named">0</span>' +
        '</button>' +
        '<button class="pp-panel-tab" data-clview="visual">' +
          'Visual <span class="pp-panel-tab-n" id="cl-n-pool">0</span>' +
        '</button>' +
      '</div>' +
      '<div class="pp-panel-status-row">' +
        '<div class="pp-panel-dot loading" id="cl-dot"></div>' +
        '<span id="cl-emb-text">Loading…</span>' +
      '</div>';

    var _globalHtml = window.GlobalPanel.html();

    var _principlesHtml =
      '<div class="cl-panel-label">Actions</div>' +
      '<button class="cl-btn cl-btn-ghost" id="cl-new-p-btn" style="width:100%;justify-content:center;margin-bottom:6px">+ Named principle</button>' +
      '<button class="cl-btn cl-btn-ghost" id="cl-bulk-confirm-btn" style="width:100%;justify-content:center;display:none">Confirm all auto</button>';

    // Nav rail
    var _paneEl = document.getElementById('cl-body');
    var _nav = window.PPNavRail.create(_paneEl, {
      toolName: 'Clusters',
      defaultOpen: true,
      panelSections: [
        { label: 'Views',      html: _tabsSectionHtml },
        { label: 'Global',     html: _globalHtml },
        { label: 'Principles', html: _principlesHtml },
      ],
    });

    // Build main area with two views
    _nav.mainEl.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;';
    _nav.mainEl.innerHTML =
      // Principles view
      '<div class="cl-view" id="cl-view-principles">' +
        '<div class="cl-pr-layout">' +
          '<div class="cl-named-col">' +
            '<div class="cl-col-hdr">Named principles <span class="cl-subtab-n" id="cl-named-count">0</span></div>' +
            '<div class="cl-scroll" id="cl-named-list"></div>' +
          '</div>' +
          '<div class="cl-pool-col">' +
            '<div class="cl-col-hdr">Holding pool <span class="cl-subtab-n" id="cl-pool-count">0</span>' +
              '<button class="cl-col-hdr-btn" id="cl-pool-recluster">Re-cluster</button>' +
            '</div>' +
            '<div class="cl-scroll" id="cl-pool-list"></div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      // Visual view (utils-clusters.js renders into #cl-visual-pane)
      '<div class="cl-view" id="cl-view-visual" hidden>' +
        '<div id="cl-visual-pane" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative;">' +
        '</div>' +
      '</div>';

    injectToolNav('clusters.html');
    window.GlobalPanel.init({
      onSettingsChanged: function(s) {
        _thresh = s.threshold; _clusters = null;
        if (SY.autoSplitAll()) { _embedNewSplits(); }
        if (_clusterTool) {
          // Sliders live in cl-inner-sections after DOM move, query from there
          var ds = document.getElementById('pp-cl-defthresh');
          if (ds) { ds.value = Math.round(s.threshold*100); ds.dispatchEvent(new Event('input',{bubbles:true})); }
          // Forward maxWords to pp-cl-maxlen (card text length limiter)
          var ml = document.getElementById('pp-cl-maxlen');
          if (ml) {
            var newLen = s.maxWords >= 200 ? 2000 : Math.max(100, s.maxWords * 6);
            ml.value = newLen;
            ml.dispatchEvent(new Event('input',{bubbles:true}));
          }
        }
      },
    });


    function _embedNewSplits() {
      if (!window.EmbeddingUtils || !_embReady) return;
      var keys = SY.getEffectiveNoteKeys();
      keys.forEach(function(key) {
        if (_emb.has(key)) return;
        var r = SY.resolveNoteKey(key); if (!r || !r.text.trim()) return;
        window.EmbeddingUtils.getCachedEmbedding(r.text).then(function(vec){
          if (vec) {
            _emb.set(key, new Float32Array(vec));
            // If visual tab is active, signal re-cluster
            if (_clusterTool && _view === 'visual') {
              _clusterTool.reset();
              window.dispatchEvent(new CustomEvent('embedding-complete', { detail:{ total: _emb.size } }));
            }
          }
        }).catch(function(){});
      });
    }

    // ── Sub-tab switching (pp-panel-tab buttons live in panel) ──────────────
    document.addEventListener('click', function(e){
      var btn = e.target.closest('.pp-panel-tab[data-clview]'); if (!btn) return;
      _view = btn.dataset.clview;
      document.querySelectorAll('.pp-panel-tab[data-clview]').forEach(function(b){
        b.classList.toggle('active', b.dataset.clview === _view);
      });
      document.getElementById('cl-view-principles').hidden = _view !== 'principles';
      document.getElementById('cl-view-visual').hidden     = _view !== 'visual';
      if (_view === 'visual') {
        if (!_clusterTool) _initVisual();
        else _showPanelSections('visual');
      } else {
        _showPanelSections('principles');
      }
    });

    // ── Embedding ────────────────────────────────────────────────────────────
    function _triggerEmbed() {
      if (_embedding) return;
      var keys = SY.getEffectiveNoteKeys();
      if (!keys.length || !window.EmbeddingUtils) return;
      _embedding = true;
      document.getElementById('cl-dot').className = 'pp-panel-dot loading';
      document.getElementById('cl-emb-text').textContent = 'Embedding ' + keys.length + ' entries...';
      _embedAll(keys).then(function(){
        return _embedPrincipleDescriptions();
      }).then(function(){
        _embedding = false; _embReady = true;
        SY.autoSplitAll();
        _embedNewSplits();
        document.getElementById('cl-dot').className = 'pp-panel-dot ready';
        var _clMsg = _emb.size + ' indexed';
        document.getElementById('cl-emb-text').textContent = _clMsg;
        if (_nav && _nav.subtitleEl) _nav.subtitleEl.textContent = _clMsg;
        _clusters = null;
        renderPrinciples();
        // Signal utils-clusters.js if visual tab is initialised
        if (_clusterTool) {
          _clusterTool.reset();
          window.dispatchEvent(new CustomEvent('embedding-complete', { detail: { total: _emb.size } }));
        }
      }).catch(function(e){
        _embedding = false;
        document.getElementById('cl-dot').className = 'pp-panel-dot';
        console.error('[clusters] embed error:', e);
      });
    }

    async function _embedAll(keys) {
      for (var i = 0; i < keys.length; i++) {
        var key = keys[i]; if (_emb.has(key)) continue;
        var r   = SY.resolveNoteKey(key); if (!r || !r.text.trim()) continue;
        try {
          var vec = await window.EmbeddingUtils.getCachedEmbedding(r.text);
          if (vec) _emb.set(key, new Float32Array(vec));
        } catch(e){}
      }
    }

    // Embed principle name+description so they influence cluster matching
    // Also embed register and dimension descriptions for richer vector enrichment
    async function _embedPrincipleDescriptions() {
      if (!window.EmbeddingUtils) return;
      // Principle descriptions
      var ps = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      for (var i = 0; i < ps.length; i++) {
        var p = ps[i];
        var embedKey = '__pdesc__' + p.id;
        var text = SY.getPrincipleEmbedText(p);
        if (!text) continue;
        try {
          var vec = await window.EmbeddingUtils.getCachedEmbedding(text);
          if (vec) _emb.set(embedKey, new Float32Array(vec));
        } catch(e){}
      }
      // Register descriptions — always embed label, with description if available
      var regs = SY.getRegisters();
      for (var ri = 0; ri < regs.length; ri++) {
        var r = regs[ri];
        var rDesc = SY.getSchemaDescription('registers', r.key);
        var rText = (r.label || r.key.toUpperCase()) + (rDesc ? '. ' + rDesc : '');
        try {
          var rv = await window.EmbeddingUtils.getCachedEmbedding(rText);
          if (rv) _emb.set('__rdesc__' + r.key, new Float32Array(rv));
        } catch(e){}
      }
      // Dimension descriptions — always embed name, with description if available
      var dims = SY.getDimensions();
      for (var di = 0; di < dims.length; di++) {
        var dDesc = SY.getSchemaDescription('dimensions', dims[di]);
        var dText = dims[di] + (dDesc ? '. ' + dDesc : '');
        try {
          var dv = await window.EmbeddingUtils.getCachedEmbedding(dText);
          if (dv) _emb.set('__ddesc__' + dims[di], new Float32Array(dv));
        } catch(e){}
      }
      // Column title descriptions
      var colTitles;
      try { colTitles = JSON.parse(localStorage.getItem('df_fw_col_titles')); } catch(e){}
      if (!Array.isArray(colTitles)||colTitles.length<1) colTitles = ['Rule / Constraint','Move / Intervention','Metric / Proof'];
      for (var ci = 0; ci < colTitles.length; ci++) {
        var cDesc = SY.getSchemaDescription('columns', String(ci));
        var cText = colTitles[ci] + (cDesc ? '. ' + cDesc : '');
        try {
          var cv = await window.EmbeddingUtils.getCachedEmbedding(cText);
          if (cv) _emb.set('__cdesc__' + ci, new Float32Array(cv));
        } catch(e){}
      }
    }

    document.addEventListener('embedder-ready', _triggerEmbed);
    window.addEventListener('embedding-complete', function(){ if (!_embReady) _triggerEmbed(); });
    window.addEventListener('sheet-loaded', function(){
      updateCounts(); renderPrinciples();
      _triggerEmbed();
      _loadFramework();
    });

    function _loadFramework() {
      var scriptUrl = SY.getScriptUrl();
      var sheetUrl  = typeof getSavedSheetUrl === 'function' ? getSavedSheetUrl() : '';
      if (!scriptUrl || !sheetUrl) return;
      SY.readFramework(scriptUrl, sheetUrl).then(function(tabs){
        var fw = tabs.find(function(t){ return t.name && t.name.indexOf('FRAMEWORK') !== -1; });
        if (!fw) return;
        SY.setFrameworkTabs([{ name: fw.name, grid: fw.rows }]);
        SY.loadFromFrameworkTab(fw.rows);
        updateCounts(); renderPrinciples();
      }).catch(function(){});
    }

    // ── Count badges ─────────────────────────────────────────────────────────
    function updateCounts() {
      var named    = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; }).length;
      var assigned = new Set(SY.getAssignments().map(function(a){ return a.noteKey; }));
      var unassigned = SY.getEffectiveNoteKeys().filter(function(k){ return !assigned.has(k); }).length;
      var pending  = SY.getAssignments().filter(function(a){ return a.status==='auto'; }).length;
      document.getElementById('cl-n-named').textContent = named + (pending?' ('+pending+')':'');
      document.getElementById('cl-n-pool').textContent  = unassigned;
      document.getElementById('cl-named-count').textContent = named;
      document.getElementById('cl-pool-count').textContent  = unassigned;
      var bulk = document.getElementById('cl-bulk-confirm-btn');
      if (bulk) { bulk.style.display = pending > 0 ? '' : 'none'; bulk.textContent = 'Confirm all auto ('+pending+')'; }
    }

    // ── Clustering (unassigned pool) ─────────────────────────────────────────
    function _getClusters() {
      if (_clusters !== null) return _clusters;
      var assigned = new Set(SY.getAssignments().map(function(a){ return a.noteKey; }));
      var items    = SY.getEffectiveNoteKeys()
        .filter(function(k){ return !assigned.has(k) && _emb.has(k); })
        .map(function(k){ return { id:k, vec:_emb.get(k) }; });
      var raw    = SY.cluster(items, _thresh);
      var pvecs  = SY.buildPrincipleVectors(_emb);
      _clusters  = raw.map(function(c){
        var texts = c.noteKeys.map(function(k){ var r=SY.resolveNoteKey(k); return r?r.text:''; });
        c.label   = SY.autoLabel(texts);
        c.sugg    = null; var bestSim = 0.50;
        pvecs.forEach(function(pv){
          var sim = SY.cosine(c.centroid, pv.centroid);
          if (sim > bestSim){ bestSim=sim; c.sugg=pv.principle; }
        });
        return c;
      });
      return _clusters;
    }

    // ══ PRINCIPLES RENDER ════════════════════════════════════════════════════

    function renderPrinciples() {
      updateCounts();
      _renderNamed();
      _renderPool();
    }

    // ── Named list ───────────────────────────────────────────────────────────
    function _renderNamed() {
      var named       = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      var assignments = SY.getAssignments();
      var changed     = new Set(SY.getChangedSources().map(function(c){ return c.noteKey; }));
      var pNotes      = {};
      assignments.forEach(function(a){ if(!pNotes[a.principleId]) pNotes[a.principleId]=[]; pNotes[a.principleId].push(a); });

      var listEl = document.getElementById('cl-named-list');
      if (!named.length) { listEl.innerHTML = '<div class="cl-empty">No named principles yet.<br>Name a cluster to get started.</div>'; return; }

      var html = '';
      named.forEach(function(p){
        var as   = pNotes[p.id] || [];
        var auto = as.filter(function(a){ return a.status==='auto'; });
        var open = _openP.has(p.id);
        html += '<div class="cl-pr-card">';
        html += '<div class="cl-pr-head" data-toggle="'+_h(p.id)+'">';
        html += '<div class="cl-pr-dot" style="background:'+_h(p.color)+'"></div>';
        html += '<div class="cl-pr-name">'+_h(p.name)+'</div>';
        html += '<div class="cl-pr-meta">'+_h(p.dimensionHint||'—')+' · '+as.length+' note'+(as.length!==1?'s':'');
        if (auto.length) html += ' · <span style="color:#1565c0;font-weight:600">'+auto.length+' pending</span>';
        html += '</div>';
        html += '<span class="cl-chevron'+(open?' open':'')+'">&#9658;</span>';
        html += '</div>';
        if (auto.length) html += '<div class="cl-pending-banner">'+auto.length+' auto-assigned · <button class="cl-btn cl-btn-ghost" data-action="bulk-confirm-p" data-pid="'+_h(p.id)+'" style="height:22px;font-size:11px;padding:0 10px">Confirm all</button></div>';
        html += '<div class="cl-pr-body'+(open?' open':'')+'">';
        as.forEach(function(a){
          var r = SY.resolveNoteKey(a.noteKey); if (!r) return;
          var isChanged = changed.has(a.noteKey);
          var reg = a.register || SY.suggestPlacement(_emb.get(a.noteKey), r.text, _emb).register;
          var parsed = typeof parseCitation==='function' ? parseCitation(r.text) : {body:r.text,citation:null};
          html += '<div class="cl-pr-note'+(isChanged?' changed':'')+'">';
          html += '<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">';
          ['what','why','who','how'].forEach(function(rr){
            html += '<button class="cl-reg-tiny '+rr+(reg===rr?' active':'')+'" data-nk="'+_h(a.noteKey)+'" data-r="'+rr+'">'+rr.toUpperCase()+'</button>';
          });
          html += '</div>';
          html += '<div class="cl-pr-note-content">';
          html += '<div class="cl-pr-note-text">'+_h(parsed.body)+(parsed.citation?' <span class="cl-cite-pill" style="background:'+_h(p.color)+'">'+_h(parsed.citation)+'</span>':'')+'</div>';
          html += '<div class="cl-pr-note-src">'+_h(r.tabName)+'</div>';
          if (a.status==='auto') html += '<div style="display:flex;gap:4px;margin-top:3px"><span class="cl-badge cl-badge-auto">auto '+(a.similarity?a.similarity.toFixed(2):'')+' </span><button class="cl-btn cl-btn-ghost" data-action="confirm-a" data-nk="'+_h(a.noteKey)+'" style="height:20px;font-size:10px;padding:0 8px">Confirm</button><button class="cl-btn cl-btn-ghost" data-action="reject-a" data-nk="'+_h(a.noteKey)+'" style="height:20px;font-size:10px;padding:0 8px;color:var(--md-sys-color-error)">Reject</button></div>';
          if (isChanged) html += '<div class="cl-pr-note-changed">Source changed — <button class="cl-btn cl-btn-ghost" data-action="ack-change" data-nk="'+_h(a.noteKey)+'" style="height:18px;padding:0 6px;font-size:10px">Acknowledge</button></div>';
          html += '</div>';
          html += '<button class="cl-btn cl-btn-ghost" data-action="remove-from-p" data-nk="'+_h(a.noteKey)+'" style="height:22px;font-size:10px;padding:0 8px;margin-left:auto;flex-shrink:0;align-self:flex-start;margin-top:8px">Remove</button>';
          html += '</div>';
        });
        html += '<div class="cl-pr-foot">';
        html += '<button class="cl-btn cl-btn-ghost" data-action="rename-p"  data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px">Rename</button>';
        html += '<button class="cl-btn cl-btn-ghost" data-action="archive-p" data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px">Archive</button>';
        html += '<button class="cl-btn cl-btn-danger" data-action="del-p"    data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px">Delete</button>';
        html += '</div>';
        html += '</div></div>';
      });

      listEl.innerHTML = html;
      _bindNamedEvents(listEl);
    }

    function _bindNamedEvents(listEl) {
      listEl.querySelectorAll('[data-toggle]').forEach(function(el){
        el.addEventListener('click', function(){ var id=el.dataset.toggle; if(_openP.has(id)) _openP.delete(id); else _openP.add(id); renderPrinciples(); });
      });
      listEl.querySelectorAll('.cl-reg-tiny').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.updateAssignmentRegister(btn.dataset.nk, btn.dataset.r); renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=confirm-a]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.confirmAssignment(btn.dataset.nk); _clusters=null; renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=reject-a]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.rejectAssignment(btn.dataset.nk); _clusters=null; renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=ack-change]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.acknowledgeChangedSource(btn.dataset.nk); renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=remove-from-p]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.rejectAssignment(btn.dataset.nk); _clusters=null; renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=bulk-confirm-p]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.getAssignments().filter(function(a){ return a.principleId===btn.dataset.pid&&a.status==='auto'; }).forEach(function(a){ SY.confirmAssignment(a.noteKey); }); _clusters=null; renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=rename-p]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); var p=SY.getPrinciples().find(function(x){return x.id===btn.dataset.pid;}); if(!p) return; _openModal('Rename principle', p.name, p.dimensionHint, function(name,dim,desc){ SY.updatePrinciple(p.id,{name:name,dimensionHint:dim,description:desc}); _emb.delete('__pdesc__'+p.id); _clusters=null; renderPrinciples(); }, p.description||''); });
      });
      listEl.querySelectorAll('[data-action=archive-p]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); SY.updatePrinciple(btn.dataset.pid,{archived:true,named:false}); SY.getAssignments().filter(function(a){return a.principleId===btn.dataset.pid;}).forEach(function(a){SY.rejectAssignment(a.noteKey);}); _clusters=null; renderPrinciples(); });
      });
      listEl.querySelectorAll('[data-action=del-p]').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); if(confirm('Delete this principle?')){ SY.deletePrinciple(btn.dataset.pid); _clusters=null; renderPrinciples(); } });
      });
    }

    // ── Pool ─────────────────────────────────────────────────────────────────
    function _renderPool() {
      var poolEl   = document.getElementById('cl-pool-list');
      var clusters = _getClusters();
      var clusteredKeys = new Set();
      clusters.forEach(function(c){ c.noteKeys.forEach(function(k){ clusteredKeys.add(k); }); });
      var assigned    = new Set(SY.getAssignments().map(function(a){ return a.noteKey; }));
      var unassigned  = SY.getEffectiveNoteKeys().filter(function(k){ return !assigned.has(k); });
      var singletons  = unassigned.filter(function(k){ return _emb.has(k) && !clusteredKeys.has(k); });
      var notEmbedded = unassigned.filter(function(k){ return !_emb.has(k); });

      var html = '';
      if (!_embReady && unassigned.length) html += '<div style="padding:14px;font-size:12px;color:var(--md-sys-color-on-surface-variant);font-style:italic">Model loading — clusters will appear shortly.</div>';

      clusters.forEach(function(cl, ci){
        var open = _openCl.has(String(ci));
        // Analyze each entry for placement
        var analyzed = [];
        cl.noteKeys.forEach(function(k){
          var r = SY.resolveNoteKey(k); if (!r) return;
          var a = SY.analyzePlacement(_emb.get(k), r.text, _emb);
          analyzed.push({key:k, r:r, analysis:a});
        });
        html += '<div class="cl-pool-card">';
        html += '<div class="cl-pool-head" data-ci="'+ci+'">';
        html += '<span class="cl-pool-label">'+_h(cl.label)+'</span>';
        html += '<span class="cl-subtab-n" style="flex-shrink:0">'+cl.noteKeys.length+'</span>';
        if (cl.sugg) html += '<span class="cl-sugg">→ '+_h(cl.sugg.name.slice(0,16))+'</span>';
        html += '<span class="cl-chevron'+(open?' open':'')+'">&#9658;</span>';
        html += '</div>';
        html += '<div class="cl-pool-body'+(open?' open':'')+'">';
        var regColors = {what:'#1565c0',why:'#e65100',who:'#2e7d32',how:'#6a1b9a'};
        analyzed.forEach(function(item){
          var parsed = typeof parseCitation==='function' ? parseCitation(item.r.text) : {body:item.r.text,citation:null};
          var a = item.analysis;
          html += '<div class="cl-pool-note">';
          html += '<div class="cl-pool-note-inner"><div class="cl-pool-note-text">'+_h(parsed.body)+(parsed.citation?' <span class="cl-cite-pill" style="background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant)">'+_h(parsed.citation)+'</span>':'')+'</div>';
          // Similarity badges
          html += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:3px">';
          // Register
          if (a.register.scores.length && a.register.scores[0].sim > 0.20) {
            var topReg = a.register.scores[0];
            html += '<span class="cl-sim-badge" style="color:'+(regColors[topReg.key]||'var(--md-sys-color-primary)')+'">'+_h(topReg.label||topReg.key.toUpperCase())+' '+Math.round(topReg.sim*100)+'%</span>';
          }
          // Dimension
          if (a.dimension.scores.length && a.dimension.scores[0].sim > 0.20) {
            var topDim = a.dimension.scores[0];
            html += '<span class="cl-sim-badge">'+_h(topDim.name)+' '+Math.round(topDim.sim*100)+'%</span>';
          }
          // Column
          if (a.column.scores.length && a.column.scores[0].sim > 0.20) {
            var _colT; try{_colT=JSON.parse(localStorage.getItem('df_fw_col_titles'));}catch(e){} if(!Array.isArray(_colT)||_colT.length<1) _colT=['Rule','Move','Metric'];
            var topCol = a.column.scores[0];
            html += '<span class="cl-sim-badge">'+_h(_colT[topCol.index])+' '+Math.round(topCol.sim*100)+'%</span>';
          }
          // Principle
          if (a.principles.length && a.principles[0].similarity >= SY.SUGGEST_THRESHOLD) {
            var topP = a.principles[0];
            html += '<span class="cl-sim-badge" style="background:'+_h(topP.color)+';color:#fff">→ '+_h(topP.name.slice(0,14))+' '+Math.round(topP.similarity*100)+'%</span>';
          }
          html += '</div>';
          html += '<div class="cl-pool-note-src">'+_h(item.r.tabName)+'</div></div>';
          html += '<button class="cl-assign-btn" data-key="'+_h(item.key)+'">Assign</button>';
          html += '</div>';
        });
        html += '<div class="cl-pool-foot">';
        html += '<button class="cl-btn cl-btn-tonal" data-action="name-cl" data-ci="'+ci+'" style="height:26px;font-size:11px">Name this cluster</button>';
        if (cl.sugg) html += '<button class="cl-btn cl-btn-ghost" data-action="merge-cl" data-ci="'+ci+'" data-pid="'+_h(cl.sugg.id)+'" style="height:26px;font-size:11px">Merge into '+_h(cl.sugg.name.slice(0,14))+'</button>';
        html += '</div>';
        html += '</div></div>';
      });

      if (singletons.length) {
        html += '<div class="cl-singleton-section"><div class="cl-singleton-label">Singletons ('+singletons.length+')</div><div class="cl-singleton-chips">';
        singletons.forEach(function(k){
          var r = SY.resolveNoteKey(k); if (!r) return;
          html += '<div class="cl-singleton" data-key="'+_h(k)+'" title="'+_h(r.text)+'"><span>'+_h(r.text.slice(0,38))+(r.text.length>38?'…':'')+'</span></div>';
        });
        html += '</div></div>';
      }
      if (notEmbedded.length) html += '<div style="padding:10px 14px;font-size:11px;color:var(--md-sys-color-on-surface-variant);font-style:italic">'+notEmbedded.length+' entries not yet embedded.</div>';
      if (!clusters.length && !singletons.length && !notEmbedded.length) html += '<div class="cl-empty">All entries are assigned.</div>';

      poolEl.innerHTML = html;
      _bindPoolEvents(poolEl, clusters);
    }

    function _bindPoolEvents(poolEl, clusters) {
      poolEl.querySelectorAll('[data-ci]:not([data-action])').forEach(function(el){
        el.addEventListener('click', function(){ var k=String(el.dataset.ci); if(_openCl.has(k)) _openCl.delete(k); else _openCl.add(k); renderPrinciples(); });
      });
      poolEl.querySelectorAll('.cl-assign-btn').forEach(function(btn){
        btn.addEventListener('click', function(e){ e.stopPropagation(); var rect=btn.getBoundingClientRect(); _openPop(btn.dataset.key, rect.left, rect.bottom+4); });
      });
      poolEl.querySelectorAll('.cl-singleton').forEach(function(chip){
        chip.addEventListener('click', function(){ var rect=chip.getBoundingClientRect(); _openPop(chip.dataset.key, rect.left, rect.bottom+4); });
      });
      poolEl.querySelectorAll('[data-action=name-cl]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var ci = parseInt(btn.dataset.ci), cl = clusters[ci];
          _openModal('Name this cluster', '', '', function(name, dim, desc){
            var p = SY.addPrinciple({ name:name, dimensionHint:dim, description:desc });
            if (cl) cl.noteKeys.forEach(function(k){ var r=SY.resolveNoteKey(k); var pl=SY.suggestPlacement(_emb.get(k),r?r.text:'',_emb); SY.setAssignment(k, p.id, pl.register, 'confirmed', null, pl.column); });
            _clusters=null; _openP.add(p.id); renderPrinciples();
          });
        });
      });
      poolEl.querySelectorAll('[data-action=merge-cl]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var cl = clusters[parseInt(btn.dataset.ci)]; if (!cl) return;
          cl.noteKeys.forEach(function(k){ var r=SY.resolveNoteKey(k); var pl=SY.suggestPlacement(_emb.get(k),r?r.text:'',_emb); SY.setAssignment(k, btn.dataset.pid, pl.register, 'confirmed', null, pl.column); });
          _clusters=null; _openP.add(btn.dataset.pid); renderPrinciples();
        });
      });
    }

    // Re-cluster button
    var poolReCluster = document.getElementById('cl-pool-recluster');
    if (poolReCluster) poolReCluster.addEventListener('click', function(){ _clusters=null; renderPrinciples(); });

    // New principle button
    var newPBtn = document.getElementById('cl-new-p-btn');
    if (newPBtn) newPBtn.addEventListener('click', function(){ _openModal('New principle','','',function(name,dim,desc){ var p=SY.addPrinciple({name:name,dimensionHint:dim,description:desc}); _openP.add(p.id); renderPrinciples(); }); });
    var bulkBtn = document.getElementById('cl-bulk-confirm-btn');
    if (bulkBtn) bulkBtn.addEventListener('click', function(){ SY.getAssignments().filter(function(a){return a.status==='auto';}).forEach(function(a){SY.confirmAssignment(a.noteKey);}); _clusters=null; renderPrinciples(); });

    // ══ VISUAL TAB ═══════════════════════════════════════════════════════════
    // Lazy-load utils-clusters.js. We mock PPNavRail.create so the tool reuses
    // our outer panel instead of creating a second one.

    function _initVisual() {
      var visualPane = document.getElementById('cl-visual-pane');
      if (!visualPane) return;

      if (window.EmbeddingUtils) {
        window.EmbeddingUtils.isReady = function(){ return _embReady; };
      }

      if (_clusterTool) {
        // Already loaded — show inner sections, hide outer, trigger render
        _showPanelSections('visual');
        if (_embReady) { _clusterTool.reset(); _clusterTool.start(); }
        return;
      }

      // ── Mock PPNavRail to prevent double-panel ──
      var _realPPNavRail = window.PPNavRail;
      var _outerPanelBody = document.querySelector('#cl-body .pp-side-panel-body');
      var _outerSubtitle  = document.querySelector('#cl-body .pp-side-panel-subtitle');
      var _outerRail      = document.querySelector('#cl-body .pp-nav-rail');
      var _outerPanel     = document.querySelector('#cl-body .pp-side-panel');

      window.PPNavRail = {
        create: function(paneEl, opts) {
          window.PPNavRail = _realPPNavRail; // restore immediately

          // ── Strategy: inject full PPNavRail structure into paneEl so the tool's
          // querySelector calls work and its event listeners bind to real elements.
          // After init, we MOVE those live elements into the outer visible panel.
          // DOM moves preserve event listeners — no proxy/copy needed.

          var sectionsHTML = '';
          if (opts && opts.panelSections) {
            opts.panelSections.forEach(function(sec){
              sectionsHTML +=
                '<div class="pp-side-panel-section">' +
                  '<div class="pp-side-panel-section-label">'+sec.label+'</div>' +
                  sec.html +
                '</div>';
            });
          }

          var railExtraHTML = opts && opts.railExtra ? opts.railExtra : '';

          paneEl.style.cssText = 'flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;position:relative;';
          paneEl.innerHTML =
            '<div class="pp-nav-rail" style="display:none">' + railExtraHTML + '</div>' +
            '<div class="pp-side-panel pp-side-panel--collapsed" style="display:none">' +
              '<div class="pp-side-panel-header"><div class="pp-side-panel-tool-name"></div>' +
              '<div class="pp-side-panel-subtitle" id="cl-visual-subtitle">Loading…</div>' +
              '<div class="pp-side-panel-status"></div></div>' +
              '<div class="pp-side-panel-body" id="cl-hidden-panel-body">' + sectionsHTML + '</div>' +
            '</div>' +
            '<div class="pp-tool-main" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative;"></div>';

          // Only wrap the LAST section (Principles) for toggling.
          // Views and Global sections must always stay visible.
          if (_outerPanelBody && !document.getElementById('cl-outer-sections')) {
            var wrap = document.createElement('div');
            wrap.id = 'cl-outer-sections';
            var allSecs = Array.from(_outerPanelBody.querySelectorAll(':scope > .pp-side-panel-section'));
            // Wrap only sections after the first two (Views, Global)
            allSecs.slice(2).forEach(function(sec){ wrap.appendChild(sec); });
            _outerPanelBody.appendChild(wrap);
          }

          return {
            railEl:     paneEl.querySelector('.pp-nav-rail'),
            panelEl:    paneEl.querySelector('.pp-side-panel'),
            mainEl:     paneEl.querySelector('.pp-tool-main'),
            subtitleEl: paneEl.querySelector('#cl-visual-subtitle') || document.createElement('span'),
            statusEl:   paneEl.querySelector('.pp-side-panel-status') || document.createElement('div'),
          };
        }
      };

      var s = document.createElement('script');
      s.src = '../utilities/utils-clusters.js?v=96702bbb';
      s.onload = function(){
        if (typeof initClustersTool !== 'function') return;
        _clusterTool = initClustersTool(visualPane, null);

        // MOVE live panel sections from hidden pane into outer visible panel.
        // Event listeners bound by the tool survive DOM moves — no proxy needed.
        var hiddenBody = document.getElementById('cl-hidden-panel-body');
        if (hiddenBody && _outerPanelBody) {
          var innerWrap = document.createElement('div');
          innerWrap.id = 'cl-inner-sections';
          innerWrap.style.display = 'none';
          // Move each pp-side-panel-section (not the hidden panel header) into outer
          var sections = Array.from(hiddenBody.querySelectorAll('.pp-side-panel-section'));
          sections.forEach(function(sec){ innerWrap.appendChild(sec); });
          _outerPanelBody.appendChild(innerWrap);

          // Move railExtra buttons (sheet/export) into a panel button section
          var railButtons = Array.from(visualPane.querySelectorAll('.pp-nav-rail-sheet-btn'));
          if (railButtons.length) {
            var btnSection = document.createElement('div');
            btnSection.className = 'pp-side-panel-section';
            btnSection.id = 'cl-visual-actions';
            btnSection.style.cssText = 'display:none;flex-direction:row;gap:6px;padding:8px 12px;';
            railButtons.forEach(function(btn){
              btn.style.cssText = 'flex:1;height:34px;border-radius:6px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;cursor:pointer;color:var(--md-sys-color-on-surface-variant);display:inline-flex;align-items:center;justify-content:center;';
              btnSection.appendChild(btn);
            });
            _outerPanelBody.appendChild(btnSection);
          }
        }

        // Hide the internal Max Words per card slider (Global panel has this)
        var innerSecs = document.getElementById('cl-inner-sections');
        if (innerSecs) {
          var maxLenRow = innerSecs.querySelector('#pp-cl-maxlen');
          if (maxLenRow) {
            var row = maxLenRow.closest('.pp-range-row') || maxLenRow.parentElement;
            // hide both the slider row and its label (prev sibling)
            if (row) {
              row.style.display = 'none';
              // Also hide the label before it if it's a val span row
              var prev = row.previousElementSibling;
              if (prev && prev.classList.contains('pp-range-row')) prev.style.display = 'none';
            }
          }
          // Sync maxLen slider to global maxWords on init
          var maxLenSlider = document.getElementById('pp-cl-maxlen');
          if (maxLenSlider) {
            var mw = SY.getSettings().maxWords;
            maxLenSlider.value = mw >= 200 ? 2000 : Math.max(100, mw * 6);
            maxLenSlider.dispatchEvent(new Event('input', { bubbles: true }));
          }
        }
        _showPanelSections('visual');
        // Inject named principles as defined clusters with their colours
        setTimeout(function(){ _injectPrinciplesAsClusters(); }, 350);
        if (_embReady) {
          window.dispatchEvent(new CustomEvent('embedder-ready'));
          setTimeout(function(){
            window.dispatchEvent(new CustomEvent('embedding-complete', { detail: { total: _emb.size } }));
          }, 120);
        }
      };
      document.head.appendChild(s);
    }

    function _showPanelSections(tab) {
      var outer = document.getElementById('cl-outer-sections');
      var inner = document.getElementById('cl-inner-sections');
      var actions = document.getElementById('cl-visual-actions');
      if (outer)   { outer.style.display   = tab === 'principles' ? '' : 'none'; }
      if (inner)   {
        // pointer-events:none when hidden so it can't intercept canvas pan/zoom
        inner.style.display        = tab === 'visual' ? '' : 'none';
        inner.style.pointerEvents  = tab === 'visual' ? '' : 'none';
      }
      if (actions) { actions.style.display = tab === 'visual' ? 'flex' : 'none'; }
    }

    function _injectPrinciplesAsClusters() {
      var named = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      if (!named.length) return;

      function addNext(idx) {
        if (idx >= named.length) {
          // After all added, patch chip colors to match principle colors
          setTimeout(function(){ _patchClusterChipColors(named); }, 200);
          return;
        }
        var p = named[idx];
        var addBtn = document.getElementById('pp-cl-def-add-btn');
        if (!addBtn) return;
        addBtn.click();
        setTimeout(function(){
          var ta = document.getElementById('pp-cl-def-ta');
          if (!ta) { setTimeout(function(){ addNext(idx); }, 100); return; }
          ta.value = p.name;
          ta.dispatchEvent(new Event('input', { bubbles: true }));
          ta.dispatchEvent(new KeyboardEvent('keydown', { key:'Enter', bubbles:true, cancelable:true }));
          setTimeout(function(){ addNext(idx + 1); }, 180);
        }, 100);
      }

      addNext(0);
    }

    function _patchClusterChipColors(named) {
      // pp-cl-chip elements are rendered by renderDefPanel in utils-clusters.js
      var chips = document.querySelectorAll('#pp-cl-defs-list .pp-cl-chip');
      chips.forEach(function(chip, i){
        var p = named[i]; if (!p) return;
        // Patch the dot color
        var dot = chip.querySelector('[class*="dot"], [class*="pp-cl-chip-dot"]');
        if (dot) dot.style.background = p.color;
        // Patch the chip border/accent CSS variable if present
        chip.style.setProperty('--chip-color', p.color);
      });
    }

    // ── Assign popover ───────────────────────────────────────────────────────
    function _openPop(noteKey, x, y) {
      _assignCtx = noteKey;
      var ps     = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      var listEl = document.getElementById('cl-pop-list');
      listEl.innerHTML = '';
      if (!ps.length) {
        var it = document.createElement('div'); it.className = 'cl-pop-item';
        it.style.color = 'var(--md-sys-color-on-surface-variant)'; it.textContent = 'No named principles'; listEl.appendChild(it);
      }
      ps.forEach(function(p){
        var it = document.createElement('div'); it.className = 'cl-pop-item';
        it.innerHTML = '<span class="cl-pop-dot" style="background:'+_h(p.color)+'"></span>'+_h(p.name);
        it.addEventListener('click', function(){
          var r = SY.resolveNoteKey(_assignCtx);
          var pl = SY.suggestPlacement(_emb.get(_assignCtx), r ? r.text : '', _emb);
          SY.setAssignment(_assignCtx, p.id, pl.register, 'confirmed', null, pl.column);
          _clusters=null; _openP.add(p.id); _closePop(); renderPrinciples();
        });
        listEl.appendChild(it);
      });
      var pop = document.getElementById('cl-pop');
      pop.style.left = Math.min(x, window.innerWidth-200)+'px';
      pop.style.top  = Math.min(y, window.innerHeight-260)+'px';
      pop.classList.add('open');
    }
    function _closePop(){ document.getElementById('cl-pop').classList.remove('open'); _assignCtx=null; }
    document.addEventListener('click', function(e){ if(!document.getElementById('cl-pop').contains(e.target)) _closePop(); });

    document.getElementById('cl-pop-new').addEventListener('click', function(){
      if (!_assignCtx) return;
      var savedCtx = _assignCtx; _closePop();
      _openModal('New principle', '', '', function(name, dim, desc){
        var p = SY.addPrinciple({ name:name, dimensionHint:dim, description:desc });
        var r = SY.resolveNoteKey(savedCtx);
        var pl = SY.suggestPlacement(_emb.get(savedCtx), r ? r.text : '', _emb);
        SY.setAssignment(savedCtx, p.id, pl.register, 'confirmed', null, pl.column);
        _clusters=null; _openP.add(p.id); renderPrinciples();
      });
    });

    // ── Principle modal ──────────────────────────────────────────────────────
    function _openModal(title, defaultName, defaultDim, cb, defaultDesc) {
      _pModalCb = cb;
      document.getElementById('cl-modal-title').textContent = title || 'New principle';
      document.getElementById('cl-modal-name').value = defaultName || '';
      document.getElementById('cl-modal-desc').value = defaultDesc || '';
      document.getElementById('cl-modal-confirm').textContent = title && title.startsWith('Rename') ? 'Rename' : 'Create';
      // Dynamic dimension chips
      var dimsEl = document.getElementById('cl-modal-dims');
      var dims = SY.getDimensions();
      dimsEl.innerHTML = '';
      dims.forEach(function(d){
        var btn = document.createElement('button');
        btn.className = 'cl-dim-chip' + (d === (defaultDim||'') ? ' active' : '');
        btn.dataset.dim = d; btn.textContent = d;
        btn.addEventListener('click', function(){ dimsEl.querySelectorAll('.cl-dim-chip').forEach(function(x){ x.classList.remove('active'); }); btn.classList.add('active'); });
        dimsEl.appendChild(btn);
      });
      document.getElementById('cl-modal-bg').classList.add('open');
      setTimeout(function(){ var i=document.getElementById('cl-modal-name'); i.focus(); i.select(); }, 60);
    }
    function _closeModal(){ document.getElementById('cl-modal-bg').classList.remove('open'); _pModalCb=null; }

    document.getElementById('cl-modal-cancel').addEventListener('click', _closeModal);
    document.getElementById('cl-modal-bg').addEventListener('click', function(e){ if(e.target===e.currentTarget) _closeModal(); });
    document.getElementById('cl-modal-confirm').addEventListener('click', function(){
      var name = document.getElementById('cl-modal-name').value.trim();
      var dim  = (document.querySelector('.cl-dim-chip.active')||{}).dataset && document.querySelector('.cl-dim-chip.active').dataset.dim || '';
      var desc = (document.getElementById('cl-modal-desc')||{}).value || '';
      var cb = _pModalCb;
      _closeModal();
      if (cb) cb(name, dim, desc.trim());
    });
    document.getElementById('cl-modal-name').addEventListener('keydown', function(e){
      if (e.key==='Enter') document.getElementById('cl-modal-confirm').click();
      if (e.key==='Escape') _closeModal();
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function(){ updateCounts(); });

  })();
  </script>
</body>
