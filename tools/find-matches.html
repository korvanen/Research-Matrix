<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ── Scripts ────────────────────────────────────────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js?v=4"></script>
  <script src="../utilities/utils-keywords.js?v=4"></script>
  <script src="../utilities/utils-sidepanel.js?v=4"></script>
  <script src="../utilities/embedding-bridge.js?v=4"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=4"></script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Matches — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=5e413c1e">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--color-bg-page);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      color: var(--color-text-default);
    }

    /* ── Search bar ───────────────────────────────────────────────── */
    .fm-search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-subtle);
      flex-shrink: 0;
    }

    .fm-input {
      flex: 1;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      background: var(--color-bg-page);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      color: var(--color-text-default);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .fm-input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px var(--color-accent-subtle);
    }
    .fm-input::placeholder { color: var(--color-text-placeholder); }
    .fm-input:disabled { opacity: 0.5; cursor: not-allowed; }

    .fm-btn {
      height: 34px;
      padding: 0 14px;
      border: 1px solid var(--color-border-default);
      border-radius: var(--radius-md);
      background: var(--color-bg-surface);
      font-family: var(--font-family);
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--color-text-default);
      cursor: pointer;
      flex-shrink: 0;
      transition: background var(--transition-fast), border-color var(--transition-fast);
      white-space: nowrap;
    }
    .fm-btn:hover:not(:disabled) { background: var(--color-bg-hover); border-color: var(--color-border-strong); }
    .fm-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .fm-btn--primary {
      background: var(--color-accent);
      color: var(--color-accent-fg);
      border-color: var(--color-accent);
    }
    .fm-btn--primary:hover:not(:disabled) {
      background: var(--color-accent-hover);
      border-color: var(--color-accent-hover);
    }

    /* ── Options row ──────────────────────────────────────────────── */
    .fm-options {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 14px;
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-subtle);
      flex-shrink: 0;
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      flex-wrap: wrap;
    }

    .fm-option-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fm-select {
      height: 24px;
      padding: 0 6px;
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-sm);
      background: var(--color-bg-page);
      font-family: var(--font-family);
      font-size: var(--font-size-xs);
      color: var(--color-text-default);
      outline: none;
      cursor: pointer;
    }
    .fm-select:focus { border-color: var(--color-accent); }

    .fm-status {
      margin-left: auto;
      color: var(--color-text-muted);
      font-size: var(--font-size-xs);
      white-space: nowrap;
    }

    /* ── Results ──────────────────────────────────────────────────── */
    .fm-results {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .fm-results::-webkit-scrollbar { width: 6px; }
    .fm-results::-webkit-scrollbar-track { background: transparent; }
    .fm-results::-webkit-scrollbar-thumb {
      background: var(--color-border-default);
      border-radius: var(--radius-full);
    }

    /* ── Empty / loading states ───────────────────────────────────── */
    .fm-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--color-text-muted);
      font-size: var(--font-size-sm);
      text-align: center;
      padding: 40px 20px;
    }
    .fm-empty svg {
      opacity: 0.25;
      margin-bottom: 4px;
    }
    .fm-empty p { margin: 0; }
    .fm-empty p + p { font-size: var(--font-size-xs); opacity: 0.7; }

    .fm-spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--color-border-default);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: fm-spin 0.7s linear infinite;
      margin-bottom: 6px;
    }
    @keyframes fm-spin { to { transform: rotate(360deg); } }

    /* ── Result card ──────────────────────────────────────────────── */
    .fm-card {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 12px;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }
    .fm-card:hover {
      border-color: var(--color-border-strong);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .fm-card:active { background: var(--color-bg-hover); }

    .fm-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fm-rank {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      background: var(--color-bg-hover);
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
    }

    .fm-score-bar {
      flex: 1;
      height: 4px;
      border-radius: var(--radius-full);
      background: var(--color-border-subtle);
      overflow: hidden;
    }
    .fm-score-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-accent);
      transition: width 0.3s ease;
    }

    .fm-score-label {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      color: var(--color-text-muted);
      font-variant-numeric: tabular-nums;
      width: 32px;
      text-align: right;
    }

    .fm-goto-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border-subtle);
      background: var(--color-bg-page);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
      padding: 0;
    }
    .fm-goto-btn:hover {
      background: var(--color-accent);
      color: var(--color-accent-fg);
      border-color: var(--color-accent);
    }
    .fm-goto-btn svg { pointer-events: none; }

    .fm-card-cats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .fm-cat-tag {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: var(--radius-full);
      background: var(--color-bg-hover);
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .fm-cat-tag:first-child {
      background: var(--color-accent-subtle);
      color: var(--color-accent);
    }

    .fm-card-cells {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .fm-cell-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }
    .fm-cell-label {
      flex-shrink: 0;
      width: 80px;
      font-size: 10px;
      font-weight: 500;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fm-cell-value {
      flex: 1;
      min-width: 0;
      font-size: var(--font-size-xs);
      color: var(--color-text-default);
      line-height: 1.4;
    }
    .fm-cell-value.fm-match {
      color: var(--color-text-default);
      font-weight: 500;
    }

    /* ── No-host overlay ──────────────────────────────────────────── */
    .ds-no-host {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 24px;
      text-align: center;
      color: var(--color-text-muted);
    }
    .ds-no-host.visible { display: flex; }
    .ds-no-host h2 { margin: 0; font-size: var(--font-size-base); color: var(--color-text-default); }
    .ds-no-host p  { margin: 0; font-size: var(--font-size-sm); }
    .ds-no-host a  { color: var(--color-accent); }
  </style>
</head>
<body>

  <!-- ── Topbar ──────────────────────────────────────────────────── -->
  <div class="ds-topbar">
    <a class="ds-topbar-back" href="../index.html">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </a>
    <div class="ds-topbar-title">Find Matches</div>
    <div class="ds-badge ds-badge--waiting" id="fm-connection-badge">
      <div class="ds-badge-dot"></div>
      <span id="fm-badge-text">Connecting…</span>
    </div>
  </div>

  <!-- ── Search bar ─────────────────────────────────────────────── -->
  <div class="fm-search-bar">
    <input
      class="fm-input"
      id="fm-input"
      type="text"
      placeholder="Describe what you're looking for…"
      disabled
      autocomplete="off"
      spellcheck="false"
    />
    <button class="fm-btn fm-btn--primary" id="fm-search-btn" disabled>Search</button>
    <button class="fm-btn" id="fm-clear-btn" disabled title="Clear results">✕</button>
  </div>

  <!-- ── Options row ────────────────────────────────────────────── -->
  <div class="fm-options">
    <div class="fm-option-group">
      <label for="fm-top-n">Show top</label>
      <select class="fm-select" id="fm-top-n">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="40">40</option>
        <option value="80">80</option>
        <option value="0">All</option>
      </select>
      <label for="fm-top-n">results</label>
    </div>
    <div class="fm-option-group">
      <label for="fm-min-score">Min score</label>
      <select class="fm-select" id="fm-min-score">
        <option value="0">Any</option>
        <option value="0.3">0.30</option>
        <option value="0.4" selected>0.40</option>
        <option value="0.5">0.50</option>
        <option value="0.6">0.60</option>
        <option value="0.7">0.70</option>
      </select>
    </div>
    <div class="fm-status" id="fm-status"></div>
  </div>

  <!-- ── Results ────────────────────────────────────────────────── -->
  <div class="fm-results" id="fm-results">
    <div class="ds-no-host visible" id="fm-no-host">
      <h2>Data not available</h2>
      <p>Return to the <a href="../index.html">home page</a> to load data first.</p>
    </div>
  </div>

  <script>
    // ── State ─────────────────────────────────────────────────────
    var _rows        = [];
    var _lastResults = [];
    var _searching   = false;
    var _ready       = false;

    // ── DOM refs ─────────────────────────────────────────────────
    var inputEl   = document.getElementById('fm-input');
    var searchBtn = document.getElementById('fm-search-btn');
    var clearBtn  = document.getElementById('fm-clear-btn');
    var resultsEl = document.getElementById('fm-results');
    var noHostEl  = document.getElementById('fm-no-host');
    var statusEl  = document.getElementById('fm-status');
    var badgeEl   = document.getElementById('fm-connection-badge');
    var badgeText = document.getElementById('fm-badge-text');
    var topNSel   = document.getElementById('fm-top-n');
    var minScoreSel = document.getElementById('fm-min-score');

    // ── Badge ──────────────────────────────────────────────────────
    function setBadge(state, text) {
      badgeEl.className = 'ds-badge ds-badge--' + state;
      badgeText.textContent = text;
    }

    // ── Enable UI once data + embeddings are both ready ───────────
    function maybeEnable() {
      if (!_ready || !_rows.length) return;
      inputEl.disabled   = false;
      searchBtn.disabled = false;
      clearBtn.disabled  = false;
      statusEl.textContent = _rows.length + ' entries indexed';
      setBadge('connected', _rows.length + ' entries live');
      showEmpty('Type a query above and press Search.');
    }

    // ── Empty / loading states ────────────────────────────────────
    function showEmpty(msg, spinner) {
      resultsEl.innerHTML = '';
      var el = document.createElement('div');
      el.className = 'fm-empty';
      if (spinner) {
        var s = document.createElement('div');
        s.className = 'fm-spinner';
        el.appendChild(s);
      } else {
        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width', '32'); svg.setAttribute('height', '32');
        svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
        svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '1.5');
        svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
        svg.innerHTML = '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>';
        el.appendChild(svg);
      }
      var p = document.createElement('p');
      p.textContent = msg;
      el.appendChild(p);
      resultsEl.appendChild(el);
    }

    // ── Cosine similarity ─────────────────────────────────────────
    function cosine(a, b) {
      if (!a || !b || a.length !== b.length) return 0;
      var dot = 0, na = 0, nb = 0;
      for (var i = 0; i < a.length; i++) {
        dot += a[i] * b[i];
        na  += a[i] * a[i];
        nb  += b[i] * b[i];
      }
      var denom = Math.sqrt(na) * Math.sqrt(nb);
      return denom < 1e-10 ? 0 : dot / denom;
    }

    // ── Keyword fallback ─────────────────────────────────────────
    function keywordScore(query, row) {
      var q = query.toLowerCase();
      var words = q.split(/\s+/).filter(Boolean);
      var text = (row.row.cats.concat(row.row.cells)).join(' ').toLowerCase();
      if (!words.length) return 0;
      var hits = words.filter(function(w) { return text.includes(w); }).length;
      return hits / words.length;
    }

    // ── Search ───────────────────────────────────────────────────
    function doSearch() {
      var query = inputEl.value.trim();
      if (!query || _searching) return;

      var topN     = parseInt(topNSel.value) || 0;
      var minScore = parseFloat(minScoreSel.value) || 0;

      _searching = true;
      searchBtn.disabled = true;
      statusEl.textContent = 'Searching…';
      showEmpty('Computing similarity…', true);

      // Try semantic search first; fall back to keyword
      var embedPromise;
      if (window.EmbeddingUtils && typeof EmbeddingUtils.getCachedEmbedding === 'function') {
        embedPromise = EmbeddingUtils.getCachedEmbedding(query).then(function(cached) {
          if (cached) return cached;
          // Not cached — run the model
          if (typeof EmbeddingUtils.embed === 'function') return EmbeddingUtils.embed(query);
          return null;
        });
      } else {
        embedPromise = Promise.resolve(null);
      }

      embedPromise.then(function(queryVec) {
        var scored = _rows.map(function(row) {
          var score = queryVec && row.vec
            ? cosine(queryVec, row.vec)
            : keywordScore(query, row);
          return { row: row, score: score };
        });

        scored.sort(function(a, b) { return b.score - a.score; });

        var filtered = scored.filter(function(r) { return r.score >= minScore; });
        var results  = topN > 0 ? filtered.slice(0, topN) : filtered;

        _lastResults = results;
        renderResults(results, query, !!queryVec);
        _searching = false;
        searchBtn.disabled = false;

        var mode = queryVec ? 'semantic' : 'keyword';
        statusEl.textContent =
          results.length + ' result' + (results.length === 1 ? '' : 's') +
          ' (' + mode + ')';
      }).catch(function(err) {
        console.error('[find-matches] search error:', err);
        _searching = false;
        searchBtn.disabled = false;
        statusEl.textContent = 'Search error';
        showEmpty('An error occurred. Try again.');
      });
    }

    // ── Render results ────────────────────────────────────────────
    function renderResults(results, query, isSemantic) {
      resultsEl.innerHTML = '';
      if (!results.length) {
        showEmpty('No matches found. Try a different query or lower the minimum score.');
        return;
      }
      var maxScore = results[0].score || 1;
      results.forEach(function(r, i) {
        resultsEl.appendChild(makeCard(r, i + 1, maxScore, query));
      });
    }

    function makeCard(r, rank, maxScore, query) {
      var row  = r.row;
      var card = document.createElement('div');
      card.className = 'fm-card';

      // Header row: rank + score bar + goto button
      var header = document.createElement('div');
      header.className = 'fm-card-header';

      var rankEl = document.createElement('div');
      rankEl.className = 'fm-rank';
      rankEl.textContent = rank;

      var barWrap = document.createElement('div');
      barWrap.className = 'fm-score-bar';
      var barFill = document.createElement('div');
      barFill.className = 'fm-score-fill';
      barFill.style.width = Math.round((r.score / maxScore) * 100) + '%';
      barWrap.appendChild(barFill);

      var scoreLabel = document.createElement('div');
      scoreLabel.className = 'fm-score-label';
      scoreLabel.textContent = r.score.toFixed(2);

      var gotoBtn = document.createElement('button');
      gotoBtn.className = 'fm-goto-btn';
      gotoBtn.title = 'Open in spreadsheet';
      gotoBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h8M7 3l4 4-4 4"/></svg>';
      gotoBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open('../tools/spreadsheet.html#goto=' + row.tabIdx + ':' + row.rowIdx + ':0', '_blank');
      });

      header.appendChild(rankEl);
      header.appendChild(barWrap);
      header.appendChild(scoreLabel);
      header.appendChild(gotoBtn);

      // Category tags
      var cats = document.createElement('div');
      cats.className = 'fm-card-cats';
      (row.row.cats || []).forEach(function(c) {
        if (!c.trim()) return;
        var tag = document.createElement('span');
        tag.className = 'fm-cat-tag';
        tag.textContent = c;
        cats.appendChild(tag);
      });
      if (row.title) {
        var titleTag = document.createElement('span');
        titleTag.className = 'fm-cat-tag';
        titleTag.textContent = '↗ ' + row.title;
        titleTag.style.marginLeft = 'auto';
        titleTag.style.opacity = '0.55';
        cats.appendChild(titleTag);
      }

      // Data cells
      var cellsEl = document.createElement('div');
      cellsEl.className = 'fm-card-cells';
      (row.row.cells || []).forEach(function(val, colIdx) {
        if (!val.trim()) return;
        var header_label = (row.headers && row.headers[colIdx]) ? row.headers[colIdx] : ('Col ' + (colIdx + 1));
        var cellRow = document.createElement('div');
        cellRow.className = 'fm-cell-row';
        var labelEl = document.createElement('div');
        labelEl.className = 'fm-cell-label';
        labelEl.textContent = header_label;
        var valueEl = document.createElement('div');
        valueEl.className = 'fm-cell-value';
        // Highlight query words in value
        var parsed = typeof parseCitation === 'function' ? parseCitation(val) : { body: val };
        valueEl.textContent = parsed.body;
        if (query) {
          var bodyText = parsed.body;
          var qWords   = query.toLowerCase().split(/\s+/).filter(function(w) { return w.length > 2; });
          var anyHit   = qWords.some(function(w) { return bodyText.toLowerCase().includes(w); });
          if (anyHit) valueEl.classList.add('fm-match');
        }
        cellRow.appendChild(labelEl);
        cellRow.appendChild(valueEl);
        cellsEl.appendChild(cellRow);
      });

      card.appendChild(header);
      if (cats.children.length) card.appendChild(cats);
      if (cellsEl.children.length) card.appendChild(cellsEl);

      // Click card to open spreadsheet
      card.addEventListener('click', function() {
        window.open('../tools/spreadsheet.html#goto=' + row.tabIdx + ':' + row.rowIdx + ':0', '_blank');
      });

      return card;
    }

    // ── Input events ──────────────────────────────────────────────
    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doSearch();
    });
    searchBtn.addEventListener('click', doSearch);
    clearBtn.addEventListener('click', function() {
      inputEl.value = '';
      _lastResults = [];
      statusEl.textContent = _rows.length ? _rows.length + ' entries indexed' : '';
      showEmpty('Type a query above and press Search.');
    });

    // ── EmbeddingBridge guest ─────────────────────────────────────
    EmbeddingBridge.guest(function(rows) {
      noHostEl.classList.remove('visible');
      _rows = rows;
      statusEl.textContent = rows.length + ' entries received, waiting for model…';
      setBadge('waiting', 'Model loading…');
      showEmpty('Model loading…', true);

      // Wire EmbeddingUtils from the bridge-provided vectors
      var textToVec = new Map();
      rows.forEach(function(r) {
        if (!r.vec) return;
        var cells = (r.row && r.row.cells) ? r.row.cells : (r.cells || []);
        cells.forEach(function(c) {
          if (c && c.trim()) textToVec.set(c.trim(), r.vec);
        });
      });

      window.EmbeddingUtils = window.EmbeddingUtils || {};
      window.EmbeddingUtils.getCachedEmbedding = function(text) {
        var vec = textToVec.get(text.trim());
        if (vec) return Promise.resolve(vec);
        return Promise.resolve(null);
      };

      // Fire embedder-ready so utils-embedding.js can initialise embed()
      window.dispatchEvent(new CustomEvent('embedder-ready'));
      setTimeout(function() {
        window.dispatchEvent(new CustomEvent('embedding-complete', { detail: { total: rows.length } }));
        _ready = true;
        maybeEnable();
      }, 100);
    });

    window.addEventListener('bridge-no-host', function() {
      setBadge('disconnected', 'No data — visit home page first');
      noHostEl.classList.add('visible');
      statusEl.textContent = '';
    });

    // Also listen for embedding-complete from utils-embedding.js directly
    window.addEventListener('embedding-complete', function() {
      _ready = true;
      maybeEnable();
    });
  </script>

</body>
</html>
