<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Matches — Dimensional Framework</title>
 <link rel="stylesheet" href="../design-system.css">
  <style>
    body {
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--tool-pane-bg);
    }

    /* ── Search bar ── */
    #fm-search-wrap {
      flex-shrink: 0;
      background: var(--raw-white);
      border-bottom: 1px solid var(--color-border-subtle);
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #fm-search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #fm-input {
      flex: 1;
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: var(--radius-md);
      padding: 9px 14px;
      font-size: var(--font-size-md);
      font-family: var(--font-family);
      color: var(--raw-black);
      background: var(--raw-white);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    #fm-input:focus {
      border-color: rgba(0,0,0,0.4);
      box-shadow: var(--focus-ring);
    }
    #fm-input::placeholder { color: rgba(0,0,0,0.3); }

    /* ── Results pane ── */
    #fm-pane {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #fm-pane { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }
    #fm-pane::-webkit-scrollbar { width: 6px; }
    #fm-pane::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

    /* ── No-host / hint ── */
    #fm-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex: 1;
      text-align: center;
      padding: 40px;
      color: rgba(0,0,0,0.25);
    }
    #fm-hint .fm-hint-icon { font-size: 28px; opacity: 0.35; margin-bottom: 4px; }
    #fm-hint p {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1.6;
    }

    /* ── Result cards ── */
    .fm-result-card {
      background: var(--raw-white);
      border: 1.5px solid rgba(0,0,0,0.09);
      border-radius: var(--radius-lg);
      overflow: hidden;
      animation: ds-card-in 0.2s cubic-bezier(0.22,1,0.36,1) both;
      transition: box-shadow var(--transition-fast), transform var(--transition-fast);
    }
    .fm-result-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: translateY(-1px);
    }

    .fm-card-head {
      padding: 7px 12px 6px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .fm-card-accent-bar { width: 3px; height: 14px; border-radius: 2px; flex-shrink: 0; }
    .fm-card-cats {
      font-size: 9px;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .fm-score-pill {
      font-size: 9px;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.05em;
      border-radius: var(--radius-full);
      padding: 2px 8px;
      flex-shrink: 0;
    }

    .fm-card-body { padding: 8px 12px 10px; display: flex; flex-direction: column; gap: 5px; }
    .fm-cell-row  { display: flex; flex-direction: column; gap: 2px; }
    .fm-cell-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
    }
    .fm-cell-text { font-size: 11px; line-height: 1.42; color: rgba(0,0,0,0.72); }
    .fm-cell-row + .fm-cell-row { padding-top: 5px; border-top: 1px solid rgba(0,0,0,0.06); }

    .fm-card-footer {
      padding: 5px 12px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .fm-sim-bar-wrap {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(0,0,0,0.07);
      overflow: hidden;
      margin-right: 10px;
    }
    .fm-sim-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s ease; }
    .fm-sim-pct {
      font-size: 9px;
      font-weight: var(--font-weight-bold);
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .fm-results-header {
      font-size: 9px;
      font-weight: var(--font-weight-bold);
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      padding: 2px 0 4px 0;
      flex-shrink: 0;
    }

    /* Model status */
    #fm-model-status {
      align-self: flex-start;
      transition: opacity 0.6s ease;
    }
  </style>
</head>
<body>

  <div class="ds-topbar">
    <a class="ds-topbar-back" href="index.html">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </a>
    <div class="ds-topbar-title">Find Matches</div>
    <div class="ds-badge ds-badge--waiting" id="fm-connection-badge">
      <div class="ds-badge-dot"></div>
      <span id="fm-badge-text">Connecting…</span>
    </div>
  </div>

  <!-- Search bar -->
  <div id="fm-search-wrap">
    <div id="fm-search-row">
      <input type="text" id="fm-input" placeholder="Search across all entries…" autocomplete="off" spellcheck="false" />
      <button id="fm-search-btn" class="ds-btn ds-btn-solid">Search</button>
    </div>
    <div class="ds-badge ds-badge--loading" id="fm-model-status">
      <div class="ds-badge-dot"></div>
      <span id="fm-model-label">Loading model…</span>
    </div>
  </div>

  <!-- Results -->
  <div id="fm-pane">
    <div class="ds-no-host" id="fm-no-host" style="position:relative;inset:auto;background:transparent;backdrop-filter:none;">
      <h2>Spreadsheet not detected</h2>
      <p>Open <a href="app.html">the main spreadsheet page</a> first, then come back here.</p>
    </div>
    <div id="fm-hint">
      <div class="fm-hint-icon">⌕</div>
      <p>Type a query above<br>to find semantically similar entries</p>
    </div>
  </div>

<script src="../utilities/utils-keywords.js?v=1"></script>
<script src="../utilities/utils-sidepanel.js?v=1"></script>
<script src="../utilities/embedding-bridge.js?v=1"></script>
<script type="module" src="../utilities/utils-embedding.js?v=1"></script>

  <script>
  (function () {
    'use strict';

    var PALETTE = [
      { accent: '#2e7d5e', bg: '#f4faf7' },
      { accent: '#4a56c8', bg: '#f4f5fd' },
      { accent: '#5e3d9e', bg: '#f6f3fb' },
      { accent: '#c44035', bg: '#fdf5f4' },
      { accent: '#c8991a', bg: '#fffdf5' },
      { accent: '#888888', bg: '#f7f7f8' },
    ];
    function colForIndex(i) {
      var pal = window.PP_PALETTE || PALETTE;
      return pal[i % pal.length];
    }

    var _rows       = null;
    var _modelReady = false;
    var _searching  = false;

    var badgeEl     = document.getElementById('fm-connection-badge');
    var badgeText   = document.getElementById('fm-badge-text');
    var noHost      = document.getElementById('fm-no-host');
    var hint        = document.getElementById('fm-hint');
    var pane        = document.getElementById('fm-pane');
    var inputEl     = document.getElementById('fm-input');
    var searchBtn   = document.getElementById('fm-search-btn');
    var modelStatus = document.getElementById('fm-model-status');
    var modelLabel  = document.getElementById('fm-model-label');

    function setBadge(state, text) {
      badgeEl.className = 'ds-badge ds-badge--' + state;
      badgeText.textContent = text;
    }
    function setModelStatus(state, text) {
      modelStatus.className = 'ds-badge ds-badge--' + state;
      modelLabel.textContent = text;
    }

    function cosineSim(a, b) {
      if (!a || !b || a.length !== b.length) return 0;
      var dot = 0, na = 0, nb = 0;
      for (var i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
      return (na && nb) ? Math.max(0, Math.min(1, dot / (Math.sqrt(na)*Math.sqrt(nb)))) : 0;
    }

    async function runSearch(queryText) {
      if (!_rows || !queryText.trim()) return [];
      queryText = queryText.trim();

      var queryKws = (typeof panelExtractKW === 'function') ? new Set(panelExtractKW(queryText)) : new Set();
      var queryVec = null;

      if (window.EmbeddingUtils && window.EmbeddingUtils.isReady()) {
        try {
          var raw = await window.EmbeddingUtils.getCachedEmbedding(queryText);
          if (raw) queryVec = (raw instanceof Float32Array) ? raw : new Float32Array(raw);
        } catch (e) {}
      }

      var results = _rows.map(function (r) {
        var cells   = (r.row && r.row.cells) ? r.row.cells : (r.cells || []);
        var text    = cells.join(' ').trim();
        var rowKwArr = (typeof panelExtractKW === 'function') ? panelExtractKW(text) : [];
        var rowKws   = new Set(rowKwArr);
        var shared   = Array.from(queryKws).filter(function (k) { return rowKws.has(k); });
        var kwScore  = 0;
        shared.forEach(function (k) { kwScore += 1 / (rowKwArr.filter(function(x){return x===k;}).length || 1); });
        var embScore = 0;
        if (queryVec && r.vec) {
          var rv = (r.vec instanceof Float32Array) ? r.vec : new Float32Array(r.vec);
          embScore = cosineSim(queryVec, rv);
        }
        var score = queryVec
          ? (embScore * 0.85 + (shared.length > 0 ? Math.min(kwScore * 0.15, 0.15) : 0))
          : (shared.length > 0 ? Math.min(kwScore / 5, 1) : 0);
        return Object.assign({}, r, { shared: new Set(shared), kwScore: kwScore, embScore: embScore, score: score });
      });

      var threshold = queryVec ? 0.38 : 0;
      return results
        .filter(function (r) { return r.score > threshold || r.shared.size > 1; })
        .sort(function (a, b) { return b.score - a.score; })
        .slice(0, 40);
    }

    function renderResults(results, query) {
      var toRemove = pane.querySelectorAll('.fm-result-card, .fm-results-header');
      toRemove.forEach(function (el) { el.remove(); });
      hint.style.display = 'none';

      if (!results || !results.length) {
        hint.style.display = 'flex';
        hint.querySelector('p').textContent = 'No matches found for "' + query + '"';
        return;
      }

      var header = document.createElement('div');
      header.className = 'fm-results-header';
      header.textContent = results.length + ' result' + (results.length === 1 ? '' : 's') + ' for "' + query + '"';
      pane.appendChild(header);

      results.forEach(function (r, idx) {
        var cells   = (r.row && r.row.cells) ? r.row.cells : (r.cells || []);
        var cats    = (r.row && r.row.cats)  ? r.row.cats.filter(function(c){return c.trim();}) : [];
        var headers = r.headers || [];
        var col     = colForIndex(r.tabIdx || 0);
        var pct     = Math.round(r.score * 100);

        var card = document.createElement('div');
        card.className = 'fm-result-card';
        card.style.animationDelay = (idx * 25) + 'ms';
        card.style.borderLeftColor = col.accent;
        card.style.borderLeftWidth = '3px';

        var head = document.createElement('div'); head.className = 'fm-card-head';
        var bar  = document.createElement('div'); bar.className = 'fm-card-accent-bar'; bar.style.background = col.accent;
        var catEl = document.createElement('div'); catEl.className = 'fm-card-cats';
        catEl.textContent = cats.length ? cats.join(' · ') : (r.title || 'Entry');
        var pill = document.createElement('div'); pill.className = 'fm-score-pill';
        pill.style.background = col.accent + '20'; pill.style.color = col.accent;
        pill.textContent = pct + '%';
        head.appendChild(bar); head.appendChild(catEl); head.appendChild(pill);
        card.appendChild(head);

        var body = document.createElement('div'); body.className = 'fm-card-body';
        cells.forEach(function (text, ci) {
          if (!text || !text.trim()) return;
          var parsed = (typeof parseCitation === 'function') ? parseCitation(text) : { body: text };
          var row = document.createElement('div'); row.className = 'fm-cell-row';
          var lbl = document.createElement('div'); lbl.className = 'fm-cell-label';
          lbl.textContent = headers[ci] || ('Column ' + (ci + 1));
          var txt = document.createElement('div'); txt.className = 'fm-cell-text';
          if (r.shared && r.shared.size > 0 && typeof panelHighlight === 'function') {
            txt.innerHTML = panelHighlight(parsed.body, r.shared);
          } else {
            txt.textContent = parsed.body;
          }
          row.appendChild(lbl); row.appendChild(txt); body.appendChild(row);
        });
        card.appendChild(body);

        if (r.embScore > 0) {
          var footer = document.createElement('div'); footer.className = 'fm-card-footer';
          var barWrap = document.createElement('div'); barWrap.className = 'fm-sim-bar-wrap';
          var barFill = document.createElement('div'); barFill.className = 'fm-sim-bar-fill';
          barFill.style.width = Math.round(r.embScore * 100) + '%';
          barFill.style.background = col.accent;
          barWrap.appendChild(barFill);
          var simPct = document.createElement('div'); simPct.className = 'fm-sim-pct';
          simPct.textContent = Math.round(r.embScore * 100) + '% semantic match';
          footer.appendChild(barWrap); footer.appendChild(simPct);
          card.appendChild(footer);
        }
        pane.appendChild(card);
      });
    }

    async function doSearch() {
      var q = inputEl.value.trim();
      if (!q || _searching) return;
      if (!_rows) { noHost.style.display = 'flex'; return; }
      _searching = true;
      searchBtn.disabled = true;
      searchBtn.textContent = '…';
      try {
        var results = await runSearch(q);
        renderResults(results, q);
      } catch (e) { console.error('[find-matches]', e); }
      _searching = false;
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }

    searchBtn.addEventListener('click', doSearch);
    inputEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });

    window.addEventListener('embedder-ready',    function () { _modelReady = true; setModelStatus('ready', 'Semantic model ready'); });
    window.addEventListener('embedding-progress',function (e) { if (!_modelReady) setModelStatus('loading', 'Indexing… ' + (e.detail && e.detail.pct ? e.detail.pct + '%' : '')); });
    window.addEventListener('embedding-complete',function (e) {
      _modelReady = true;
      setModelStatus('ready', 'Model ready · ' + (e.detail && e.detail.total ? e.detail.total + ' rows' : ''));
      setTimeout(function () { modelStatus.style.opacity = '0'; }, 3000);
    });

    if (window.EmbeddingUtils && window.EmbeddingUtils.isReady()) {
      _modelReady = true; setModelStatus('ready', 'Semantic model ready');
    }

    window.TABS             = window.TABS || [];
    window.processSheetData = window.processSheetData || function () { return null; };
    if (typeof parseCitation === 'undefined') {
      window.parseCitation = function (t) { return { body: String(t || ''), citation: null }; };
    }
    window.EmbeddingUtils = window.EmbeddingUtils || { isReady: function () { return false; } };

    EmbeddingBridge.guest(function (rows) {
      _rows = rows;
      noHost.style.display = 'none';
      setBadge('connected', rows.length + ' entries live');
      hint.querySelector('p').textContent = 'Type a query above to find semantically similar entries';
      hint.style.display = 'flex';
      setModelStatus('ready', rows.length + ' entries loaded');
      setTimeout(function () { modelStatus.style.opacity = '0'; }, 2500);
    });

    window.addEventListener('bridge-no-host', function () {
      setBadge('disconnected', 'No data — open main page first');
      noHost.style.display = 'flex';
      hint.style.display = 'none';
    });
  })();
  </script>

</body>
</html>
