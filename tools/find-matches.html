<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-keywords.js?v=7"></script>
  <script src="../utilities/utils-shared.js?v=0aa54525"></script>
  <script src="../utilities/utils-academic.js?v=66257bc0"></script>
  <script src="../utilities/embedding-bridge.js?v=7"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=4"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Matches — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=9fa06a28">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body {
      display: flex; flex-direction: column;
      background: var(--md-sys-color-background);
      font-family: var(--font-family);
      color: var(--md-sys-color-on-background);
    }

    /* ── Search bar ───────────────────────────── */
    .fm-search-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      padding: 12px 16px;
      background: var(--md-sys-color-surface-container);
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
    }
    /* MD3 Outlined Text Field — 48px compact */
    .fm-field {
      flex: 1; min-width: 0; position: relative;
      display: flex; align-items: center; height: 48px;
    }
    .fm-field__outline {
      position: absolute; inset: 0; border-radius: 4px; pointer-events: none;
      border: 1px solid var(--md-sys-color-outline);
      transition: border-color var(--transition-fast), border-width .1s;
    }
    .fm-field:focus-within .fm-field__outline { border: 2px solid var(--md-sys-color-primary); }
    .fm-field__lead {
      padding: 0 12px; flex-shrink: 0; z-index: 1;
      color: var(--md-sys-color-on-surface-variant); display: flex; align-items: center;
      transition: color var(--transition-fast);
    }
    .fm-field:focus-within .fm-field__lead { color: var(--md-sys-color-primary); }
    .fm-field__input {
      flex: 1; min-width: 0; height: 100%; padding: 0 16px 0 0;
      background: transparent; border: none; outline: none; z-index: 1;
      font-family: var(--font-family); font-size: 16px; line-height: 24px; letter-spacing: .03em;
      color: var(--md-sys-color-on-surface); caret-color: var(--md-sys-color-primary);
    }
    .fm-field__input::placeholder { color: var(--md-sys-color-on-surface-variant); opacity: 1; }
    .fm-field__input:disabled { opacity: .38; }

    /* Status chip */
    .fm-status-chip {
      display: flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 12px; border-radius: 16px; flex-shrink: 0;
      background: var(--md-sys-color-surface-container-highest);
      color: var(--md-sys-color-on-surface-variant);
      font-size: 11px; font-weight: 500; letter-spacing: .02em; white-space: nowrap;
    }
    .fm-status-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      background: var(--md-sys-color-outline); transition: background var(--transition-fast);
    }
    .fm-status--ready   .fm-status-dot { background: #34a853; }
    .fm-status--waiting .fm-status-dot { background: var(--md-sys-color-tertiary); animation: fm-pulse 1.3s ease-in-out infinite; }
    .fm-status--error   .fm-status-dot { background: var(--md-sys-color-error); }
    @keyframes fm-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }

    /* ── Results ─────────────────────────────── */
    .fm-results {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 12px 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .fm-results::-webkit-scrollbar { width: 6px; }
    .fm-results::-webkit-scrollbar-track { background: transparent; }
    .fm-results::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: 3px; }

    /* Empty state */
    .fm-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; padding: 48px 24px; text-align: center;
      color: var(--md-sys-color-on-surface-variant); font-size: var(--font-size-sm);
    }
    .fm-empty svg { opacity: .22; margin-bottom: 4px; }
    .fm-empty p { margin: 0; }

    /* MD3 indeterminate linear progress */
    .fm-progress {
      width: 120px; height: 4px; border-radius: 2px;
      background: var(--md-sys-color-secondary-container);
      overflow: hidden; position: relative; margin-bottom: 4px;
    }
    .fm-progress__bar {
      position: absolute; height: 100%; width: 40%;
      background: var(--md-sys-color-primary); border-radius: 2px;
      animation: fm-lin 1.4s infinite cubic-bezier(.4,0,.2,1);
    }
    @keyframes fm-lin { 0% { left: -40%; } 60% { left: 100%; } 100% { left: 100%; } }

    /* ── MD3 Outlined Card ───────────────────── */
    .fm-card {
      display: flex; flex-direction: column; gap: 6px;
      padding: 12px 16px;
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 12px; cursor: pointer;
      position: relative; overflow: hidden;
      transition: box-shadow var(--transition-fast), border-color var(--transition-fast);
    }
    .fm-card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--md-sys-color-on-surface); opacity: 0;
      transition: opacity var(--transition-fast); pointer-events: none;
    }
    .fm-card:hover { border-color: var(--md-sys-color-outline); box-shadow: 0 1px 2px rgba(0,0,0,.1); }
    .fm-card:hover::before { opacity: .05; }
    .fm-card:active::before { opacity: .1; }

    .fm-card-header { display: flex; align-items: center; gap: 8px; }

    /* Badge (rank) — MD3 Surface badge */
    .fm-rank {
      flex-shrink: 0; min-width: 20px; height: 20px; padding: 0 6px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 10px;
      background: var(--md-sys-color-surface-container-highest);
      color: var(--md-sys-color-on-surface-variant);
      font-size: 10px; font-weight: 600; letter-spacing: .02em;
    }
    .fm-score-bar {
      flex: 1; height: 4px; border-radius: 2px;
      background: var(--md-sys-color-secondary-container); overflow: hidden;
    }
    .fm-score-fill {
      height: 100%; background: var(--md-sys-color-primary); border-radius: 2px;
      transition: width .35s cubic-bezier(.4,0,.2,1);
    }
    .fm-score-label {
      flex-shrink: 0; font-size: 10px; font-weight: 600;
      color: var(--md-sys-color-on-surface-variant);
      font-variant-numeric: tabular-nums; width: 32px; text-align: right;
    }
    /* Go-to — MD3 Standard Icon Button */
    .fm-goto-btn {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant); position: relative; overflow: hidden;
      transition: color var(--transition-fast);
    }
    .fm-goto-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: var(--md-sys-color-on-surface-variant); opacity: 0; transition: opacity var(--transition-fast);
    }
    .fm-goto-btn:hover { color: var(--md-sys-color-primary); }
    .fm-goto-btn:hover::before { opacity: .08; }
    .fm-goto-btn svg { position: relative; z-index: 1; pointer-events: none; }

    /* Category chips — MD3 Suggestion chips */
    .fm-card-cats { display: flex; flex-wrap: wrap; gap: 4px; }
    .fm-cat-tag {
      display: inline-flex; align-items: center; height: 24px; padding: 0 10px;
      border-radius: 8px; background: transparent;
      border: 1px solid var(--md-sys-color-outline-variant);
      font-size: 11px; font-weight: 500; letter-spacing: .01em;
      color: var(--md-sys-color-on-surface-variant);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }
    .fm-cat-tag:first-child {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container); border-color: transparent;
    }

    /* Cell rows */
    .fm-card-cells { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }
    .fm-cell-row { display: flex; gap: 8px; align-items: baseline; }
    .fm-cell-label {
      flex-shrink: 0; width: 84px;
      font-size: 10px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fm-cell-value {
      flex: 1; min-width: 0; font-size: var(--font-size-xs);
      color: var(--md-sys-color-on-surface); line-height: 1.45;
    }
    .fm-cell-value.fm-match { font-weight: 500; }

    /* No-host */
    .ds-no-host {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 48px 24px; text-align: center;
      color: var(--md-sys-color-on-surface-variant);
    }
    .ds-no-host.visible { display: flex; }
    .ds-no-host h2 { margin: 0; font-size: 16px; font-weight: 400; color: var(--md-sys-color-on-surface); }
    .ds-no-host p { margin: 0; font-size: var(--font-size-sm); }
    .ds-no-host a { color: var(--md-sys-color-primary); }

    /* Results header */
    .fm-results-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 0 4px; flex-shrink: 0;
    }
    .fm-results-count {
      font-size: 11px; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
    }
    .fm-results-mode { font-size: 10px; color: var(--md-sys-color-on-surface-variant); }

    /* Panel chips section */
    .fm-panel-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 2px; }
    .fm-panel-label {
      font-size: 11px; color: var(--md-sys-color-on-surface-variant);
      margin-bottom: 4px; margin-top: 10px;
    }
    .fm-panel-label:first-child { margin-top: 0; }
  </style>
</head>
<body>

  <div class="ds-topbar">
    <a class="ds-topbar-back" href="../index.html">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </a>
    <div class="ds-topbar-title">Find Matches</div>
    <div class="ds-badge ds-badge--waiting" id="fm-topbar-badge">
      <div class="ds-badge-dot"></div>
      <span id="fm-topbar-badge-text">Connecting…</span>
    </div>
  </div>

  <div id="fm-pane" style="flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;"></div>

  <script>
    var _rows = [], _lastResults = [], _searching = false, _ready = false;
    var _topN = 20, _minScore = 0.4;

    var paneEl = document.getElementById('fm-pane');
    var nav = window.PPNavRail.create(paneEl, {
      toolName: 'Find Matches',
      panelSections: [
        {
          label: 'Results',
          html: (function() {
            var topOpts  = [['10',10],['20',20],['40',40],['80',80],['All',0]];
            var scoreOpts = [['Any',0],['0.30',0.3],['0.40',0.4],['0.50',0.5],['0.60',0.6]];
            return '<div class="fm-panel-label">Show top</div>' +
              '<div class="fm-panel-chips" id="fm-topn-chips">' +
                topOpts.map(function(p){ return '<button class="md3-chip md3-chip--filter' + (p[1]===20?' md3-chip--selected':'') + '" data-val="'+p[1]+'" data-group="topn">'+p[0]+'</button>'; }).join('') +
              '</div>' +
              '<div class="fm-panel-label">Min score</div>' +
              '<div class="fm-panel-chips" id="fm-score-chips">' +
                scoreOpts.map(function(p){ return '<button class="md3-chip md3-chip--filter' + (p[1]===0.4?' md3-chip--selected':'') + '" data-val="'+p[1]+'" data-group="score">'+p[0]+'</button>'; }).join('') +
              '</div>';
          })(),
        },
      ],
    });

    nav.mainEl.style.cssText += ';display:flex;flex-direction:column;overflow:hidden;';
    nav.mainEl.innerHTML =
      '<div class="fm-search-bar">' +
        '<div class="fm-field">' +
          '<div class="fm-field__lead"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div>' +
          '<input class="fm-field__input" id="fm-input" type="text" placeholder="Describe what you\u2019re looking for\u2026" disabled autocomplete="off" spellcheck="false"/>' +
          '<div class="fm-field__outline"></div>' +
        '</div>' +
        '<button class="md3-btn md3-btn--filled md3-btn--icon" id="fm-search-btn" disabled>' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="position:relative;z-index:1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          'Search' +
        '</button>' +
        '<button class="md3-icon-btn" id="fm-clear-btn" disabled title="Clear">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</button>' +
        '<div class="fm-status-chip fm-status--waiting" id="fm-status-chip"><div class="fm-status-dot"></div><span id="fm-status-text">Connecting\u2026</span></div>' +
      '</div>' +
      '<div class="fm-results" id="fm-results">' +
        '<div class="ds-no-host visible" id="fm-no-host"><h2>Data not available</h2><p>Return to the <a href="../index.html">home page</a> to load data first.</p></div>' +
      '</div>';

    var inputEl    = document.getElementById('fm-input');
    var searchBtn  = document.getElementById('fm-search-btn');
    var clearBtn   = document.getElementById('fm-clear-btn');
    var resultsEl  = document.getElementById('fm-results');
    var noHostEl   = document.getElementById('fm-no-host');
    var statusChip = document.getElementById('fm-status-chip');
    var statusText = document.getElementById('fm-status-text');

    function wireChips(id, cb) {
      var c = document.getElementById(id); if (!c) return;
      c.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-group]'); if (!btn) return;
        c.querySelectorAll('.md3-chip--filter').forEach(function(x){ x.classList.remove('md3-chip--selected'); });
        btn.classList.add('md3-chip--selected');
        cb(btn.dataset.val);
      });
    }
    wireChips('fm-topn-chips',  function(v){ _topN     = parseInt(v)   || 0; });
    wireChips('fm-score-chips', function(v){ _minScore = parseFloat(v) || 0; });

    function setStatus(state, text) {
      statusChip.className = 'fm-status-chip fm-status--' + state;
      statusText.textContent = text;
    }
    function maybeEnable() {
      if (!_ready || !_rows.length) return;
      inputEl.disabled = searchBtn.disabled = clearBtn.disabled = false;
      setStatus('ready', _rows.length + ' entries');
      nav.subtitleEl.textContent = _rows.length + ' entries indexed';
      showEmpty('Type a query above and press Search.');
    }
    function showEmpty(msg, loading) {
      resultsEl.innerHTML = '';
      var el = document.createElement('div'); el.className = 'fm-empty';
      if (loading) {
        var prog = document.createElement('div'); prog.className = 'fm-progress';
        var bar  = document.createElement('div'); bar.className  = 'fm-progress__bar';
        prog.appendChild(bar); el.appendChild(prog);
      } else {
        var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('width','32'); svg.setAttribute('height','32'); svg.setAttribute('viewBox','0 0 24 24');
        svg.setAttribute('fill','none'); svg.setAttribute('stroke','currentColor'); svg.setAttribute('stroke-width','1.5');
        svg.setAttribute('stroke-linecap','round'); svg.setAttribute('stroke-linejoin','round');
        svg.innerHTML = '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>';
        el.appendChild(svg);
      }
      var p = document.createElement('p'); p.textContent = msg; el.appendChild(p);
      resultsEl.appendChild(el);
    }
    function cosine(a,b) {
      if (!a||!b||a.length!==b.length) return 0;
      var dot=0,na=0,nb=0;
      for (var i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
      var d=Math.sqrt(na)*Math.sqrt(nb); return d<1e-10?0:dot/d;
    }
    function kwScore(q,row) {
      var words=q.toLowerCase().split(/\s+/).filter(Boolean);
      var text=(row.row.cats.concat(row.row.cells)).join(' ').toLowerCase();
      if (!words.length) return 0;
      return words.filter(function(w){return text.includes(w);}).length/words.length;
    }
    function doSearch() {
      var query=inputEl.value.trim(); if (!query||_searching) return;
      _searching=true; searchBtn.disabled=true;
      setStatus('waiting','Searching\u2026'); showEmpty('Computing similarity\u2026',true);
      var ep;
      if (window.EmbeddingUtils && typeof EmbeddingUtils.getCachedEmbedding==='function') {
        ep=EmbeddingUtils.getCachedEmbedding(query).then(function(v){
          if (v) return v;
          if (typeof EmbeddingUtils.embed==='function') return EmbeddingUtils.embed(query);
          return null;
        });
      } else { ep=Promise.resolve(null); }
      ep.then(function(qv) {
        var scored=_rows.map(function(r){return{row:r,score:qv&&r.vec?cosine(qv,r.vec):kwScore(query,r)};});
        scored.sort(function(a,b){return b.score-a.score;});
        var filtered=scored.filter(function(r){return r.score>=_minScore;});
        var results=_topN>0?filtered.slice(0,_topN):filtered;
        _lastResults=results; renderResults(results,query,!!qv);
        _searching=false; searchBtn.disabled=false;
        setStatus('ready',results.length+' results \u00b7 '+(qv?'semantic':'keyword'));
      }).catch(function(err){
        console.error('[find-matches]',err); _searching=false; searchBtn.disabled=false;
        setStatus('error','Search error'); showEmpty('An error occurred. Try again.');
      });
    }
    function renderResults(results,query,isSemantic) {
      resultsEl.innerHTML='';
      if (!results.length) { showEmpty('No matches. Try a different query or lower the minimum score.'); return; }
      var hdr=document.createElement('div'); hdr.className='fm-results-header';
      var cnt=document.createElement('div'); cnt.className='fm-results-count';
      cnt.textContent=results.length+' result'+(results.length===1?'':'s');
      var mode=document.createElement('div'); mode.className='fm-results-mode';
      mode.textContent=isSemantic?'\u25cf semantic':'\u25cb keyword';
      hdr.appendChild(cnt); hdr.appendChild(mode); resultsEl.appendChild(hdr);
      var mx=results[0].score||1;
      results.forEach(function(r,i){resultsEl.appendChild(makeCard(r,i+1,mx,query));});
    }
    function makeCard(r,rank,mx,query) {
      var row=r.row, card=document.createElement('div'); card.className='fm-card';
      var hdr=document.createElement('div'); hdr.className='fm-card-header';
      var rk=document.createElement('div'); rk.className='fm-rank'; rk.textContent=rank;
      var bw=document.createElement('div'); bw.className='fm-score-bar';
      var bf=document.createElement('div'); bf.className='fm-score-fill';
      bf.style.width=Math.round((r.score/mx)*100)+'%'; bw.appendChild(bf);
      var sl=document.createElement('div'); sl.className='fm-score-label'; sl.textContent=r.score.toFixed(2);
      var gb=document.createElement('button'); gb.className='fm-goto-btn'; gb.title='Open in spreadsheet';
      gb.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
      gb.addEventListener('click',function(e){e.stopPropagation();window.open('../tools/spreadsheet.html#goto='+row.tabIdx+':'+row.rowIdx+':0','_blank');});
      hdr.appendChild(rk); hdr.appendChild(bw); hdr.appendChild(sl); hdr.appendChild(gb);
      var cats=document.createElement('div'); cats.className='fm-card-cats';
      (row.row.cats||[]).forEach(function(c){if(!c.trim())return;var t=document.createElement('span');t.className='fm-cat-tag';t.textContent=c;cats.appendChild(t);});
      if (row.title){var tt=document.createElement('span');tt.className='fm-cat-tag';tt.style.marginLeft='auto';tt.style.opacity='.6';tt.style.fontStyle='italic';tt.textContent='\u2197 '+row.title;cats.appendChild(tt);}
      var cells=document.createElement('div'); cells.className='fm-card-cells';
      (row.row.cells||[]).forEach(function(val,ci){
        if(!val.trim())return;
        var hl=(row.headers&&row.headers[ci])?row.headers[ci]:('Col '+(ci+1));
        var cr=document.createElement('div'); cr.className='fm-cell-row';
        var ll=document.createElement('div'); ll.className='fm-cell-label'; ll.textContent=hl;
        var vl=document.createElement('div'); vl.className='fm-cell-value';
        var parsed=typeof parseCitation==='function'?parseCitation(val):{body:val};
        vl.textContent=parsed.body;
        if(query){var qw=query.toLowerCase().split(/\s+/).filter(function(w){return w.length>2;});if(qw.some(function(w){return parsed.body.toLowerCase().includes(w);}))vl.classList.add('fm-match');}
        cr.appendChild(ll); cr.appendChild(vl); cells.appendChild(cr);
      });
      card.appendChild(hdr);
      if (cats.children.length) card.appendChild(cats);
      if (cells.children.length) card.appendChild(cells);
      card.addEventListener('click',function(){window.open('../tools/spreadsheet.html#goto='+row.tabIdx+':'+row.rowIdx+':0','_blank');});
      return card;
    }

    inputEl.addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
    searchBtn.addEventListener('click',doSearch);
    clearBtn.addEventListener('click',function(){
      inputEl.value=''; _lastResults=[];
      setStatus('ready',_rows.length+' entries');
      showEmpty('Type a query above and press Search.');
    });

    EmbeddingBridge.guest(function(rows) {
      noHostEl.classList.remove('visible');
      _rows=rows;
      setStatus('waiting','Model loading\u2026');
      nav.subtitleEl.textContent='Model loading\u2026';
      showEmpty('Model loading\u2026',true);
      // Update topbar badge
      var tb=document.getElementById('fm-topbar-badge');
      var tt=document.getElementById('fm-topbar-badge-text');
      if(tb){tb.className='ds-badge ds-badge--waiting';}
      if(tt){tt.textContent=rows.length+' entries';}
      var m=new Map();
      rows.forEach(function(r){if(!r.vec)return;var cs=(r.row&&r.row.cells)?r.row.cells:(r.cells||[]);cs.forEach(function(c){if(c&&c.trim())m.set(c.trim(),r.vec);});});
      window.EmbeddingUtils=window.EmbeddingUtils||{};
      window.EmbeddingUtils.getCachedEmbedding=function(t){return Promise.resolve(m.get(t.trim())||null);};
      window.dispatchEvent(new CustomEvent('embedder-ready'));
      setTimeout(function(){window.dispatchEvent(new CustomEvent('embedding-complete',{detail:{total:rows.length}}));_ready=true;maybeEnable();},100);
    });
    window.addEventListener('bridge-no-host',function(){
      setStatus('error','No data');noHostEl.classList.add('visible');
      var tb=document.getElementById('fm-topbar-badge');
      var tt=document.getElementById('fm-topbar-badge-text');
      if(tb){tb.className='ds-badge ds-badge--disconnected';}
      if(tt){tt.textContent='No data';}
    });
    window.addEventListener('embedding-complete',function(){
      _ready=true;maybeEnable();
      var tb=document.getElementById('fm-topbar-badge');
      var tt=document.getElementById('fm-topbar-badge-text');
      if(tb){tb.className='ds-badge ds-badge--connected';}
      if(tt){tt.textContent=_rows.length+' entries live';}
    });
    injectToolNav('find-matches.html');
  </script>
</body>
</html>
