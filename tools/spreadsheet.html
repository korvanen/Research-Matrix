<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=5f3df7d8">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }

    /* ── App shell ── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    /* ── Pane: PPNavRail mounts here ── */
    #pp-ss-pane {
      flex: 1; min-height: 0;
      display: flex;
      overflow: hidden;
    }

    /* ── Sheet column: topbar + grid + tab bar ── */
    .pp-ss-sheet-col {
      flex: 1; min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Sheet grid ── */
    .sheet-area {
      flex: 1; min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: auto 1fr;
      grid-template-areas: "corner header" "cats data";
      overflow: hidden;
      background: var(--md-sys-color-background);
    }

    .corner {
      grid-area: corner;
      background: var(--md-sys-color-surface-container);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
      z-index: 3;
    }
    .header-scroll {
      grid-area: header; overflow: hidden; z-index: 2;
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
    }
    .cat-scroll {
      grid-area: cats; overflow: hidden; z-index: 1;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
    }
    .data-scroll { grid-area: data; overflow: auto; }
    .data-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .data-scroll::-webkit-scrollbar-track { background: transparent; }
    .data-scroll::-webkit-scrollbar-thumb {
      background: var(--md-sys-color-outline-variant);
      border-radius: var(--radius-full);
    }

    /* ── Tables ── */
    .sheet-table {
      border-collapse: collapse;
      font-size: var(--font-size-sm);
      font-family: var(--font-family);
    }

    #header-row th {
      background: var(--md-sys-color-surface-container);
      padding: 8px 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      text-align: left;
      white-space: nowrap;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
    }
    #header-row th:last-child { border-right: none; }

    #cat-body td {
      background: var(--md-sys-color-surface-container-low);
      padding: 10px 12px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: .03em;
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      vertical-align: middle;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 30%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
      white-space: nowrap;
    }
    #cat-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 65%, transparent);
    }
    #cat-body td.cat-rotated { text-align: center; overflow: hidden; position: relative; }
    .cat-inner {
      display: inline-block;
      transform-origin: center center;
      transform: rotate(-90deg) translateX(-50%);
      white-space: nowrap;
      position: absolute;
      left: 50%;
    }

    #data-body td {
      padding: 10px 16px;
      vertical-align: top;
      color: var(--md-sys-color-on-surface);
      line-height: 1.55;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
    }
    #data-body td:last-child { border-right: none; }
    #data-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 55%, transparent);
    }

    /* ── Row highlight / selection states ── */
    #data-body td.highlight-group, #cat-body td.highlight-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 6%, transparent);
    }
    #data-body td.highlight-cell, #cat-body td.highlight-cell, #header-row th.highlight-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
    }
    #data-body td.selected-group, #cat-body td.selected-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 10%, transparent);
    }
    #data-body td.selected-cell, #cat-body td.selected-cell, #header-row th.selected-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
      outline: 2px solid var(--md-sys-color-primary);
      outline-offset: -2px;
    }

    /* ── Tab bar ── */
    .pp-ss-bottombar {
      flex-shrink: 0;
      height: 34px;
      display: flex;
      align-items: stretch;
      background: var(--md-sys-color-surface);
      border-top: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 60%, transparent);
      z-index: 10;
    }
    .tab-bar {
      display: flex; align-items: stretch;
      flex: 1; overflow-x: auto; overflow-y: hidden;
      padding: 0 8px; gap: 2px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center;
      padding: 0 14px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-caps);
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer; white-space: nowrap;
      border-radius: var(--radius-xs) var(--radius-xs) 0 0;
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .tab:hover {
      background: color-mix(in srgb, var(--md-sys-color-on-surface) 6%, transparent);
      color: var(--md-sys-color-on-surface);
    }
    .tab.active {
      color: var(--md-sys-color-primary);
      font-weight: var(--font-weight-bold);
      box-shadow: inset 0 -2px 0 var(--md-sys-color-primary);
    }

    /* ── Loading overlay ── */
    .loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--md-sys-color-background);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-caps);
      color: var(--md-sys-color-on-surface-variant);
      z-index: 30;
    }

    /* ── Override PPNavRail subtitle to show sheet name nicely ── */
    .pp-panel-subtitle {
      font-size: var(--font-size-sm) !important;
      font-weight: var(--font-weight-medium) !important;
      color: var(--md-sys-color-on-surface) !important;
      letter-spacing: 0 !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="pp-ss-pane"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-shared.js?v=f448e658"></script>
  <script src="../utilities/utils-keywords.js?v=1a2b3c4d"></script>
  <script src="../utilities/embedding-bridge.js?v=1a2b3c4d"></script>
  <script src="../utilities/utils-spreadsheet.js?v=0de0205d"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=1a2b3c4d"></script>
  <script>
    (function () {
      var paneEl = document.getElementById('pp-ss-pane');
      if (!paneEl || !window.PPNavRail) return;

      // ── Build nav rail + side panel ──────────────────────────
      var nav = window.PPNavRail.create(paneEl, {
        toolName: 'Spreadsheet',
        panelSections: [
          {
            label: 'Sheet',
            html: '<div id="pp-ss-panel-tabs"></div>',
          },
        ],
      });

      // Sheet name goes in the subtitle slot
      nav.subtitleEl.id = 'topbar-sheet-name';
      nav.subtitleEl.classList.add('pp-panel-subtitle');

      // Status slot — loading indicator
      nav.statusEl.innerHTML =
        '<div id="pp-ss-status" style="display:inline-flex;align-items:center;gap:6px;' +
        'padding:4px 8px;border-radius:var(--radius-full);border:1px solid var(--md-sys-color-outline-variant);' +
        'font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;' +
        'background:color-mix(in srgb,var(--md-sys-color-on-surface) 5%,transparent);' +
        'color:var(--md-sys-color-on-surface-variant);width:fit-content;">' +
        '<span id="pp-ss-status-dot" style="width:6px;height:6px;border-radius:50%;' +
        'background:var(--md-sys-color-outline);animation:pp-ss-pulse 1.2s ease-in-out infinite;flex-shrink:0;"></span>' +
        '<span id="pp-ss-status-label">Loading\u2026</span>' +
        '</div>' +
        '<style>@keyframes pp-ss-pulse{0%,100%{opacity:.3;transform:scale(.85);}50%{opacity:1;transform:scale(1.1);}}</style>';

      // ── Build sheet grid inside nav.mainEl ───────────────────
      nav.mainEl.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;';
      nav.mainEl.innerHTML =
        '<div class="sheet-area">' +
          '<div class="loading-overlay" id="loading-overlay">Loading\u2026</div>' +
          '<div class="corner" id="corner"></div>' +
          '<div class="header-scroll" id="header-scroll">' +
            '<table class="sheet-table" id="header-table">' +
              '<thead><tr id="header-row"></tr></thead>' +
            '</table>' +
          '</div>' +
          '<div class="cat-scroll" id="cat-scroll">' +
            '<table class="sheet-table" id="cat-table">' +
              '<tbody id="cat-body"></tbody>' +
            '</table>' +
          '</div>' +
          '<div class="data-scroll" id="data-scroll">' +
            '<table class="sheet-table" id="data-table">' +
              '<tbody id="data-body"></tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="pp-ss-bottombar">' +
          '<div class="tab-bar" id="tab-bar"></div>' +
        '</div>';

      // ── Wire tab panel in side panel to mirror the bottom tab bar ──
      // After utils-spreadsheet loads tabs, mirror them into the panel list
      var panelTabs = document.getElementById('pp-ss-panel-tabs');
      var tabBar    = document.getElementById('tab-bar');
      if (panelTabs && tabBar) {
        var tabObserver = new MutationObserver(function () {
          var tabs = Array.from(tabBar.querySelectorAll('.tab'));
          if (!tabs.length) return;
          panelTabs.innerHTML = '';
          tabs.forEach(function (tab) {
            var btn = document.createElement('button');
            btn.style.cssText =
              'display:block;width:100%;text-align:left;border:none;background:transparent;' +
              'padding:6px 8px;border-radius:var(--radius-sm);cursor:pointer;' +
              'font-size:var(--font-size-xs);font-weight:var(--font-weight-medium);' +
              'letter-spacing:var(--letter-spacing-caps);text-transform:uppercase;' +
              'color:var(--md-sys-color-on-surface-variant);' +
              'transition:background var(--transition-fast),color var(--transition-fast);';
            btn.textContent = tab.textContent;
            if (tab.classList.contains('active')) {
              btn.style.color = 'var(--md-sys-color-primary)';
              btn.style.background = 'color-mix(in srgb,var(--md-sys-color-primary) 10%,transparent)';
            }
            btn.addEventListener('mouseover', function () {
              if (!tab.classList.contains('active')) btn.style.background = 'color-mix(in srgb,var(--md-sys-color-on-surface) 6%,transparent)';
            });
            btn.addEventListener('mouseout', function () {
              if (!tab.classList.contains('active')) btn.style.background = 'transparent';
            });
            btn.addEventListener('click', function () { tab.click(); });
            panelTabs.appendChild(btn);
          });
        });
        tabObserver.observe(tabBar, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
      }

      // ── Inject tool nav icons ─────────────────────────────────
      injectToolNav('spreadsheet.html');
    })();
  </script>
</body>
</html>
