<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=5f3df7d8">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    #topbar {
      display: flex; align-items: stretch;
      height: var(--topbar-height, 44px);
      flex-shrink: 0;
      background: var(--md-sys-color-surface);
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 60%, transparent);
      z-index: 20;
    }
    .topbar-back {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      text-decoration: none;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 60%, transparent);
      flex-shrink: 0;
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .topbar-back:hover {
      color: var(--md-sys-color-on-surface);
      background: color-mix(in srgb, var(--md-sys-color-on-surface) 5%, transparent);
    }
    #topbar-title {
      display: flex; align-items: center;
      padding: 0 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 60%, transparent);
      flex-shrink: 0;
      white-space: nowrap;
    }
    #topbar-sheet-name {
      display: flex; align-items: center;
      padding: 0 16px;
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      color: var(--md-sys-color-on-surface);
      flex: 1; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .sheet-area {
      flex: 1; min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: auto 1fr;
      grid-template-areas: "corner header" "cats data";
      overflow: hidden;
    }
    .corner {
      grid-area: corner;
      background: var(--md-sys-color-surface-container);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
      z-index: 3;
    }
    .header-scroll {
      grid-area: header; overflow: hidden; z-index: 2;
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
    }
    .cat-scroll {
      grid-area: cats; overflow: hidden; z-index: 1;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
    }
    .data-scroll { grid-area: data; overflow: auto; }
    .data-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .data-scroll::-webkit-scrollbar-track { background: var(--md-sys-color-background); }
    .data-scroll::-webkit-scrollbar-thumb { background: var(--md-sys-color-outline-variant); border-radius: var(--radius-full); }

    .sheet-table { border-collapse: collapse; font-size: var(--font-size-sm); font-family: var(--font-family); }

    #header-row th {
      background: var(--md-sys-color-surface-container);
      padding: 10px 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      text-align: left; white-space: nowrap;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
    }
    #header-row th:last-child { border-right: none; }

    #cat-body td {
      background: var(--md-sys-color-surface-container-low);
      padding: 10px 12px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: .03em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      vertical-align: middle;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 30%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
      white-space: nowrap;
    }
    #cat-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 65%, transparent);
    }
    #cat-body td.cat-rotated { text-align: center; overflow: hidden; position: relative; }
    .cat-inner {
      display: inline-block;
      transform-origin: center center;
      transform: rotate(-90deg) translateX(-50%);
      white-space: nowrap; position: absolute; left: 50%;
    }

    #data-body td {
      padding: 10px 16px;
      vertical-align: top;
      color: var(--md-sys-color-on-surface);
      line-height: 1.55;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
    }
    #data-body td:last-child { border-right: none; }
    #data-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 55%, transparent);
    }

    #data-body td.highlight-group, #cat-body td.highlight-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 6%, transparent);
    }
    #data-body td.highlight-cell, #cat-body td.highlight-cell, #header-row th.highlight-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
    }
    #data-body td.selected-group, #cat-body td.selected-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 10%, transparent);
    }
    #data-body td.selected-cell, #cat-body td.selected-cell, #header-row th.selected-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
      outline: 2px solid var(--md-sys-color-primary);
      outline-offset: -2px;
    }

    .bottombar {
      flex-shrink: 0; height: 36px;
      display: flex; align-items: stretch;
      background: var(--md-sys-color-surface);
      border-top: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 60%, transparent);
      z-index: 10;
    }
    .tab-bar {
      display: flex; align-items: stretch;
      flex: 1; overflow-x: auto; overflow-y: hidden;
      padding: 0 8px; gap: 2px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: flex; align-items: center;
      padding: 0 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer; white-space: nowrap;
      border-radius: var(--radius-xs) var(--radius-xs) 0 0;
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .tab:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 6%, transparent); color: var(--md-sys-color-on-surface); }
    .tab.active {
      color: var(--md-sys-color-primary);
      font-weight: var(--font-weight-bold);
      box-shadow: inset 0 -2px 0 var(--md-sys-color-primary);
    }

    .loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--md-sys-color-background);
      font-size: var(--font-size-sm);
      color: var(--md-sys-color-on-surface-variant);
      z-index: 30;
    }
  </style>
</head>
<body>
  <div class="app-shell">

    <div id="topbar">
      <a class="topbar-back" href="../index.html">
        <svg viewBox="0 0 14 14" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

        </svg>
        Back
      </a>
      <div id="topbar-title">Dimensional Framework</div>
      <div id="topbar-sheet-name"></div>

      <a class="pp-nav-item active" href="spreadsheet.html" title="Spreadsheet">
        <svg viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="1.5" width="15" height="15" rx="2"/><line x1="1.5" y1="6.5" x2="16.5" y2="6.5"/><line x1="1.5" y1="11.5" x2="16.5" y2="11.5"/><line x1="7" y1="6.5" x2="7" y2="16.5"/><line x1="12" y1="6.5" x2="12" y2="16.5"/></svg>

    <div class="sheet-area">
      <div class="loading-overlay" id="loading-overlay">Loading…</div>
      <div class="corner"        id="corner"></div>

        <table class="sheet-table" id="header-table">
          <thead><tr id="header-row"></tr></thead>

      <div class="cat-scroll" id="cat-scroll">

    <div class="bottombar">
      <div class="tab-bar" id="tab-bar"></div>
