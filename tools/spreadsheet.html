<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spreadsheet — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=5f3df7d8">
  <style>
    html, body { height: 100%; overflow: hidden; margin: 0; }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh; height: 100dvh;
      overflow: hidden;
    }

    #pp-ss-pane {
      flex: 1; min-height: 0;
      display: flex;
      overflow: hidden;
    }

    .sheet-area {
      flex: 1; min-height: 0;
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: auto 1fr;
      grid-template-areas: "corner header" "cats data";
      overflow: hidden;
      background: var(--md-sys-color-background);
    }

    .corner {
      grid-area: corner;
      background: var(--md-sys-color-surface-container);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
      z-index: 3;
    }
    .header-scroll {
      grid-area: header; overflow: hidden; z-index: 2;
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 70%, transparent);
    }
    .cat-scroll {
      grid-area: cats; overflow: hidden; z-index: 1;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 50%, transparent);
    }
    .data-scroll { grid-area: data; overflow: auto; }
    .data-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .data-scroll::-webkit-scrollbar-track { background: transparent; }
    .data-scroll::-webkit-scrollbar-thumb {
      background: var(--md-sys-color-outline-variant);
      border-radius: var(--radius-full);
    }

    .sheet-table {
      border-collapse: collapse;
      font-size: var(--font-size-sm);
      font-family: var(--font-family);
    }

    .corner table { border-collapse: collapse; width: 100%; height: 100%; }
    .corner th {
      background: var(--md-sys-color-surface-container);
      padding: 8px 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      text-align: left; white-space: nowrap;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
      height: 100%; vertical-align: middle;
    }
    .corner th:last-child { border-right: none; }
      background: var(--md-sys-color-surface-container);
      padding: 8px 16px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-caps);
      text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      text-align: left; white-space: nowrap;
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
    }
    #header-row th:last-child { border-right: none; }

    #cat-body td {
      background: var(--md-sys-color-surface-container-low);
      padding: 10px 12px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: .03em; text-transform: uppercase;
      color: var(--md-sys-color-on-surface-variant);
      vertical-align: middle;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 30%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 40%, transparent);
      white-space: nowrap;
    }
    #cat-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 65%, transparent);
    }
    #cat-body td.cat-rotated { text-align: center; overflow: hidden; position: relative; }
    .cat-inner {
      display: inline-block;
      transform-origin: center center;
      transform: rotate(-90deg) translateX(-50%);
      white-space: nowrap; position: absolute; left: 50%;
    }

    #data-body td {
      padding: 10px 16px;
      vertical-align: top;
      color: var(--md-sys-color-on-surface);
      line-height: 1.55;
      border-bottom: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 25%, transparent);
    }
    #data-body td:last-child { border-right: none; }
    #data-body td.group-end {
      border-bottom: 2px solid color-mix(in srgb, var(--md-sys-color-outline-variant) 55%, transparent);
    }

    #data-body td.highlight-group, #cat-body td.highlight-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 6%, transparent);
    }
    #data-body td.highlight-cell, #cat-body td.highlight-cell, #header-row th.highlight-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 12%, transparent);
    }
    #data-body td.selected-group, #cat-body td.selected-group {
      background: color-mix(in srgb, var(--md-sys-color-primary) 10%, transparent);
    }
    #data-body td.selected-cell, #cat-body td.selected-cell, #header-row th.selected-cell {
      background: color-mix(in srgb, var(--md-sys-color-primary) 18%, transparent);
      outline: 2px solid var(--md-sys-color-primary);
      outline-offset: -2px;
    }

    /* ── MD3 Secondary Tab Bar — 48px height, 2px active indicator ── */
    .pp-ss-bottombar {
      flex-shrink: 0; height: 48px;
      display: flex; align-items: stretch;
      background: var(--md-sys-color-surface);
      border-top: 1px solid var(--md-sys-color-outline-variant);
      z-index: 10;
    }
    .tab-bar {
      display: flex; align-items: stretch;
      flex: 1; overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 90px; padding: 0 16px;
      font-family: var(--font-family);
      font-size: 14px; font-weight: 500; letter-spacing: .00625em;
      color: var(--md-sys-color-on-surface-variant);
      cursor: pointer; white-space: nowrap;
      border: none; background: transparent;
      position: relative; overflow: hidden;
      transition: color var(--transition-fast);
      -webkit-tap-highlight-color: transparent;
    }
    .tab::before {
      content: ''; position: absolute; inset: 0;
      background: var(--md-sys-color-on-surface);
      opacity: 0; transition: opacity var(--transition-fast);
    }
    .tab:hover::before  { opacity: .08; }
    .tab:active::before { opacity: .12; }
    .tab::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px; border-radius: 3px 3px 0 0;
      background: transparent;
      transition: background var(--transition-fast);
    }
    .tab.active { color: var(--md-sys-color-primary); }
    .tab.active::after { background: var(--md-sys-color-primary); }

    .loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--md-sys-color-background);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-medium);
      letter-spacing: var(--letter-spacing-caps);
      color: var(--md-sys-color-on-surface-variant);
      z-index: 30;
    }

    /* Panel tab list */
    /* MD3 List Item — panel tab buttons */
    .pp-ss-panel-tab-btn {
      display: flex; align-items: center;
      width: 100%; min-height: 40px;
      padding: 0 16px; gap: 12px;
      border: none; background: transparent;
      font-family: var(--font-family);
      font-size: 14px; font-weight: 400; letter-spacing: .015em;
      color: var(--md-sys-color-on-surface);
      cursor: pointer; text-align: left;
      position: relative; overflow: hidden;
      transition: color var(--transition-fast);
    }
    .pp-ss-panel-tab-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--md-sys-color-on-surface);
      opacity: 0; transition: opacity var(--transition-fast);
    }
    .pp-ss-panel-tab-btn:hover::before  { opacity: .08; }
    .pp-ss-panel-tab-btn:active::before { opacity: .12; }
    .pp-ss-panel-tab-btn.active {
      color: var(--md-sys-color-on-secondary-container);
      background: var(--md-sys-color-secondary-container);
    }
    .pp-ss-panel-tab-btn.active::before { background: var(--md-sys-color-on-secondary-container); }

    @keyframes pp-ss-pulse {
      0%, 100% { opacity: .3; transform: scale(.85); }
      50%       { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="pp-ss-pane"></div>
  </div>

  <!-- Load shared utils first so PPNavRail is available -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-shared.js?v=md3-1"></script>
  <script src="../utilities/utils-keywords.js?v=1a2b3c4d"></script>
  <script src="../utilities/embedding-bridge.js?v=1a2b3c4d"></script>

  <!-- Build the PPNavRail DOM BEFORE utils-spreadsheet.js runs so all
       elements (#data-scroll, #header-row, etc.) exist when it queries them -->
  <script>
    (function () {
      var paneEl = document.getElementById('pp-ss-pane');
      if (!paneEl || !window.PPNavRail) return;

      var nav = window.PPNavRail.create(paneEl, {
        toolName: 'Spreadsheet',
        panelSections: [
          {
            label: 'Sheets',
            html: '<div id="pp-ss-panel-tabs" style="display:flex;flex-direction:column;gap:2px;"></div>',
          },
        ],
      });

      // Subtitle = sheet name (utils-spreadsheet writes here)
      nav.subtitleEl.id = 'topbar-sheet-name';
      nav.subtitleEl.style.cssText += ';font-size:var(--font-size-sm);font-weight:var(--font-weight-medium);color:var(--md-sys-color-on-surface);letter-spacing:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

      // Status chip
      nav.statusEl.innerHTML =
        '<div id="pp-ss-status" style="display:inline-flex;align-items:center;gap:6px;' +
          'padding:4px 8px;border-radius:var(--radius-full);width:fit-content;' +
          'border:1px solid var(--md-sys-color-outline-variant);' +
          'font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;' +
          'background:color-mix(in srgb,var(--md-sys-color-on-surface) 5%,transparent);' +
          'color:var(--md-sys-color-on-surface-variant);">' +
          '<span style="width:6px;height:6px;border-radius:50%;flex-shrink:0;' +
            'background:var(--md-sys-color-outline);animation:pp-ss-pulse 1.2s ease-in-out infinite;"></span>' +
          '<span id="pp-ss-status-label">Loading\u2026</span>' +
        '</div>';

      // Build sheet grid + bottombar inside mainEl
      nav.mainEl.style.cssText = 'display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;';
      nav.mainEl.innerHTML =
        '<div class="sheet-area">' +
          '<div class="loading-overlay" id="loading-overlay">Loading\u2026</div>' +
          '<div class="corner" id="corner"></div>' +
          '<div class="header-scroll" id="header-scroll">' +
            '<table class="sheet-table" id="header-table"><thead><tr id="header-row"></tr></thead></table>' +
          '</div>' +
          '<div class="cat-scroll" id="cat-scroll">' +
            '<table class="sheet-table" id="cat-table"><tbody id="cat-body"></tbody></table>' +
          '</div>' +
          '<div class="data-scroll" id="data-scroll">' +
            '<table class="sheet-table" id="data-table"><tbody id="data-body"></tbody></table>' +
          '</div>' +
        '</div>' +
        '<div class="pp-ss-bottombar"><div class="tab-bar" id="tab-bar"></div></div>';

      // Mirror bottom tabs into side panel via MutationObserver
      var panelTabs = document.getElementById('pp-ss-panel-tabs');
      var tabBar    = document.getElementById('tab-bar');
      if (panelTabs && tabBar) {
        function syncPanelTabs() {
          var tabs = Array.from(tabBar.querySelectorAll('.tab'));
          if (!tabs.length) return;
          panelTabs.innerHTML = '';
          tabs.forEach(function (tab) {
            var btn = document.createElement('button');
            btn.className = 'pp-ss-panel-tab-btn' + (tab.classList.contains('active') ? ' active' : '');
            btn.textContent = tab.textContent;
            btn.addEventListener('click', function () { tab.click(); });
            panelTabs.appendChild(btn);
          });
        }
        new MutationObserver(syncPanelTabs)
          .observe(tabBar, { childList: true, subtree: true, attributes: true, attributeFilter: ['class'] });
      }

      // Inject tool nav icons into the rail
      injectToolNav('spreadsheet.html');
    })();
  </script>

  <!-- Now safe to load utils-spreadsheet — all DOM elements exist -->
  <script src="../utilities/utils-spreadsheet.js?v=1a2b3c4d"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=1a2b3c4d"></script>
</body>
</html>
