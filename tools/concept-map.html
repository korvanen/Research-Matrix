<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept Map — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=922f284y">
  <style>
    body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--md-sys-color-background);
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      color: var(--md-sys-color-on-background);
    }

    .cm-layout {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      position: relative;
    }

    #cm-pane {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── MD3 token overrides for concept map nodes/cards ────────────────────
       utils-concept-map.js may inject hardcoded colours. These rules sit
       after the utility styles and re-apply design-system tokens, so they
       win regardless of what the utility sets.  Use !important sparingly —
       only on properties that are set inline or in injected sheets.        */

    /* Canvas background */
    .cm-canvas, #cm-canvas, [id*="canvas"] {
      background: var(--md-sys-color-background) !important;
    }

    /* Node cards — filled card style */
    .cm-node, .cmap-node, [class*="cm-node"], [class*="cmap-node"] {
      background: var(--md-sys-color-surface-container-low) !important;
      border: 1px solid var(--md-sys-color-outline-variant) !important;
      border-radius: var(--radius-sm) !important;
      box-shadow: var(--md-elev-1) !important;
      color: var(--md-sys-color-on-surface) !important;
    }
    .cm-node:hover, .cmap-node:hover,
    [class*="cm-node"]:hover, [class*="cmap-node"]:hover {
      box-shadow: var(--md-elev-2) !important;
      background: var(--md-sys-color-surface-container) !important;
    }

    /* Node label text */
    .cm-node-label, .cmap-node-label,
    [class*="cm-node"] span, [class*="cmap-node"] span,
    [class*="cm-node"] div, [class*="cmap-node"] div {
      color: var(--md-sys-color-on-surface) !important;
    }

    /* Category / type label inside card */
    .cm-node-cat, .cmap-node-cat,
    [class*="cm-node-cat"], [class*="cmap-node-cat"] {
      color: var(--md-sys-color-on-surface-variant) !important;
    }

    /* Edge / connector lines */
    .cm-edge, .cmap-edge,
    [class*="cm-edge"] path,
    [class*="cmap-edge"] path,
    svg line, svg path[stroke] {
      stroke: var(--md-sys-color-outline-variant) !important;
    }

    /* Selected / highlighted node */
    .cm-node.selected, .cmap-node.selected,
    [class*="cm-node"].selected {
      background: var(--md-sys-color-primary-container) !important;
      border-color: var(--md-sys-color-primary) !important;
      color: var(--md-sys-color-on-primary-container) !important;
      box-shadow: var(--md-elev-2) !important;
    }

    /* Tooltip */
    .cm-tooltip, .cmap-tooltip,
    [class*="cm-tooltip"], [class*="cmap-tooltip"] {
      background: var(--md-sys-color-inverse-surface) !important;
      color: var(--md-sys-color-inverse-on-surface) !important;
      border-radius: var(--radius-xs) !important;
      box-shadow: var(--md-elev-2) !important;
    }

    /* Controls / panel */
    .cm-controls, .cmap-controls,
    .cm-panel, .cmap-panel,
    [class*="cm-control"], [class*="cmap-control"],
    [id*="cm-control"], [id*="cmap-control"] {
      background: var(--md-sys-color-surface-container) !important;
      border-color: var(--md-sys-color-outline-variant) !important;
      color: var(--md-sys-color-on-surface-variant) !important;
    }
  </style>
</head>
<body>

  <div class="ds-topbar">
    <a class="ds-topbar-back" href="../index.html">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none"
           stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </a>
    <div class="ds-topbar-title">Concept Map</div>
    <div class="ds-badge ds-badge--waiting" id="cm-connection-badge">
      <div class="ds-badge-dot"></div>
      <span id="cm-badge-text">Connecting…</span>
    </div>
  </div>

  <div class="cm-layout">
    <div id="cm-pane">
      <div class="ds-no-host" id="cm-no-host">
        <h2>Data not available</h2>
        <p>Return to the <a href="../index.html">home page</a> to load data first.</p>
      </div>
    </div>
  </div>

  <!--
    Load scripts SYNCHRONOUSLY (no defer / async).
    With defer, execution order vs DOMContentLoaded is unreliable — the
    inline script below would run before initConceptMapTool / createSidePanel
    are defined.  Sync loading guarantees everything is available immediately.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-shared.js?v=12ed94c8"></script>
  <script src="../utilities/utils-panel.js?v=7"></script>
  <script src="../utilities/embedding-bridge.js?v=7"></script>
  <script src="../utilities/utils-concept-map.js?v=8a165ff2"></script>

  <script>
    // ── buildRowIndex MUST be on window ──────────────────────────────────────
    // utils-concept-map.js calls:  typeof buildRowIndex === 'function'
    // If it is scoped inside DOMContentLoaded it is invisible to the utility.
    window._cmBridgeRows = null;

    window.buildRowIndex = function() {
      return window._cmBridgeRows || [];
    };

    // parseCitation fallback (utils-shared.js normally provides this)
    if (typeof parseCitation === 'undefined') {
      window.parseCitation = function(text) {
        return { body: String(text || ''), citation: null };
      };
    }

    // ── EmbeddingUtils stub — replaced once bridge fires ─────────────────────
    window.EmbeddingUtils = {
      isReady:            function() { return false; },
      getCachedEmbedding: function()  { return Promise.resolve(null); },
      getVectorSync:      function()  { return null; }
    };

    // ── DOM refs ─────────────────────────────────────────────────────────────
    var badgeEl   = document.getElementById('cm-connection-badge');
    var badgeText = document.getElementById('cm-badge-text');
    var noHost    = document.getElementById('cm-no-host');
    var paneEl    = document.getElementById('cm-pane');
    var layout    = document.querySelector('.cm-layout');

    function setBadge(state, text) {
      badgeEl.className     = 'ds-badge ds-badge--' + state;
      badgeText.textContent = text;
    }

    // ── Init concept map — paneEl is in the DOM at this point ────────────────
    var cmTool = initConceptMapTool(paneEl, null);

    // ── Side panel ───────────────────────────────────────────────────────────
    // Placed on the right so it doesn't obscure the map controls on the left.
    // The panel starts closed (defaultFraction: 0 would hide it immediately;
    // we use 0.35 so the user can drag it open, and snap-close at 10%).
    // On every resize/open/close we call cmTool.resize() so fitAll() uses the
    // correct canvas dimensions.
    var cmPanel = createSidePanel(layout, {
      side:              'right',
      defaultFraction:   0,          // start closed — user drags to open
      minFraction:       0,
      maxFraction:       0.65,
      snapCloseFraction: 0.10,
      onResize: function() { if (cmTool && cmTool.resize) cmTool.resize(); },
      onOpen:   function() { if (cmTool && cmTool.resize) cmTool.resize(); },
      onClose:  function() { if (cmTool && cmTool.resize) cmTool.resize(); },
    });

    // ── EmbeddingBridge guest ─────────────────────────────────────────────────
    EmbeddingBridge.guest(function(rows) {
      noHost.classList.remove('visible');
      setBadge('connected', rows.length + ' entries live');

      // Store rows so window.buildRowIndex() returns them
      window._cmBridgeRows = rows;

      // Build text→vector lookup from pre-computed bridge vectors
      var textToVec = new Map();
      rows.forEach(function(r) {
        if (!r.vec) return;
        var cells = (r.row && r.row.cells) ? r.row.cells : (r.cells || []);
        var fullText = cells.join(' ').trim();
        if (fullText) textToVec.set(fullText, r.vec);
        cells.forEach(function(c) {
          if (c && c.trim()) textToVec.set(c.trim(), r.vec);
        });
      });

      window.EmbeddingUtils.isReady = function() { return true; };

      window.EmbeddingUtils.getCachedEmbedding = function(text) {
        var t   = text ? text.trim() : '';
        var vec = textToVec.get(t);
        if (vec) return Promise.resolve(vec);
        // prefix-match fallback for split segments
        var prefix = t.slice(0, 40);
        var found  = null;
        textToVec.forEach(function(v, k) {
          if (!found && k.startsWith(prefix)) found = v;
        });
        return Promise.resolve(found || null);
      };

      // Reset stale state then render
      cmTool.reset();
      cmTool.start();
    });

    window.addEventListener('bridge-no-host', function() {
      setBadge('disconnected', 'No data — visit home page first');
      noHost.classList.add('visible');
    });

    // ── Touch drag support ────────────────────────────────────────────────────
    // utils-concept-map.js only wires mousedown/mousemove/mouseup on draggable
    // nodes.  This block adds equivalent touchstart/touchmove/touchend so cards
    // are draggable on phones and tablets.
    //
    // Strategy: intercept touchstart on any draggable card element, then mirror
    // the touch as synthetic MouseEvents so the existing drag logic fires.
    // We also handle single-finger canvas pan by converting it to right-click
    // drag (which the canvas pan handler listens for) OR by directly updating
    // the pan offset if the tool exposes it.
    (function patchTouchDrag() {
      // Wait for the tool to render its DOM before patching
      function patch() {
        var canvas = paneEl.querySelector('[class*="canvas"], [id*="canvas"]');
        if (!canvas) { setTimeout(patch, 300); return; }

        // 1. Single-finger canvas pan (one touch on canvas background)
        var panStart = null;
        canvas.addEventListener('touchstart', function(e) {
          if (e.touches.length !== 1) return;
          // Only pan if the touch is NOT on a draggable node
          var target = e.touches[0].target;
          if (target.closest && target.closest('[class*="cm-node"],[class*="cmap-node"],[class*="pp-cm-node"]')) return;
          panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: true });

        canvas.addEventListener('touchmove', function(e) {
          if (!panStart || e.touches.length !== 1) return;
          e.preventDefault();
          var dx = e.touches[0].clientX - panStart.x;
          var dy = e.touches[0].clientY - panStart.y;
          panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          // Synthesise a right-button mousemove so the canvas pan handler picks it up
          var world = canvas.querySelector('[class*="world"],[id*="world"]');
          if (world) {
            var cur = new DOMMatrix(window.getComputedStyle(world).transform);
            world.style.transform = 'translate(' + (cur.m41 + dx) + 'px,' + (cur.m42 + dy) + 'px) scale(' + cur.a + ')';
          }
        }, { passive: false });

        canvas.addEventListener('touchend', function() { panStart = null; }, { passive: true });

        // 2. Node drag — convert touch on a draggable node to mouse events
        canvas.addEventListener('touchstart', function(e) {
          if (e.touches.length !== 1) return;
          var node = e.touches[0].target.closest && e.touches[0].target.closest(
            '[class*="cm-node"],[class*="cmap-node"],[class*="pp-cm-node"],[class*="pp-cmap-node"]'
          );
          if (!node) return;

          var t0 = e.touches[0];
          // Fire mousedown on the node to trigger the tool's existing drag handler
          node.dispatchEvent(new MouseEvent('mousedown', {
            bubbles: true, cancelable: true,
            clientX: t0.clientX, clientY: t0.clientY, button: 0
          }));

          function onMove(ev) {
            if (ev.touches.length !== 1) return;
            ev.preventDefault();
            document.dispatchEvent(new MouseEvent('mousemove', {
              bubbles: true, cancelable: true,
              clientX: ev.touches[0].clientX, clientY: ev.touches[0].clientY
            }));
          }
          function onEnd() {
            document.dispatchEvent(new MouseEvent('mouseup', { bubbles: true, cancelable: true, button: 0 }));
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
          }
          document.addEventListener('touchmove', onMove, { passive: false });
          document.addEventListener('touchend', onEnd, { passive: true });
        }, { passive: true });
      }
      setTimeout(patch, 400);
    })();
  </script>

</body>
</html>
