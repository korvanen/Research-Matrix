<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Concept Map — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=9fa06a28">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-keywords.js?v=7"></script>
  <script src="../utilities/utils-shared.js?v=425998b6"></script>
  <script src="../utilities/utils-synthesis.js?v=b4058e56"></script>
  <script src="../utilities/utils-panel.js?v=7"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
    body {
      display: flex; flex-direction: column;
      background: var(--md-sys-color-background);
      font-family: var(--font-family);
      color: var(--md-sys-color-on-background);
    }

    /* ── Topbar ── */

    /* ── Body ── */
    .cm-body { flex: 1; min-height: 0; display: flex; overflow: hidden; position: relative; }

    /* ── Main pane (canvas injected by utils-concept-map.js) ── */
    #cm-pane {
      flex: 1; min-width: 0; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }

    /* Principle badge */
    .cm-principle-badge {
      display: inline-block; font-size: 9px; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 10px; margin-top: 4px;
      background: rgba(255,255,255,.2); color: #fff;
    }

    /* ── Panel controls ── */
    .cm-panel-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); padding: 8px 0 4px; }
    .cm-panel-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; height: 30px; border-radius: 15px; border: none; cursor: pointer;
      font-family: var(--font-family); font-size: 12px; font-weight: 500; margin-bottom: 5px;
    }
    .cm-panel-btn-primary { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    .cm-panel-btn-ghost   { background: transparent; color: var(--md-sys-color-on-surface-variant); border: 1px solid var(--md-sys-color-outline-variant); }
    .cm-panel-btn:disabled { opacity: .38; cursor: not-allowed; }
    .cm-layout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 2px 0 6px; }
    .cm-layout-btn {
      height: 26px; border-radius: 4px; border: 1px solid var(--md-sys-color-outline-variant);
      background: transparent; font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--md-sys-color-on-surface-variant); transition: all .12s;
    }
    .cm-layout-btn.active {
      background: var(--md-sys-color-secondary-container);
      color: var(--md-sys-color-on-secondary-container); border-color: transparent;
    }
    .cm-legend { padding: 4px 0 6px; display: flex; flex-direction: column; gap: 4px; }
    .cm-legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--md-sys-color-on-surface-variant); }
    .cm-legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cm-principle-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .cm-legend-line { width: 18px; height: 2px; background: var(--md-sys-color-outline); flex-shrink: 0; border-radius: 1px; }
  </style>
</head>
<body>

  <div class="cm-body" id="cm-body">
    <!-- PPNavRail + pane injected here -->
  </div>

  <script>
  (function(){
    var SY = window.SynthesisData;
    if (!SY) { document.body.innerHTML = '<p style="padding:24px">utils-synthesis.js not loaded.</p>'; return; }

    // ── State ────────────────────────────────────────────────────────────────
    var _emb       = new Map();   // "tabIdx:rowIdx" → Float32Array  (TAB rows)
    var _princVecs = new Map();   // principleId → Float32Array centroid
    var _textToVec = new Map();   // cellText → Float32Array (lookup for getCachedEmbedding)
    var _embReady  = false;
    var _embedding = false;
    var _cmTool    = null;
    var _lastInitTime = 0; // timestamp of last _initConceptMap() call
    var _observer  = null;

    function _h(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Panel HTML ────────────────────────────────────────────────────────────
    var _globalHtml = window.GlobalPanel.html();

    var _toolHtml =
      '<div class="cm-panel-label">Hierarchy depth</div>' +
      '<div class="pp-range-row">' +
        '<input type="range" class="pp-range" id="cm-depth-slider" min="1" max="8" value="5" step="1">' +
        '<span class="pp-range-val" id="cm-depth-val">5</span>' +
      '</div>' +
      '<div class="cm-panel-label">Edge threshold</div>' +
      '<div class="pp-range-row">' +
        '<input type="range" class="pp-range" id="cm-edge-slider" min="20" max="90" value="50" step="5">' +
        '<span class="pp-range-val" id="cm-edge-val">50%</span>' +
      '</div>' +
      '<div class="cm-panel-label">Max parents</div>' +
      '<div class="pp-range-row">' +
        '<input type="range" class="pp-range" id="cm-maxpar-slider" min="1" max="6" value="1" step="1">' +
        '<span class="pp-range-val" id="cm-maxpar-val">1</span>' +
      '</div>' +
      '<div class="cm-panel-label">Layout</div>' +
      '<div class="cm-layout-grid" id="cm-layout-grid">' +
        ['hflow','vflow','htree','vtree','radial','circle','organic'].map(function(l){
          var labels = {hflow:'H Flow',vflow:'V Flow',htree:'H Tree',vtree:'V Tree',radial:'Radial',circle:'Circle',organic:'Organic'};
          return '<button class="cm-layout-btn'+(l==='organic'?' active':'')+'" data-layout="'+l+'">'+labels[l]+'</button>';
        }).join('') +
      '</div>' +
      '<button class="cm-panel-btn cm-panel-btn-primary" id="cm-rebuild-btn" style="margin-top:4px">Rebuild map</button>' +
      '<div class="cm-panel-label">Legend</div>' +
      '<div class="cm-legend" id="cm-legend">' +
        '<div class="cm-legend-item"><span class="cm-principle-dot" style="background:var(--md-sys-color-primary)"></span> Named principle</div>' +
        '<div class="cm-legend-item"><div class="cm-legend-dot" style="background:var(--md-sys-color-surface-container-high);border:1px solid var(--md-sys-color-outline-variant)"></div> Unassigned entry</div>' +
        '<div class="cm-legend-item"><div class="cm-legend-line"></div> Semantic edge</div>' +
      '</div>';

    // ── Nav rail ──────────────────────────────────────────────────────────────
    var _paneEl = document.getElementById('cm-body');
    var _nav = window.PPNavRail.create(_paneEl, {
      toolName: 'Concept Map',
      defaultOpen: true,
      panelSections: [
        { label: 'Global',     html: _globalHtml },
        { label: 'Map',        html: _toolHtml   },
      ],
    });

    // The concept map canvas goes inside mainEl
    _nav.mainEl.style.cssText = 'flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;position:relative;';
    _nav.mainEl.id = 'cm-pane';

    // Draggable side panel (right side) — re-uses utils-panel.js
    var _layout   = _paneEl.querySelector('.pp-tool-main') || _nav.mainEl;
    var _sidePanel = window.createSidePanel ? createSidePanel(_paneEl, {
      side: 'right', defaultFraction: 0, minFraction: 0, maxFraction: .65,
      snapCloseFraction: .10,
      onResize: function(){ if (_cmTool && _cmTool.resize) _cmTool.resize(); },
      onOpen:   function(){ if (_cmTool && _cmTool.resize) _cmTool.resize(); },
      onClose:  function(){ if (_cmTool && _cmTool.resize) _cmTool.resize(); },
    }) : null;

    injectToolNav('concept-map.html');
    window.GlobalPanel.init({
      onSettingsChanged: function(s) {
        _mirrorSliders();
        SY.autoSplitAll();
        var pending = SY.getEffectiveNoteKeys().filter(function(k){ return !_emb.has(k); });
        if (pending.length && _embReady) {
          _embedAll(pending).then(function(){
            _buildPrincipleVecs(); _buildTextToVec(); _overrideEmbeddingUtils();
            if (_cmTool) { _cmTool.reset(); _cmTool.start(); }
          });
        } else if (_cmTool && _embReady) {
          _buildPrincipleVecs(); _buildTextToVec(); _overrideEmbeddingUtils();
          _cmTool.reset(); _cmTool.start();
        }
      },
    });

    // ── Map controls ──────────────────────────────────────────────────────────
    var _depthSlider  = document.getElementById('cm-depth-slider');
    var _depthVal     = document.getElementById('cm-depth-val');
    var _edgeSlider   = document.getElementById('cm-edge-slider');
    var _edgeVal      = document.getElementById('cm-edge-val');
    var _maxParSlider = document.getElementById('cm-maxpar-slider');
    var _maxParVal    = document.getElementById('cm-maxpar-val');

    function _syncSlider(slider, valEl, suffix) {
      if (!slider) return;
      slider.addEventListener('input', function(){
        valEl.textContent = slider.value + (suffix||'');
        var pp = document.getElementById('pp-cmap-depth') || document.getElementById('pp-cmap-thresh') || null;
        // Mirror values to utils-concept-map.js sliders once it loads
        _mirrorSliders();
      });
    }
    _syncSlider(_depthSlider,  _depthVal,  '');
    _syncSlider(_edgeSlider,   _edgeVal,   '%');
    _syncSlider(_maxParSlider, _maxParVal, '');

    function _mirrorSliders() {
      var pane = document.getElementById('cm-pane');
      if (!pane) return;
      var d  = pane.querySelector('#pp-cmap-depth');
      var t  = pane.querySelector('#pp-cmap-thresh');
      var m  = pane.querySelector('#pp-cmap-maxpar');
      var ml = pane.querySelector('#pp-cmap-maxlen');
      if (d  && _depthSlider)  { d.value  = _depthSlider.value;  d.dispatchEvent(new Event('input')); }
      if (t  && _edgeSlider)   { t.value  = _edgeSlider.value;   t.dispatchEvent(new Event('input')); }
      if (m  && _maxParSlider) { m.value  = _maxParSlider.value; m.dispatchEvent(new Event('input')); }
      // Mirror maxWords → pp-cmap-maxlen (word count × avg 5 chars + space ≈ char budget)
      // pp-cmap-maxlen range is 100-2000 chars; 0 means disabled
      if (ml) {
        var mw = parseInt((document.getElementById(window.GlobalPanel.IDS.MAXWORDS)||{value:'200'}).value);
        var charBudget = mw >= 200 ? 2000 : Math.max(100, mw * 6);
        ml.value = charBudget;
        ml.dispatchEvent(new Event('input'));
      }
    }

    // Layout buttons
    var _layoutGrid = document.getElementById('cm-layout-grid');
    if (_layoutGrid) {
      _layoutGrid.addEventListener('click', function(e){
        var btn = e.target.closest('.cm-layout-btn'); if (!btn) return;
        _layoutGrid.querySelectorAll('.cm-layout-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        // Mirror to utils-concept-map.js layout opts
        var pane = document.getElementById('cm-pane');
        var opt  = pane ? pane.querySelector('.pp-cmap-layout-opt[data-layout="'+btn.dataset.layout+'"]') : null;
        if (opt) { opt.click(); }
      });
    }

    // Rebuild button
    var _rebuildBtn = document.getElementById('cm-rebuild-btn');
    if (_rebuildBtn) {
      _rebuildBtn.addEventListener('click', function(){
        if (!_cmTool) return;
        _mirrorSliders();
        var pane = document.getElementById('cm-pane');
        var rb = pane ? pane.querySelector('#pp-cmap-rebuild') : null;
        if (rb) rb.click();
        else if (_cmTool) { _cmTool.reset(); _cmTool.start(); }
      });
    }

    // ── Embedding ─────────────────────────────────────────────────────────────
    function _triggerEmbed() {
      if (_embedding) return;
      var keys = SY.getRowNoteKeys();
      if (!keys.length || !window.EmbeddingUtils) return;
      _embedding = true;
      window.GlobalPanel && window.GlobalPanel.setStatus('Embedding ' + keys.length + ' entries…');

      _embedAll(keys).then(function(){
        _embedding = false; _embReady = true;
        SY.autoSplitAll();
        var _splitKeys = SY.getEffectiveNoteKeys().filter(function(k){ return !_emb.has(k); });
        _embedAll(_splitKeys).then(function(){
          _buildPrincipleVecs();
          _buildTextToVec();
          _overrideEmbeddingUtils();
          // Single call — guard against double script load
          _lastInitTime = Date.now();
          _initConceptMap();
        });
        var _cmMsg = _emb.size + ' entries indexed';
        window.GlobalPanel && window.GlobalPanel.setStatus(_cmMsg);
        if (_nav && _nav.subtitleEl) _nav.subtitleEl.textContent = _cmMsg;
        // Do NOT call _initConceptMap here — the inner _embedAll callback does it
      }).catch(function(e){
        _embedding = false;
        window.GlobalPanel && window.GlobalPanel.setStatus('Embedding error');
        console.error('[concept-map] embed error:', e);
      });
    }

    async function _embedAll(keys) {
      for (var i = 0; i < keys.length; i++) {
        var key = keys[i]; if (_emb.has(key)) continue;
        var r   = SY.resolveNoteKey(key); if (!r || !r.text.trim()) continue;
        try {
          var vec = await window.EmbeddingUtils.getCachedEmbedding(r.text);
          if (vec) _emb.set(key, new Float32Array(vec));
        } catch(e){}
      }
    }

    function _buildPrincipleVecs() {
      _princVecs.clear();
      var pvecs = SY.buildPrincipleVectors(_emb);
      pvecs.forEach(function(pv){
        if (pv.centroid) _princVecs.set(pv.principle.id, pv.centroid);
      });
    }

    function _buildTextToVec() {
      _textToVec.clear();
      // Add TAB note text → vec
      SY.getRowNoteKeys().forEach(function(key){
        var r = SY.resolveNoteKey(key); if (!r) return;
        var vec = _emb.get(key); if (!vec) return;
        _textToVec.set(r.text.trim(), vec);
        // Also store cell join text (how utils-concept-map.js looks it up)
        if (r.allCells) {
          var joined = r.allCells.join(' ').trim();
          if (joined) _textToVec.set(joined, vec);
        }
      });
      // Add principle name text → centroid
      SY.getPrinciples().filter(function(p){ return p.named && !p.archived; }).forEach(function(p){
        var vec = _princVecs.get(p.id); if (!vec) return;
        var nameText = '[PRINCIPLE] ' + p.name;
        _textToVec.set(nameText, vec);
        _textToVec.set(p.name.trim(), vec);
      });
    }

    // ── buildRowIndex override ────────────────────────────────────────────────
    // utils-concept-map.js calls buildRowIndex() to get all rows to map.
    // We inject principle rows first so they appear as anchor nodes.
    window.buildRowIndex = function() {
      var rows = [];
      var TABS = window.TABS || [];

      // 1. Principle nodes (tabIdx = -1, rowIdx = principle seq)
      var named = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      named.forEach(function(p, pi){
        var vec  = _princVecs.get(p.id); if (!vec) return;
        var nameText = '[PRINCIPLE] ' + p.name;
        rows.push({
          tabIdx:  -1,
          rowIdx:  pi,
          row:     { cells: [nameText], cats: [p.dimensionHint || 'Principle'] },
          headers: ['Principle'],
          title:   'Principles',
          vec:     vec,
          _principleId:    p.id,
          _principleColor: p.color,
          _principleName:  p.name,
          _principleDim:   p.dimensionHint || '',
        });
      });

      // 2. Unassigned TAB rows
      var assigned = new Set(SY.getAssignments().filter(function(a){
        return a.status === 'confirmed';
      }).map(function(a){ return a.noteKey; }));

      TABS.forEach(function(tab, tabIdx){
        var data = typeof processSheetData === 'function' ? processSheetData(tab.grid) : null;
        if (!data) return;
        data.rows.forEach(function(row, rowIdx){
          var key = SY.makeNoteKey(tab.name, rowIdx, SY.bestCellIdx(row.cells));
          // Include assigned notes too — they connect to their principle via semantic proximity
          // But mark them so we can optionally dim them
          var vec = _emb.get(key);
          rows.push({
            tabIdx:  tabIdx,
            rowIdx:  rowIdx,
            row:     row,
            headers: data.headers || [],
            title:   data.title || tab.name,
            vec:     vec || null,
            _noteKey:    key,
            _isAssigned: assigned.has(key),
          });
        });
      });

      return rows;
    };

    // ── EmbeddingUtils override ───────────────────────────────────────────────
    // utils-concept-map.js calls getCachedEmbedding(text) for each row.
    // We return our pre-computed vectors by text lookup.
    function _overrideEmbeddingUtils() {
      window.EmbeddingUtils = Object.assign(window.EmbeddingUtils || {}, {
        isReady: function(){ return _embReady; },
        getCachedEmbedding: function(text){
          var t   = (text||'').trim();
          var vec = _textToVec.get(t);
          if (vec) return Promise.resolve(vec);
          // Partial match fallback
          var found = null;
          if (t.length > 20) {
            var prefix = t.slice(0, 30);
            _textToVec.forEach(function(v, k){
              if (!found && k.startsWith(prefix)) found = v;
            });
          }
          return Promise.resolve(found || null);
        },
        getVectorSync: function(text){
          return _textToVec.get((text||'').trim()) || null;
        },
      });
    }

    // ── Init concept map ──────────────────────────────────────────────────────
    function _initConceptMap() {
      if (_cmTool) {
        _buildPrincipleVecs();
        _buildTextToVec();
        _overrideEmbeddingUtils();
        _cmTool.reset();
        _cmTool.start();
        return;
      }

      _overrideEmbeddingUtils();

      // ── Mock PPNavRail to prevent double-panel ──
      var _realPPNavRail  = window.PPNavRail;
      var _outerPanelBody = document.querySelector('#cm-body .pp-side-panel-body');
      var _outerSubtitle  = document.querySelector('#cm-body .pp-side-panel-subtitle');
      var _outerRail      = document.querySelector('#cm-body .pp-nav-rail');
      var _outerPanel     = document.querySelector('#cm-body .pp-side-panel');

      window.PPNavRail = {
        create: function(paneEl, opts) {
          window.PPNavRail = _realPPNavRail; // restore immediately

          // Build sections HTML
          var sectionsHTML = '';
          if (opts && opts.panelSections) {
            opts.panelSections.forEach(function(sec){
              sectionsHTML +=
                '<div class="pp-side-panel-section">' +
                  '<div class="pp-side-panel-section-label">'+sec.label+'</div>' +
                  sec.html +
                '</div>';
            });
          }

          // paneEl gets full PPNavRail structure (hidden side panel) so all
          // paneEl.querySelector('#pp-cmap-*') calls inside the tool find their elements
          paneEl.style.cssText = 'flex:1;min-height:0;display:flex;flex-direction:row;overflow:hidden;position:relative;';
          paneEl.innerHTML =
            '<div class="pp-nav-rail" style="display:none"></div>' +
            '<div class="pp-side-panel pp-side-panel--collapsed" style="display:none">' +
              '<div class="pp-side-panel-header">' +
                '<div class="pp-side-panel-tool-name"></div>' +
                '<div class="pp-side-panel-subtitle" id="cm-tool-subtitle">Loading…</div>' +
                '<div class="pp-side-panel-status"></div>' +
              '</div>' +
              '<div class="pp-side-panel-body">'+sectionsHTML+'</div>' +
            '</div>' +
            '<div class="pp-tool-main" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;position:relative;"></div>';

          var mainEl = paneEl.querySelector('.pp-tool-main');

          // Append tool sections to outer panel — hidden immediately
          if (_outerPanelBody && sectionsHTML) {
            var toolSecs = document.createElement('div');
            toolSecs.id = 'cm-tool-sections';
            toolSecs.style.display = 'none';
            toolSecs.innerHTML = sectionsHTML;
            _outerPanelBody.appendChild(toolSecs);
          }

          return {
            railEl:     paneEl.querySelector('.pp-nav-rail'),
            panelEl:    paneEl.querySelector('.pp-side-panel'),
            mainEl:     mainEl,
            subtitleEl: paneEl.querySelector('#cm-tool-subtitle') || (_outerSubtitle || document.createElement('span')),
            statusEl:   paneEl.querySelector('.pp-side-panel-status') || document.createElement('div'),
          };
        }
      };

      if (document.querySelector('script[src*="utils-concept-map"]')) {
        // Script already in DOM — just call init directly
        if (typeof initConceptMapTool === 'function') {
          var paneEl2 = document.getElementById('cm-pane');
          _cmTool = initConceptMapTool(paneEl2, null);
          setTimeout(_mirrorSliders, 100);
          var toolSecs2 = document.getElementById('cm-tool-sections');
          if (toolSecs2) toolSecs2.style.display = 'none';
          _watchForPrincipleCards(paneEl2);
          _updateLegend();
        }
        return;
      }

      var s = document.createElement('script');
      s.src = '../utilities/utils-concept-map.js?v=09bacb2e';
      s.onload = function(){
        if (typeof initConceptMapTool !== 'function') return;
        var paneEl = document.getElementById('cm-pane');
        _cmTool    = initConceptMapTool(paneEl, null);

        // Mirror outer sliders to tool's hidden sliders, hide ALL cm-tool-sections
        // (the tool's Parameters+Layout sections are already exposed in our Map panel)
        setTimeout(function(){
          _mirrorSliders();
          var toolSecs = document.getElementById('cm-tool-sections');
          if (toolSecs) toolSecs.style.display = 'none';
        }, 100);

        // Do NOT call _cmTool.start() here — initConceptMapTool already fires
        // tryRender immediately because EmbeddingUtils.isReady() is true at this point.
        // Calling start() again causes the double-render / position-reset.
        _watchForPrincipleCards(paneEl);
        _updateLegend();
      };
      document.head.appendChild(s);
    }

    // ── Principle card styling ─────────────────────────────────────────────────
    // After utils-concept-map.js renders, we find principle cards and apply color.
    function _watchForPrincipleCards(paneEl) {
      if (_observer) _observer.disconnect();

      // Build name → principle map
      var nameMap = {};
      SY.getPrinciples().filter(function(p){ return p.named && !p.archived; }).forEach(function(p){
        nameMap[('[PRINCIPLE] ' + p.name).toLowerCase()] = p;
        nameMap[p.name.toLowerCase().trim()]             = p;
      });

      _observer = new MutationObserver(function(mutations){
        mutations.forEach(function(m){
          m.addedNodes.forEach(function(node){
            if (node.nodeType !== 1) return;
            // Check cards that were just added
            var cards = node.classList && node.classList.contains('pp-cmap-card') ? [node] : [];
            node.querySelectorAll && node.querySelectorAll('.pp-cmap-card').forEach(function(c){ cards.push(c); });
            cards.forEach(function(card){
              _stylePrincipleCard(card, nameMap);
            });
          });
        });
      });

      var world = paneEl.querySelector('#pp-cmap-world');
      if (world) _observer.observe(world, { childList: true, subtree: true });
    }

    function _stylePrincipleCard(card, nameMap) {
      var textEl = card.querySelector('.pp-cmap-cell-text');
      if (!textEl) return;
      var rawText = textEl.textContent || '';
      var key     = rawText.toLowerCase().trim();
      var p       = nameMap[key];
      if (!p) {
        var stripped = key.replace(/\[principle\]\s*/i, '');
        p = nameMap[stripped.toLowerCase().trim()];
      }
      if (!p) return;

      // Mark as principle (for CSS selector) but DO NOT override --ppc-* colours.
      // The card uses depthColor like any other card at the same level — this makes
      // it visually identical in size/colour/shape to its neighbours.
      card.dataset.principleColor = p.color;

      // ── Header: cat-num (top-left, same font/size as normal card IDs) = P-{sheetId}
      // Level block (top-right "1 LEVEL") stays completely unchanged.
      var catNumEl = card.querySelector('.pp-cmap-card-cat-num');
      var pid = 'P-' + (p.sheetId || String(p.seq || '?').padStart(2,'0'));
      if (catNumEl) catNumEl.textContent = pid;

      // ── Body: principle name as cell-cat (muted small label), then register sections
      var body = card.querySelector('.pp-cmap-card-body');
      if (!body) return;

      var assignments = SY.getAssignments().filter(function(a){
        return a.principleId === p.id && a.status === 'confirmed';
      });
      var byReg = { what:[], why:[], who:[], how:[] };
      assignments.forEach(function(a){
        var r = SY.resolveNoteKey(a.noteKey);
        if (r && byReg[a.register]) byReg[a.register].push(r);
      });

      var regLabels = { what:'WHAT', why:'WHY', who:'WHO', how:'HOW' };
      var html = '';

      // Principle name in the same muted style as the small repeated ID in normal cards
      html += '<div class="pp-cmap-cell-cat">' + _h(p.name) + '</div>';

      var hasAny = false;
      ['what','why','who','how'].forEach(function(reg){
        var items = byReg[reg];
        if (!items.length) return;
        hasAny = true;
        html += '<div class="pp-cmap-cell-cat" style="margin-top:3px">' + regLabels[reg] + '</div>';
        items.forEach(function(r){
          var parsed = typeof parseCitation === 'function' ? parseCitation(r.text) : {body:r.text};
          html += '<div class="pp-cmap-cell-text">';
          html += _h(parsed.body.slice(0, 90)) + (parsed.body.length > 90 ? '…' : '');
          html += '</div>';
        });
      });

      if (!hasAny) {
        html += '<div class="pp-cmap-cell-text" style="opacity:.5;font-style:italic">No notes assigned</div>';
      }

      body.innerHTML = html;
    }

    // ── Legend with principle colours ─────────────────────────────────────────
    function _updateLegend() {
      var legendEl = document.getElementById('cm-legend');
      if (!legendEl) return;
      var named = SY.getPrinciples().filter(function(p){ return p.named && !p.archived; });
      var html  = '';
      named.forEach(function(p){
        html += '<div class="cm-legend-item"><span class="cm-principle-dot" style="background:'+p.color+'"></span> '+p.name+'</div>';
      });
      html += '<div class="cm-legend-item"><div class="cm-legend-dot" style="background:var(--md-sys-color-surface-container-high);border:1px solid var(--md-sys-color-outline-variant)"></div> Unassigned entry</div>';
      html += '<div class="cm-legend-item"><div class="cm-legend-line"></div> Semantic edge</div>';
      legendEl.innerHTML = html;
    }

    // ── Touch drag support ────────────────────────────────────────────────────
    function _patchTouchDrag() {
      function patch() {
        var paneEl  = document.getElementById('cm-pane');
        var canvas  = paneEl && paneEl.querySelector('[id*="canvas"]');
        if (!canvas) { setTimeout(patch, 400); return; }

        var panStart = null;
        canvas.addEventListener('touchstart', function(e){
          if (e.touches.length !== 1) return;
          var target = e.touches[0].target;
          if (target.closest && target.closest('.pp-cmap-card')) return;
          panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: true });

        canvas.addEventListener('touchmove', function(e){
          if (!panStart || e.touches.length !== 1) return;
          e.preventDefault();
          var dx = e.touches[0].clientX - panStart.x;
          var dy = e.touches[0].clientY - panStart.y;
          panStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
          var world = canvas.querySelector('[id*="world"]');
          if (world) {
            var cur = new DOMMatrix(window.getComputedStyle(world).transform);
            world.style.transform = 'translate('+(cur.m41+dx)+'px,'+(cur.m42+dy)+'px) scale('+cur.a+')';
          }
        }, { passive: false });

        canvas.addEventListener('touchend', function(){ panStart = null; }, { passive: true });
      }
      setTimeout(patch, 500);
    }

    // ── Events ────────────────────────────────────────────────────────────────
    document.addEventListener('embedder-ready', _triggerEmbed);
    window.addEventListener('embedding-complete', function(){ if (!_embReady) _triggerEmbed(); });
    window.addEventListener('sheet-loaded', function(){
      _triggerEmbed();
      _loadFramework();
    });

    function _loadFramework() {
      var scriptUrl = SY.getScriptUrl();
      var sheetUrl  = typeof getSavedSheetUrl === 'function' ? getSavedSheetUrl() : '';
      if (!scriptUrl || !sheetUrl) return;
      SY.readFramework(scriptUrl, sheetUrl).then(function(tabs){
        var fw = tabs.find(function(t){ return t.name && t.name.indexOf('FRAMEWORK') !== -1; });
        if (!fw) return;
        SY.setFrameworkTabs([{ name:fw.name, grid:fw.rows }]);
        var prevPCount = SY.getPrinciples().filter(function(p){ return p.named&&!p.archived; }).length;
        SY.loadFromFrameworkTab(fw.rows);
        var newPCount  = SY.getPrinciples().filter(function(p){ return p.named&&!p.archived; }).length;
        _updateLegend();
        // Rebuild only if principles changed AND the map wasn't just freshly initialised
        // (within 3s) — prevents the double-render on first load
        var justInited = (Date.now() - _lastInitTime) < 3000;
        if (_embReady && _cmTool && newPCount !== prevPCount && !justInited) {
          _buildPrincipleVecs();
          _buildTextToVec();
          _overrideEmbeddingUtils();
          _cmTool.reset();
          _cmTool.start();
        }
      }).catch(function(){});
    }
    _patchTouchDrag();

    document.addEventListener('DOMContentLoaded', function(){
      // Update legend once DOM is ready
      _updateLegend();
    });

  })();
  </script>
</body>
</html>
