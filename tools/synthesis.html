<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Synthesis — Dimensional Framework</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="../design-system.css?v=9fa06a28">
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;margin:0;padding:0;}
    body{display:flex;flex-direction:column;background:var(--md-sys-color-background);font-family:var(--font-family);color:var(--md-sys-color-on-background);}

    /* ── Tab bar ── */
    .sy-tabbar{flex-shrink:0;display:flex;align-items:stretch;border-bottom:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container);padding:0 8px;}
    .sy-tab{display:flex;align-items:center;gap:6px;height:46px;padding:0 18px;border:none;background:transparent;font-family:var(--font-family);font-size:13px;font-weight:500;color:var(--md-sys-color-on-surface-variant);cursor:pointer;position:relative;overflow:hidden;}
    .sy-tab::before{content:'';position:absolute;inset:0;background:var(--md-sys-color-on-surface);opacity:0;transition:opacity .12s;}
    .sy-tab:hover::before{opacity:.06;}
    .sy-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;}
    .sy-tab.active{color:var(--md-sys-color-primary);}
    .sy-tab.active::after{background:var(--md-sys-color-primary);}
    .sy-tab-n{height:18px;min-width:18px;padding:0 5px;border-radius:9px;background:var(--md-sys-color-surface-container-highest);color:var(--md-sys-color-on-surface-variant);font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;}
    .sy-tab.active .sy-tab-n{background:var(--md-sys-color-primary-container);color:var(--md-sys-color-on-primary-container);}
    .sy-tabbar-spacer{flex:1;}
    .sy-emb{display:flex;align-items:center;gap:6px;padding:0 12px;font-size:11px;color:var(--md-sys-color-on-surface-variant);}
    .sy-emb-dot{width:6px;height:6px;border-radius:50%;background:var(--md-sys-color-outline);}
    .sy-emb-dot.ready{background:#2e7d32;}
    .sy-emb-dot.loading{background:var(--md-sys-color-primary);animation:sy-pulse 1.2s ease-in-out infinite;}
    @keyframes sy-pulse{0%,100%{opacity:.3;}50%{opacity:1;}}

    /* ── Views ── */
    .sy-views{flex:1;min-height:0;overflow:hidden;position:relative;}
    .sy-view{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;}
    .sy-view[hidden]{display:none;}

    /* ── Buttons ── */
    .sy-btn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 16px;border-radius:17px;border:none;cursor:pointer;font-family:var(--font-family);font-size:13px;font-weight:500;white-space:nowrap;transition:box-shadow .12s;}
    .sy-btn-primary{background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);}
    .sy-btn-primary:hover{box-shadow:0 1px 6px rgba(0,0,0,.25);}
    .sy-btn-tonal{background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-on-secondary-container);}
    .sy-btn-tonal:hover{box-shadow:0 1px 4px rgba(0,0,0,.18);}
    .sy-btn-ghost{background:transparent;color:var(--md-sys-color-on-surface-variant);border:1px solid var(--md-sys-color-outline-variant);}
    .sy-btn-ghost:hover{background:color-mix(in srgb,var(--md-sys-color-on-surface) 6%,transparent);}
    .sy-btn-danger{background:transparent;color:var(--md-sys-color-error);border:1px solid color-mix(in srgb,var(--md-sys-color-error) 40%,transparent);}
    .sy-btn-danger:hover{background:color-mix(in srgb,var(--md-sys-color-error) 8%,transparent);}

    /* ── Badges ── */
    .sy-badge{display:inline-flex;align-items:center;height:18px;padding:0 6px;border-radius:9px;font-size:10px;font-weight:600;white-space:nowrap;}
    .sy-badge-auto{background:rgba(21,101,192,.12);color:#1565c0;border:1px solid rgba(21,101,192,.3);}
    .sy-badge-suggested{background:rgba(230,81,0,.1);color:#e65100;}
    .sy-badge-conflict{background:rgba(183,28,28,.1);color:#b71c1c;}
    .sy-badge-confirmed{background:rgba(46,125,50,.1);color:#2e7d32;}
    .sy-badge-changed{background:rgba(255,193,7,.18);color:#f57f17;border:1px solid rgba(255,193,7,.4);}
    .sy-reg-what{background:rgba(21,101,192,.1);color:#1565c0;}
    .sy-reg-why{background:rgba(230,81,0,.1);color:#e65100;}
    .sy-reg-who{background:rgba(46,125,50,.1);color:#2e7d32;}
    .sy-reg-how{background:rgba(106,27,154,.1);color:#6a1b9a;}

    /* ── Common inputs ── */
    .sy-input{width:100%;height:36px;padding:0 12px;border:1px solid var(--md-sys-color-outline);border-radius:4px;background:transparent;font-family:var(--font-family);font-size:14px;color:inherit;outline:none;transition:border-color .12s;}
    .sy-input:focus{border:2px solid var(--md-sys-color-primary);padding:0 11px;}
    .sy-fl{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);margin-bottom:5px;display:block;}
    .sy-field{margin-bottom:14px;}
    .sy-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:48px 24px;text-align:center;color:var(--md-sys-color-on-surface-variant);font-size:14px;}
    .sy-empty p{margin:0;}

    /* ══ NOTES VIEW ══ */
    .sy-notes-layout{flex:1;min-height:0;display:flex;overflow:hidden;}
    .sy-notes-list-pane{flex:0 0 380px;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--md-sys-color-outline-variant);}
    .sy-notes-toolbar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container-low);}
    .sy-search{flex:1;height:32px;padding:0 10px;border:1px solid var(--md-sys-color-outline-variant);border-radius:16px;background:transparent;font-family:var(--font-family);font-size:13px;color:inherit;outline:none;}
    .sy-search:focus{border-color:var(--md-sys-color-primary);}
    .sy-filter-chip{height:26px;padding:0 10px;border-radius:13px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:var(--md-sys-color-on-surface-variant);white-space:nowrap;}
    .sy-filter-chip.active{background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-on-secondary-container);border-color:transparent;}
    .sy-notes-list{flex:1;overflow-y:auto;scrollbar-width:thin;}
    .sy-note-card{padding:10px 14px;border-bottom:1px solid var(--md-sys-color-outline-variant);cursor:pointer;position:relative;}
    .sy-note-card:hover{background:color-mix(in srgb,var(--md-sys-color-on-surface) 4%,transparent);}
    .sy-note-card.selected{background:color-mix(in srgb,var(--md-sys-color-primary) 7%,transparent);}
    .sy-note-top{display:flex;align-items:center;gap:5px;margin-bottom:4px;flex-wrap:wrap;}
    .sy-note-text{font-size:13px;font-weight:500;line-height:1.45;color:var(--md-sys-color-on-surface);margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .sy-note-meta{font-size:11px;color:var(--md-sys-color-on-surface-variant);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .sy-note-p-tag{height:18px;padding:0 7px;border-radius:9px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap;}
    .sy-note-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .12s;}
    .sy-note-card:hover .sy-note-actions{opacity:1;}
    .sy-note-action{height:24px;padding:0 10px;border-radius:12px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;font-size:11px;font-weight:500;cursor:pointer;color:inherit;}
    .sy-note-action:hover{background:var(--md-sys-color-surface-container-high);}
    /* Detail pane */
    .sy-notes-detail{flex:1;min-width:0;overflow-y:auto;padding:20px 24px;}
    .sy-detail-source{font-size:13px;color:var(--md-sys-color-on-surface-variant);margin-bottom:14px;font-style:italic;}
    .sy-detail-text{font-size:15px;line-height:1.65;color:var(--md-sys-color-on-surface);margin-bottom:18px;}
    .sy-detail-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
    .sy-detail-cat{height:24px;padding:0 10px;border-radius:12px;background:var(--md-sys-color-surface-container-highest);color:var(--md-sys-color-on-surface-variant);font-size:11px;font-weight:500;}
    .sy-detail-all-cells{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
    .sy-detail-cell-row{display:flex;gap:8px;align-items:baseline;}
    .sy-detail-cell-label{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);min-width:80px;flex-shrink:0;}
    .sy-detail-cell-val{font-size:13px;color:var(--md-sys-color-on-surface);line-height:1.5;}
    .sy-detail-cell-val.active-cell{font-weight:600;color:var(--md-sys-color-on-surface);}
    .sy-detail-assign{margin-top:16px;}
    .sy-reg-selector{display:flex;gap:4px;margin-top:8px;}
    .sy-reg-btn{height:28px;padding:0 11px;border-radius:14px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:var(--md-sys-color-on-surface-variant);transition:all .12s;}
    .sy-reg-btn[data-r=what].active{background:rgba(21,101,192,.15);color:#1565c0;border-color:#1565c0;}
    .sy-reg-btn[data-r=why].active{background:rgba(230,81,0,.15);color:#e65100;border-color:#e65100;}
    .sy-reg-btn[data-r=who].active{background:rgba(46,125,50,.15);color:#2e7d32;border-color:#2e7d32;}
    .sy-reg-btn[data-r=how].active{background:rgba(106,27,154,.15);color:#6a1b9a;border-color:#6a1b9a;}

    /* ══ PRINCIPLES VIEW ══ */
    .sy-pr-toolbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container-low);}
    .sy-pr-layout{flex:1;min-height:0;display:flex;overflow:hidden;}
    .sy-named-col{flex:0 0 50%;overflow-y:auto;border-right:1px solid var(--md-sys-color-outline-variant);scrollbar-width:thin;}
    .sy-pool-col{flex:1;min-width:0;overflow-y:auto;scrollbar-width:thin;}
    .sy-col-hdr{flex-shrink:0;padding:10px 14px 8px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);border-bottom:1px solid var(--md-sys-color-outline-variant);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--md-sys-color-surface-container-low);z-index:2;}
    .sy-pr-card{margin:10px 12px 4px;border-radius:8px;border:1px solid var(--md-sys-color-outline-variant);overflow:hidden;}
    .sy-pr-head{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;}
    .sy-pr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .sy-pr-name{flex:1;font-size:14px;font-weight:500;color:var(--md-sys-color-on-surface);}
    .sy-pr-meta{font-size:11px;color:var(--md-sys-color-on-surface-variant);}
    .sy-chevron{font-size:10px;color:var(--md-sys-color-on-surface-variant);transition:transform .15s;}
    .sy-chevron.open{transform:rotate(90deg);}
    .sy-pr-body{display:none;border-top:1px solid var(--md-sys-color-outline-variant);}
    .sy-pr-body.open{display:block;}
    .sy-pr-note{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-bottom:1px solid var(--md-sys-color-outline-variant);}
    .sy-pr-note:last-of-type{border-bottom:none;}
    .sy-pr-note.changed{background:rgba(255,193,7,.08);}
    .sy-pr-note-content{flex:1;min-width:0;}
    .sy-pr-note-text{font-size:12px;line-height:1.45;color:var(--md-sys-color-on-surface);}
    .sy-pr-note-src{font-size:10px;color:var(--md-sys-color-on-surface-variant);margin-top:2px;}
    .sy-pr-note-changed{font-size:10px;color:#f57f17;margin-top:2px;}
    .sy-reg-tiny{height:20px;padding:0 6px;border-radius:10px;border:none;font-size:9px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.4;}
    .sy-reg-tiny.active{opacity:1;}
    .sy-reg-tiny.what{background:rgba(21,101,192,.15);color:#1565c0;}
    .sy-reg-tiny.why{background:rgba(230,81,0,.15);color:#e65100;}
    .sy-reg-tiny.who{background:rgba(46,125,50,.15);color:#2e7d32;}
    .sy-reg-tiny.how{background:rgba(106,27,154,.15);color:#6a1b9a;}
    .sy-pr-foot{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container-lowest);flex-wrap:wrap;}
    .sy-pr-pending-banner{background:rgba(21,101,192,.07);border-bottom:1px solid rgba(21,101,192,.15);padding:7px 12px;font-size:11px;color:#1565c0;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
    /* Clusters */
    .sy-cl-card{margin:10px 12px 4px;border-radius:8px;border:1px dashed var(--md-sys-color-outline-variant);overflow:hidden;}
    .sy-cl-head{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;}
    .sy-cl-label{flex:1;font-size:13px;font-weight:500;color:var(--md-sys-color-on-surface-variant);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sy-cl-sugg{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;background:color-mix(in srgb,var(--md-sys-color-primary) 10%,transparent);color:var(--md-sys-color-primary);white-space:nowrap;}
    .sy-cl-body{display:none;}
    .sy-cl-body.open{display:block;}
    .sy-cl-note{display:flex;align-items:flex-start;gap:7px;padding:7px 12px;border-top:1px solid var(--md-sys-color-outline-variant);}
    .sy-cl-note-inner{flex:1;min-width:0;}
    .sy-cl-note-text{font-size:12px;line-height:1.45;color:var(--md-sys-color-on-surface);}
    .sy-cl-note-src{font-size:10px;color:var(--md-sys-color-on-surface-variant);margin-top:2px;}
    .sy-assign-btn{height:22px;padding:0 8px;border-radius:11px;border:none;background:var(--md-sys-color-surface-container-highest);color:var(--md-sys-color-on-surface-variant);font-size:10px;font-weight:500;cursor:pointer;flex-shrink:0;}
    .sy-assign-btn:hover{background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-on-secondary-container);}
    .sy-cl-foot{display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container-lowest);flex-wrap:wrap;}
    .sy-name-form{display:none;padding:10px 12px;border-top:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container);}
    .sy-name-form.open{display:block;}
    .sy-name-row{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;}
    .sy-singleton-section{padding:10px 14px;}
    .sy-singleton-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);margin-bottom:7px;}
    .sy-singleton-chips{display:flex;flex-wrap:wrap;gap:5px;}
    .sy-singleton{display:flex;align-items:center;gap:4px;height:26px;max-width:200px;padding:0 10px;border-radius:13px;background:var(--md-sys-color-surface-container-highest);font-size:11px;color:var(--md-sys-color-on-surface-variant);cursor:pointer;overflow:hidden;}
    .sy-singleton span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sy-singleton:hover{background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface);}

    /* ══ FRAMEWORK VIEW ══ */
    .sy-fw-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--md-sys-color-outline-variant);background:var(--md-sys-color-surface-container-low);}
    .sy-fw-dims{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
    .sy-fw-dim-btn{height:30px;padding:0 14px;border-radius:15px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--md-sys-color-on-surface-variant);white-space:nowrap;}
    .sy-fw-dim-btn.active{background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-on-secondary-container);border-color:transparent;}
    .sy-sync-status{font-size:11px;color:var(--md-sys-color-on-surface-variant);white-space:nowrap;}
    .sy-fw-body{flex:1;overflow-y:auto;padding:20px 24px 60px;scrollbar-width:thin;}
    .sy-fw-section{margin-bottom:32px;}
    .sy-fw-dim-hdr{padding:11px 16px;font-size:15px;font-weight:700;color:#fff;border-radius:6px 6px 0 0;}
    .sy-fw-table{width:100%;border-collapse:collapse;border:1px solid var(--md-sys-color-outline-variant);border-top:none;font-size:13px;}
    .sy-fw-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);background:var(--md-sys-color-surface-container);border-bottom:1px solid var(--md-sys-color-outline-variant);}
    .sy-fw-table td{padding:8px 12px;vertical-align:top;border-bottom:1px solid var(--md-sys-color-outline-variant);line-height:1.5;}
    .sy-fw-table tr:last-child td{border-bottom:none;}
    .sy-fw-id{font-size:11px;font-weight:700;color:var(--md-sys-color-on-surface-variant);width:60px;white-space:nowrap;}
    .sy-fw-cat{width:70px;font-size:11px;font-weight:700;white-space:nowrap;}
    .sy-fw-cat.what{color:#1565c0;}.sy-fw-cat.why{color:#e65100;}.sy-fw-cat.who{color:#2e7d32;}.sy-fw-cat.how{color:#6a1b9a;}
    .sy-fw-no-note{font-style:italic;color:var(--md-sys-color-outline);font-size:12px;}
    .sy-fw-cite{font-size:11px;color:var(--md-sys-color-on-surface-variant);}
    .sy-fw-editable{cursor:text;outline:none;min-height:36px;width:145px;padding:6px 8px;border-radius:4px;border:1px solid transparent;transition:border-color .12s;display:block;font-family:var(--font-family);}
    .sy-fw-editable:focus{border-color:var(--md-sys-color-primary);}
    .sy-fw-editable.gap{color:var(--md-sys-color-on-surface-variant);background:rgba(255,193,7,.1);border-color:rgba(255,193,7,.4);font-style:italic;}
    .sy-fw-sep{height:3px;background:var(--md-sys-color-surface-container);}
    .sy-fw-rule-edit{display:block;width:100%;min-height:32px;padding:4px 6px;border-radius:4px;border:1px solid transparent;font-family:var(--font-family);font-size:13px;line-height:1.5;color:var(--md-sys-color-on-surface);cursor:text;outline:none;transition:border-color .12s;}
    .sy-fw-rule-edit:focus{border-color:var(--md-sys-color-primary);background:color-mix(in srgb,var(--md-sys-color-primary) 3%,transparent);}
    .sy-fw-rule-edit.has-ref{color:var(--md-sys-color-on-surface);}
    .sy-fw-rule-edit.no-note{color:var(--md-sys-color-outline);font-style:italic;}
    .sy-fw-p-name-row td{font-size:13px;font-weight:600;color:var(--md-sys-color-on-surface);padding:7px 12px 5px;}

    /* Sync panel */
    .sy-sync-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--md-sys-color-surface-container);border-top:1px solid var(--md-sys-color-outline-variant);padding:8px 16px;display:flex;align-items:center;gap:10px;font-size:12px;flex-wrap:wrap;}
    .sy-sync-panel input{flex:1;min-width:200px;height:30px;padding:0 10px;border:1px solid var(--md-sys-color-outline-variant);border-radius:4px;background:transparent;font-size:12px;color:inherit;outline:none;}
    .sy-sync-panel input:focus{border-color:var(--md-sys-color-primary);}
    .sy-sync-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);white-space:nowrap;}

    /* Assign popover */
    .sy-pop{position:fixed;z-index:9999;min-width:180px;background:var(--md-sys-color-surface-container);border:1px solid var(--md-sys-color-outline-variant);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.18);overflow:hidden;display:none;}
    .sy-pop.open{display:block;}
    .sy-pop-label{padding:8px 12px 4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--md-sys-color-on-surface-variant);}
    .sy-pop-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:13px;color:var(--md-sys-color-on-surface);transition:background .1s;}
    .sy-pop-item:hover{background:color-mix(in srgb,var(--md-sys-color-on-surface) 6%,transparent);}
    .sy-pop-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .sy-pop-new{color:var(--md-sys-color-primary);font-weight:500;}

    /* Diff modal */
    .sy-modal-bg{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;}
    .sy-modal-bg.open{display:flex;}
    .sy-modal{background:var(--md-sys-color-surface);border-radius:12px;padding:24px;max-width:500px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.22);}
    .sy-modal-title{font-size:16px;font-weight:600;margin-bottom:14px;}
    .sy-modal-body{max-height:300px;overflow-y:auto;font-size:13px;line-height:1.6;color:var(--md-sys-color-on-surface-variant);margin-bottom:18px;}
    .sy-diff-line{padding:3px 0;}
    .sy-diff-line.added{color:#2e7d32;}.sy-diff-line.removed{color:#b71c1c;}
    .sy-modal-foot{display:flex;gap:8px;justify-content:flex-end;}

    /* Principle create/rename modal */
    .sy-p-modal-bg{position:fixed;inset:0;z-index:8100;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;}
    .sy-p-modal-bg.open{display:flex;}
    .sy-p-modal{background:var(--md-sys-color-surface);border-radius:12px;padding:24px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.22);}
    .sy-p-modal-title{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--md-sys-color-on-surface);}
    .sy-p-modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
    .sy-p-dim-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
    .sy-p-dim-chip{height:28px;padding:0 12px;border-radius:14px;border:1px solid var(--md-sys-color-outline-variant);background:transparent;font-size:12px;font-weight:500;cursor:pointer;color:var(--md-sys-color-on-surface-variant);transition:all .12s;}
    .sy-p-dim-chip.active{background:var(--md-sys-color-secondary-container);color:var(--md-sys-color-on-secondary-container);border-color:transparent;}

    /* Changed-source alert */
    .sy-changed-banner{flex-shrink:0;background:rgba(255,193,7,.12);border-bottom:1px solid rgba(255,193,7,.3);padding:8px 14px;font-size:12px;color:#f57f17;display:none;}
    .sy-changed-banner.visible{display:block;}
  </style>
</head>

    <div class="sy-emb"><div class="sy-emb-dot loading" id="sy-emb-dot"></div><span id="sy-emb-label">Loading model...</span></div>

  <div class="sy-views">

    <!-- ══ NOTES ══ -->
    <div class="sy-view" id="sy-v-notes">
      <div class="sy-notes-layout">
        <div class="sy-notes-list-pane">
          <div class="sy-notes-toolbar">
            <input class="sy-search" id="sy-search" placeholder="Filter notes..." autocomplete="off">
            <button class="sy-filter-chip active" data-filter="all">All</button>
            <button class="sy-filter-chip" data-filter="unassigned">Unassigned</button>
            <button class="sy-filter-chip" data-filter="pending">Pending</button>
          </div>

        <div class="sy-notes-detail" id="sy-notes-detail">
          <div class="sy-empty" id="sy-detail-empty">
            <p style="font-size:16px;font-weight:500;color:var(--md-sys-color-on-surface)">Select a note</p>
            <p>Click any row on the left to see its full content and assign it to a principle.</p>
          </div>
          <div id="sy-detail-content" style="display:none"></div>

    <!-- ══ PRINCIPLES ══ -->
    <div class="sy-view" id="sy-v-principles" hidden>
      <div class="sy-pr-toolbar">
        <span style="font-size:12px;color:var(--md-sys-color-on-surface-variant);">Cluster sensitivity</span>
        <input type="range" id="sy-threshold" min="20" max="70" value="42" step="1" style="width:90px;accent-color:var(--md-sys-color-primary);">
        <span id="sy-threshold-val" style="font-size:12px;font-weight:600;min-width:30px;">42%</span>

        <button class="sy-btn sy-btn-ghost" id="sy-new-p-btn" style="height:30px;font-size:12px;padding:0 12px;">+ Named principle</button>
        <button class="sy-btn sy-btn-ghost" id="sy-bulk-confirm-btn" style="height:30px;font-size:12px;padding:0 12px;display:none">Confirm all auto</button>
      </div>
      <div class="sy-pr-layout">
        <div class="sy-named-col">
          <div class="sy-col-hdr">Named principles <span class="sy-tab-n" id="sy-named-count">0</span></div>
          <div id="sy-named-list"></div>
        </div>
        <div class="sy-pool-col">
          <div class="sy-col-hdr">Holding pool <span class="sy-tab-n" id="sy-pool-count">0</span></div>

    <!-- ══ FRAMEWORK ══ -->
    <div class="sy-view" id="sy-v-framework" hidden>
      <div class="sy-fw-bar">
        <div class="sy-fw-dims" id="sy-fw-dims"></div>
        <span class="sy-sync-status" id="sy-sync-status"></span>
        <button class="sy-btn sy-btn-ghost" id="sy-fw-write-btn" style="height:30px;font-size:12px;padding:0 12px;">Write to sheet</button>
        <button class="sy-btn sy-btn-ghost" id="sy-fw-csv-btn"   style="height:30px;font-size:12px;padding:0 12px;">Export CSV</button>
        <button class="sy-btn sy-btn-ghost" id="sy-fw-md-btn"    style="height:30px;font-size:12px;padding:0 12px;">Export MD</button>
      </div>
      <div class="sy-fw-body" id="sy-fw-body"></div>
      <div class="sy-sync-panel" id="sy-sync-panel">
        <span class="sy-sync-label">Apps Script URL</span>
        <input type="url" id="sy-script-url" placeholder="https://script.google.com/macros/s/.../exec">
        <button class="sy-btn sy-btn-tonal" id="sy-script-save-btn" style="height:30px;font-size:12px;padding:0 12px;">Save</button>
        <span id="sy-script-status" style="font-size:11px;color:var(--md-sys-color-on-surface-variant)"></span>

  <!-- Principle create/rename modal -->
  <div class="sy-p-modal-bg" id="sy-p-modal-bg">
    <div class="sy-p-modal">
      <div class="sy-p-modal-title" id="sy-p-modal-title">New principle</div>
      <div class="sy-field">
        <label class="sy-fl">Name</label>
        <input class="sy-input" id="sy-p-modal-name" placeholder="e.g. Threshold Gradient" autocomplete="off">
      </div>
      <div class="sy-field">
        <label class="sy-fl">Dimension</label>
        <div class="sy-p-dim-chips" id="sy-p-modal-dims">
          <button class="sy-p-dim-chip" data-dim="Physical">Physical</button>
          <button class="sy-p-dim-chip" data-dim="Social">Social</button>
          <button class="sy-p-dim-chip" data-dim="Organisational">Organisational</button>
          <button class="sy-p-dim-chip" data-dim="Temporal">Temporal</button>
          <button class="sy-p-dim-chip" data-dim="Economic">Economic</button>

      <div class="sy-p-modal-foot">
        <button class="sy-btn sy-btn-ghost" id="sy-p-modal-cancel">Cancel</button>
        <button class="sy-btn sy-btn-primary" id="sy-p-modal-confirm">Create</button>
      </div>

  <!-- Assign popover -->
  <div class="sy-pop" id="sy-pop">
    <div class="sy-pop-label">Assign to principle</div>
    <div id="sy-pop-list"></div>
    <div class="sy-pop-item sy-pop-new" id="sy-pop-new">+ Create new principle</div>
  </div>

  <!-- Diff modal -->
  <div class="sy-modal-bg" id="sy-diff-modal">
    <div class="sy-modal">
      <div class="sy-modal-title">Preview changes to FRAMEWORK tab</div>
      <div class="sy-modal-body" id="sy-diff-body"></div>
      <div class="sy-modal-foot">
        <button class="sy-btn sy-btn-ghost" id="sy-diff-cancel">Cancel</button>
        <button class="sy-btn sy-btn-primary" id="sy-diff-confirm">Write to sheet</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="../utilities/utils-keywords.js?v=7"></script>
  <script src="../utilities/utils-shared.js?v=425998b6"></script>
  <script src="../utilities/utils-synthesis.js?v=b56bd994"></script>
  <script type="module" src="../utilities/utils-embedding.js?v=4"></script>

  <script>
  (function(){
    var SY = window.SynthesisData;
    if (!SY) { document.body.innerHTML = '<p style="padding:24px">utils-synthesis.js not loaded.</p>'; return; }

    var _emb      = new Map();   // noteKey → Float32Array
    var _embReady = false;
    var _clusters = null;
    var _thresh   = 0.42;
    var _view     = 'notes';
    var _selectedKey = null;
    var _openP    = new Set();
    var _openCl   = new Set();
    var _assignCtx= null;
    var _activeDim= 'all';
    var _filter   = 'all';
    var _pendingWrite = null;  // grid ready to send

    function _h(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── Init ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function(){
      _setupTabs(); _setupThreshold(); _setupSearch(); _setupFilters();
      _setupAssignPop(); _setupExports(); _setupSync(); _setupPrincipleModal(); _setupNewPrincipleBtn();
      _loadScriptUrl();
      // Don't renderAll() here — TABS is not populated yet.
      // sheet-loaded event below handles first render.
      updateCounts();
    });

    // ── Embedding ────────────────────────────────────────────────────────────
    // getCachedEmbedding handles model loading internally, so no isReady() guard
    // needed. We trigger after both sheet-loaded AND embedder-ready; a running
    // flag prevents concurrent runs.
    var _embedding = false;

    function _triggerEmbed() {
      if (_embedding) return;
      var keys = SY.getRowNoteKeys();
      if (!keys.length) return;              // TABS not populated yet
      if (!window.EmbeddingUtils) return;    // module not loaded yet
      _embedding = true;
      _embReady  = false;
      document.getElementById('sy-emb-dot').className = 'sy-emb-dot loading';
      document.getElementById('sy-emb-label').textContent = 'Embedding ' + keys.length + ' notes...';
      _embedAll(keys).then(function(){
        _embedding = false;
        _embReady  = true;
        document.getElementById('sy-emb-dot').className = 'sy-emb-dot ready';
        document.getElementById('sy-emb-label').textContent = _emb.size + ' embedded';
        console.log('[synthesis] embedded', _emb.size, 'of', keys.length, 'notes');
        _clusters = null;
        _runAutoAssignment();
        renderAll();
      }).catch(function(e){
        _embedding = false;
        console.error('[synthesis] _embedAll failed:', e);
      });
    }

    // Fire on both events — whichever arrives last (after both sheet + model ready)
    document.addEventListener('embedder-ready', function(){
      console.log('[synthesis] embedder-ready, TABS length:', (window.TABS||[]).length);
      _triggerEmbed();
    });
    window.addEventListener('embedding-complete', function(){
      // utils-keywords fires this after it finishes; re-try in case
      // sheet arrived before model and _triggerEmbed found no keys
      if (!_embReady) _triggerEmbed();
    });
    window.addEventListener('sheet-loaded', function(){
      console.log('[synthesis] sheet-loaded, TABS length:', (window.TABS||[]).length);
      _tryLoadFramework(); _checkChangedSources(); renderAll();
      _triggerEmbed();
    });

    function _onEmbedReady(){ _triggerEmbed(); } // kept for any legacy callers

    async function _embedAll(keys){
      keys = keys || SY.getRowNoteKeys();
      for (var i = 0; i < keys.length; i++){
        var key = keys[i];
        if (_emb.has(key)) continue;
        var r = SY.resolveNoteKey(key);
        if (!r || !r.text.trim()) continue;
        try {
          var vec = await window.EmbeddingUtils.getCachedEmbedding(r.text);
          if (vec) _emb.set(key, new Float32Array(vec));
        } catch(e){ console.warn('[synthesis] embed key failed:', key, e.message); }
      }
    }

    async function _embedKey(key){
      if (!_embReady || !window.EmbeddingUtils || _emb.has(key)) return;
      var r = SY.resolveNoteKey(key);
      if (!r || !r.text.trim()) return;
      try {
        var vec = await window.EmbeddingUtils.getCachedEmbedding(r.text);
        if (vec){ _emb.set(key, new Float32Array(vec)); _clusters = null; }
      } catch(e){}
    }

    function _runAutoAssignment(){
      // Only run on notes that are truly unassigned (no entry in assignments at all)
      var existing = new Set(SY.getAssignments().map(function(a){return a.noteKey;}));
      var pvecs    = SY.buildPrincipleVectors(_emb);
      if (!pvecs.length) return;
      var items    = SY.getRowNoteKeys()
        .filter(function(k){ return !existing.has(k) && _emb.has(k); })
        .map(function(k){ return {id:k, vec:_emb.get(k)}; });
      if (!items.length) return;
      var tiers = SY.computeAssignmentTiers(items, pvecs);
      // Auto: assign provisional (status='auto')
      tiers.auto.forEach(function(it){
        SY.setAssignment(it.id, it.match.principle.id, SY.suggestRegister(SY.resolveNoteKey(it.id)||{text:''}.text), 'auto', it.match.sim);
      });
      // Conflicts: put in pool as 'conflict' note (don't assign, just flag)
      // Suggested: don't assign — they stay in pool with suggestion label from cluster data
      if (tiers.auto.length) { _clusters=null; updateCounts(); }
    }

    function _tryLoadFramework(){
      // Find FRAMEWORK tabs from the raw all-tabs data
      // The XLSX fetch loads ALL tabs; we need to re-fetch or read from TABS + a stored copy
      if (!window.TABS || !window.TABS.length) return;
      // Look for FRAMEWORK tabs stored via setFrameworkTabs
      var fwTabs = SY.getFrameworkTabs();
      fwTabs.forEach(function(tab){
        var loaded = SY.loadFromFrameworkTab(tab.grid);
        if (loaded) console.log('[synthesis] loaded state from', tab.name);
      });
    }

    function _checkChangedSources(){
      var changed = SY.getChangedSources();
      var banner  = document.getElementById('sy-changed-banner');
      if (!changed.length){ banner.classList.remove('visible'); return; }
      banner.classList.add('visible');
      banner.innerHTML = '<strong>' + changed.length + ' source cell' + (changed.length>1?'s':'')+' changed since last confirmation.</strong> ' +
        'Review flagged notes in the Principles view. ' +
        '<button id="sy-dismiss-changed" style="background:none;border:none;cursor:pointer;color:#f57f17;text-decoration:underline;font-size:12px;">Dismiss</button>';
      document.getElementById('sy-dismiss-changed').addEventListener('click', function(){
        banner.classList.remove('visible');
      });
    }

    // ── Clustering ───────────────────────────────────────────────────────
    function _getClusters(){
      if (_clusters !== null) return _clusters;
      var assignments = SY.getAssignments();
      var assignedKeys = new Set(assignments.map(function(a){return a.noteKey;}));
      var unassigned = SY.getRowNoteKeys()
        .filter(function(k){ return !assignedKeys.has(k) && _emb.has(k); })
        .map(function(k){ return {id:k, vec:_emb.get(k)}; });
      var raw = SY.cluster(unassigned, _thresh);
      var pvecs = SY.buildPrincipleVectors(_emb);
      _clusters = raw.map(function(c){
        var texts = c.noteKeys.map(function(k){ var r=SY.resolveNoteKey(k); return r?r.text:''; });
        c.label = SY.autoLabel(texts);
        c.sugg  = null;
        var bestSim = 0.50;
        pvecs.forEach(function(pv){
          var sim = SY.cosine(c.centroid, pv.centroid);
          if (sim > bestSim){ bestSim=sim; c.sugg=pv.principle; }
        });
        return c;
      });
      return _clusters;
    }

    // ── Tabs ─────────────────────────────────────────────────────────────
    function _setupTabs(){
      document.querySelectorAll('.sy-tab').forEach(function(t){
        t.addEventListener('click', function(){ _switchView(t.dataset.view); });
      });
    }
    function _switchView(name){
      _view = name;
      document.querySelectorAll('.sy-tab').forEach(function(t){t.classList.toggle('active',t.dataset.view===name);});
      ['notes','principles','framework'].forEach(function(v){
        document.getElementById('sy-v-'+v).hidden = v !== name;
      });
      if (name==='notes')       renderNotes();
      if (name==='principles')  renderPrinciples();
      if (name==='framework')   renderFramework();
    }

    function updateCounts(){
      var all   = SY.getRowNoteKeys();
      var ps    = SY.getPrinciples().filter(function(p){return p.named&&!p.archived;});
      var pend  = SY.getAssignments().filter(function(a){return a.status==='auto';}).length;
      document.getElementById('sy-tn-notes').textContent      = all.length;
      document.getElementById('sy-tn-principles').textContent = ps.length + (pend?' ('+pend+')':'');
      document.getElementById('sy-tn-fw').textContent         = ps.length;
      var bulkBtn = document.getElementById('sy-bulk-confirm-btn');
      if (bulkBtn) bulkBtn.style.display = pend > 0 ? '' : 'none';
    }

    function renderAll(){ updateCounts(); if(_view==='notes') renderNotes(); if(_view==='principles') renderPrinciples(); if(_view==='framework') renderFramework(); }

    // ══ NOTES VIEW ═══════════════════════════════════════════════════════

    function renderNotes(){
      var keys        = SY.getRowNoteKeys();
      var assignments = SY.getAssignments();
      var principles  = SY.getPrinciples();
      var changed     = new Set(SY.getChangedSources().map(function(c){return c.noteKey;}));
      var search      = (document.getElementById('sy-search')||{}).value||'';
      var pMap        = {}; principles.forEach(function(p){pMap[p.id]=p;});
      var aMap        = {}; assignments.forEach(function(a){aMap[a.noteKey]=a;});

      var filtered = keys.filter(function(key){
        var r = SY.resolveNoteKey(key); if(!r) return false;
        var a = aMap[key];
        if (_filter==='unassigned' && a) return false;
        if (_filter==='pending' && (!a||a.status!=='auto')) return false;
        if (search){
          var s=search.toLowerCase();
          if (!(r.text+r.tabName+(r.cats||[]).join(' ')).toLowerCase().includes(s)) return false;
        }
        return true;
      });

      var listEl = document.getElementById('sy-notes-list');
      if (!filtered.length){
        listEl.innerHTML='<div class="sy-empty" style="flex:none;padding:32px 16px"><p>No notes match.</p></div>';
        return;
      }

      var html='';
      filtered.forEach(function(key){
        var r  = SY.resolveNoteKey(key); if(!r) return;
        var a  = aMap[key];
        var p  = a ? pMap[a.principleId] : null;
        var isChanged = changed.has(key);
        var isSel     = key === _selectedKey;

        html += '<div class="sy-note-card'+(isSel?' selected':'')+'" data-key="'+_h(key)+'">';
        html += '<div class="sy-note-top">';
        html += '<span class="sy-badge" style="background:var(--md-sys-color-surface-container-highest);color:var(--md-sys-color-on-surface-variant)">'+_h(r.tabName)+'</span>';
        if (a && a.status==='auto')      html += '<span class="sy-badge sy-badge-auto">auto — confirm?</span>';
        if (a && a.status==='confirmed') html += '<span class="sy-badge sy-badge-confirmed">confirmed</span>';
        if (isChanged)                   html += '<span class="sy-badge sy-badge-changed">source changed</span>';
        if (p) html += '<span class="sy-note-p-tag" style="background:'+_h(p.color)+'">'+_h(p.name.slice(0,20))+'</span>';
        html += '</div>';
        var _nc_parsed = typeof parseCitation==='function' ? parseCitation(r.text) : {body:r.text,citation:null};
        var _nc_pill = _nc_parsed.citation ? ' <span class="pp-cite-pill" style="background:var(--md-sys-color-surface-container-highest);color:var(--md-sys-color-on-surface-variant)">'+_h(_nc_parsed.citation)+'</span>' : '';
        html += '<div class="sy-note-text">'+_h(_nc_parsed.body)+_nc_pill+'</div>';
        if (r.cats && r.cats.filter(Boolean).length) html += '<div class="sy-note-meta">'+r.cats.filter(Boolean).map(function(c){return _h(c);}).join(' &rsaquo; ')+'</div>';
        html += '<div class="sy-note-actions">';
        html += '<button class="sy-note-action" data-action="assign" data-key="'+_h(key)+'">Assign</button>';
        if (a) html += '<button class="sy-note-action" data-action="unassign" data-key="'+_h(key)+'">Unassign</button>';
        html += '</div>';
        html += '</div>';
      });
      listEl.innerHTML = html;

      listEl.querySelectorAll('.sy-note-card').forEach(function(card){
        card.addEventListener('click', function(){ _selectNote(card.dataset.key); });
      });
      listEl.querySelectorAll('[data-action=assign]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var r = btn.getBoundingClientRect();
          _openAssignPop(btn.dataset.key, r.left, r.bottom+4);
        });
      });
      listEl.querySelectorAll('[data-action=unassign]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          SY.rejectAssignment(btn.dataset.key);
          _clusters=null; renderAll();
        });
      });
    }

    function _selectNote(key){
      _selectedKey = (_selectedKey===key) ? null : key;
      renderNotes();
      _renderNoteDetail(key);
    }

    function _renderNoteDetail(key){
      var emptyEl   = document.getElementById('sy-detail-empty');
      var contentEl = document.getElementById('sy-detail-content');
      if (!key){ emptyEl.style.display=''; contentEl.style.display='none'; return; }
      var r = SY.resolveNoteKey(key); if(!r){ return; }
      var a = SY.getAssignment(key);
      var p = a ? SY.getPrinciples().find(function(x){return x.id===a.principleId;}) : null;
      emptyEl.style.display='none'; contentEl.style.display='';

      var isChanged = SY.getChangedSources().some(function(c){return c.noteKey===key;});
      var html = '';
      html += '<div class="sy-detail-source">'+_h(r.tabName)+(r.tabTitle&&r.tabTitle!==r.tabName?' — '+_h(r.tabTitle):'')+'</div>';
      if (r.cats&&r.cats.filter(Boolean).length) html += '<div class="sy-detail-cats">'+r.cats.filter(Boolean).map(function(c){return '<span class="sy-detail-cat">'+_h(c)+'</span>';}).join('')+'</div>';
      if (isChanged) html += '<div style="color:#f57f17;font-size:12px;margin-bottom:10px;padding:6px 10px;background:rgba(255,193,7,.1);border-radius:4px;">Source cell changed since last confirmation. Review and re-confirm.</div>';
      html += '<div class="sy-detail-all-cells">';
      r.allCells.forEach(function(cell,ci){
        if(!cell||!cell.trim()) return;
        var hdr = (r.headers&&r.headers[ci]) ? r.headers[ci] : 'Col '+(ci+1);
        var isActive = ci===r.cellIdx;
        html += '<div class="sy-detail-cell-row">';
        html += '<span class="sy-detail-cell-label">'+_h(hdr)+'</span>';
        html += '<span class="sy-detail-cell-val'+(isActive?' active-cell':'')+'">'+_h(cell)+'</span>';
        if (!isActive) html += '<button class="sy-note-action" data-action="use-cell" data-key="'+_h(SY.makeNoteKey(r.tabName,r.dataRowIdx,ci))+'" style="margin-left:auto;opacity:.6;font-size:10px">Use this cell</button>';
        html += '</div>';
      });
      html += '</div>';
      html += '<div class="sy-detail-assign">';
      if (p){
        html += '<div style="margin-bottom:8px;font-size:13px">Assigned to <span style="font-weight:600;color:'+_h(p.color)+'">'+_h(p.name)+'</span>';
        if (a.status==='auto') html += ' <span class="sy-badge sy-badge-auto" style="margin-left:4px">pending confirmation</span>';
        html += '</div>';
        if (a.similarity) html += '<div style="font-size:11px;color:var(--md-sys-color-on-surface-variant);margin-bottom:8px">Similarity: '+a.similarity.toFixed(3)+'</div>';
        html += '<div class="sy-fl">Register</div>';
        html += '<div class="sy-reg-selector">';
        ['what','why','who','how'].forEach(function(reg){
          html += '<button class="sy-reg-btn'+(a.register===reg?' active':'')+'" data-r="'+reg+'" data-key="'+_h(key)+'">'+reg.toUpperCase()+'</button>';
        });
        html += '</div>';
        if (a.status==='auto'){
          html += '<div style="display:flex;gap:8px;margin-top:12px">';
          html += '<button class="sy-btn sy-btn-tonal" id="sy-det-confirm" data-key="'+_h(key)+'" style="height:32px;font-size:12px;padding:0 14px">Confirm assignment</button>';
          html += '<button class="sy-btn sy-btn-danger" id="sy-det-reject"  data-key="'+_h(key)+'" style="height:32px;font-size:12px;padding:0 14px">Reject</button>';
          html += '</div>';
        } else if (isChanged){
          html += '<div style="margin-top:10px">';
          html += '<button class="sy-btn sy-btn-tonal" id="sy-det-ack" data-key="'+_h(key)+'" style="height:32px;font-size:12px;padding:0 14px">Acknowledge change and re-confirm</button>';
          html += '</div>';
        }
      } else {
        html += '<button class="sy-btn sy-btn-tonal" id="sy-det-assign-btn" data-key="'+_h(key)+'" style="height:32px;font-size:12px;padding:0 14px">Assign to principle</button>';
      }
      html += '</div>';
      contentEl.innerHTML = html;

      contentEl.querySelectorAll('.sy-reg-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
          SY.updateAssignmentRegister(btn.dataset.key, btn.dataset.r);
          _renderNoteDetail(key); renderPrinciples();
        });
      });
      var cb = document.getElementById('sy-det-confirm');
      if (cb) cb.addEventListener('click', function(){ SY.confirmAssignment(cb.dataset.key); _clusters=null; renderAll(); _renderNoteDetail(key); });
      var rb = document.getElementById('sy-det-reject');
      if (rb) rb.addEventListener('click', function(){ SY.rejectAssignment(rb.dataset.key); _clusters=null; renderAll(); _renderNoteDetail(key); });
      var ab = document.getElementById('sy-det-assign-btn');
      if (ab) ab.addEventListener('click', function(){ var r2=ab.getBoundingClientRect(); _openAssignPop(ab.dataset.key,r2.left,r2.bottom+4); });
      var ackb = document.getElementById('sy-det-ack');
      if (ackb) ackb.addEventListener('click', function(){ SY.acknowledgeChangedSource(ackb.dataset.key); _checkChangedSources(); renderAll(); _renderNoteDetail(key); });
      contentEl.querySelectorAll('[data-action=use-cell]').forEach(function(btn){
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          var newKey = btn.dataset.key;
          var oldA   = SY.getAssignment(key);
          if (oldA){ SY.rejectAssignment(key); SY.setAssignment(newKey, oldA.principleId, oldA.register, 'confirmed', null); }
          _selectedKey = newKey; _emb.delete(key); _emb.delete(newKey);
          _clusters=null; renderAll(); _renderNoteDetail(newKey);
          _embedKey(newKey);
        });
      });
    }

    function _setupSearch(){ var s=document.getElementById('sy-search'); if(s) s.addEventListener('input', renderNotes); }
    function _setupFilters(){
      document.querySelectorAll('.sy-filter-chip').forEach(function(c){
        c.addEventListener('click', function(){
          document.querySelectorAll('.sy-filter-chip').forEach(function(x){x.classList.remove('active');});
          c.classList.add('active'); _filter=c.dataset.filter; renderNotes();
        });
      });
    }

    // ══ PRINCIPLES VIEW ══════════════════════════════════════════════════

    function renderPrinciples(){
      var keys        = SY.getRowNoteKeys();
      var assignments = SY.getAssignments();
      var principles  = SY.getPrinciples().filter(function(p){return !p.archived;});
      var named       = principles.filter(function(p){return p.named;});
      var changed     = new Set(SY.getChangedSources().map(function(c){return c.noteKey;}));
      var aMap        = {}; assignments.forEach(function(a){aMap[a.noteKey]=a;});
      var assignedKeys= new Set(assignments.map(function(a){return a.noteKey;}));
      var unassigned  = keys.filter(function(k){return !assignedKeys.has(k);});
      var auto        = assignments.filter(function(a){return a.status==='auto';});

      document.getElementById('sy-named-count').textContent = named.length;
      document.getElementById('sy-pool-count').textContent  = unassigned.length;
      updateCounts();

      _renderNamed(named, assignments, changed);
      _renderPool(unassigned, auto, named, changed);

      // Bulk confirm button
      var bulk = document.getElementById('sy-bulk-confirm-btn');
      if (bulk){ bulk.style.display = auto.length>0 ? '' : 'none'; bulk.textContent = 'Confirm all auto ('+auto.length+')'; }
    }

    function _renderNamed(named, assignments, changed){
      var listEl = document.getElementById('sy-named-list');
      if (!named.length){ listEl.innerHTML='<div class="sy-empty" style="flex:none;padding:24px 16px"><p>No named principles yet.</p></div>'; return; }
      var pNotes={};
      assignments.forEach(function(a){ if(!pNotes[a.principleId]) pNotes[a.principleId]=[]; pNotes[a.principleId].push(a); });

      var html='';
      named.forEach(function(p){
        var as   = pNotes[p.id]||[];
        var auto = as.filter(function(a){return a.status==='auto';});
        var open = _openP.has(p.id);
        html += '<div class="sy-pr-card">';
        html += '<div class="sy-pr-head" data-toggle="'+_h(p.id)+'">';
        html += '<div class="sy-pr-dot" style="background:'+_h(p.color)+'"></div>';
        html += '<div class="sy-pr-name">'+_h(p.name)+'</div>';
        html += '<div class="sy-pr-meta">'+_h(p.dimensionHint||'—')+' &middot; '+as.length+' note'+(as.length!==1?'s':'');
        if (auto.length) html += ' &middot; <span style="color:#1565c0;font-weight:600">'+auto.length+' pending</span>';
        html += '</div>';
        html += '<span class="sy-chevron'+(open?' open':'')+'">&#9658;</span>';
        html += '</div>';
        if (auto.length) html += '<div class="sy-pr-pending-banner">'+auto.length+' auto-assigned note'+(auto.length>1?'s':'')+' awaiting confirmation.<button class="sy-note-action" data-action="bulk-confirm-p" data-pid="'+_h(p.id)+'" style="margin-left:8px">Confirm all for this principle</button></div>';
        html += '<div class="sy-pr-body'+(open?' open':'')+'">';
        as.forEach(function(a){
          var r = SY.resolveNoteKey(a.noteKey);
          if (!r) return;
          var isChanged = changed.has(a.noteKey);
          var reg = a.register || SY.suggestRegister(r.text);
          html += '<div class="sy-pr-note'+(isChanged?' changed':'')+'">';
          html += '<div style="display:flex;flex-direction:column;gap:2px;flex-shrink:0">';
          ['what','why','who','how'].forEach(function(rr){
            html += '<button class="sy-reg-tiny '+rr+(reg===rr?' active':'')+'" data-nk="'+_h(a.noteKey)+'" data-r="'+rr+'">'+rr.toUpperCase()+'</button>';
          });
          html += '</div>';
          html += '<div class="sy-pr-note-content">';
          var _prp = typeof parseCitation==='function' ? parseCitation(r.text) : {body:r.text,citation:null};
          var _prpill = _prp.citation ? ' <span class="pp-cite-pill" style="background:'+_h(p.color)+';color:#fff">'+_h(_prp.citation)+'</span>' : '';
          html += '<div class="sy-pr-note-text">'+_h(_prp.body)+_prpill+'</div>';
          html += '<div class="sy-pr-note-src">'+_h(r.tabName)+(r.cats&&r.cats.filter(Boolean).length?' &rsaquo; '+r.cats.filter(Boolean).map(function(c){return _h(c);}).join(' &rsaquo; '):'')+'</div>';
          if (a.status==='auto') html += '<div style="margin-top:3px;display:flex;gap:4px"><span class="sy-badge sy-badge-auto">auto '+(a.similarity?a.similarity.toFixed(2):'')+' </span><button class="sy-note-action" data-action="confirm-a" data-nk="'+_h(a.noteKey)+'" style="height:20px;padding:0 8px;font-size:10px">Confirm</button><button class="sy-note-action" data-action="reject-a" data-nk="'+_h(a.noteKey)+'" style="height:20px;padding:0 8px;font-size:10px;color:var(--md-sys-color-error)">Reject</button></div>';
          if (isChanged) html += '<div class="sy-pr-note-changed">Source changed — <button class="sy-note-action" data-action="ack-change" data-nk="'+_h(a.noteKey)+'" style="height:18px;padding:0 6px;font-size:10px">Acknowledge</button></div>';
          html += '</div></div>';
        });
        html += '<div class="sy-pr-foot">';
        html += '<button class="sy-btn sy-btn-ghost" data-action="rename-p" data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px;padding:0 10px">Rename</button>';
        html += '<button class="sy-btn sy-btn-ghost" data-action="archive-p" data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px;padding:0 10px">Archive</button>';
        html += '<button class="sy-btn sy-btn-danger" data-action="del-p" data-pid="'+_h(p.id)+'" style="height:26px;font-size:11px;padding:0 10px">Delete</button>';
        html += '</div>';
        html += '</div></div>';
      });
      listEl.innerHTML = html;
      _bindNamedEvents(listEl);
    }

    function _bindNamedEvents(listEl){
      listEl.querySelectorAll('[data-toggle]').forEach(function(el){
        el.addEventListener('click', function(){
          var id=el.dataset.toggle; if(_openP.has(id)) _openP.delete(id); else _openP.add(id); renderPrinciples();
        });
      });
      listEl.querySelectorAll('.sy-reg-tiny').forEach(function(btn){
        btn.addEventListener('click', function(e){e.stopPropagation(); SY.updateAssignmentRegister(btn.dataset.nk,btn.dataset.r); _clusters=null; renderPrinciples(); if(_view==='framework') renderFramework();});
      });
      listEl.querySelectorAll('[data-action=confirm-a]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();SY.confirmAssignment(btn.dataset.nk);_clusters=null;renderAll();});
      });
      listEl.querySelectorAll('[data-action=reject-a]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();SY.rejectAssignment(btn.dataset.nk);_clusters=null;renderAll();});
      });
      listEl.querySelectorAll('[data-action=ack-change]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();SY.acknowledgeChangedSource(btn.dataset.nk);_checkChangedSources();renderAll();});
      });
      listEl.querySelectorAll('[data-action=bulk-confirm-p]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();
          SY.getAssignments().filter(function(a){return a.principleId===btn.dataset.pid&&a.status==='auto';}).forEach(function(a){SY.confirmAssignment(a.noteKey);});
          _clusters=null;renderAll();
        });
      });
      listEl.querySelectorAll('[data-action=rename-p]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();var p=SY.getPrinciples().find(function(x){return x.id===btn.dataset.pid;});if(!p)return; _openPModal('Rename principle',p.name,p.dimensionHint,function(name,dim){SY.updatePrinciple(p.id,{name:name,dimensionHint:dim});renderAll();});});
      });
      listEl.querySelectorAll('[data-action=archive-p]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();SY.updatePrinciple(btn.dataset.pid,{archived:true,named:false});SY.getAssignments().filter(function(a){return a.principleId===btn.dataset.pid;}).forEach(function(a){SY.rejectAssignment(a.noteKey);});_clusters=null;renderAll();});
      });
      listEl.querySelectorAll('[data-action=del-p]').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();if(confirm('Delete this principle?')){SY.deletePrinciple(btn.dataset.pid);_clusters=null;renderAll();}});
      });
    }

    function _renderPool(unassigned, autoAs, named, changed){
      var poolEl = document.getElementById('sy-pool-list');
      var clusters = _getClusters();
      var clusteredKeys = new Set();
      clusters.forEach(function(c){c.noteKeys.forEach(function(k){clusteredKeys.add(k);});});
      var singletons = unassigned.filter(function(k){return _emb.has(k)&&!clusteredKeys.has(k);});
      var notEmbedded = unassigned.filter(function(k){return !_emb.has(k);});

      var html='';
      if (!_embReady && unassigned.length) html += '<div style="padding:14px;font-size:12px;color:var(--md-sys-color-on-surface-variant);font-style:italic">Model loading — clusters will appear shortly.</div>';

      clusters.forEach(function(cl,ci){
        var open = _openCl.has(String(ci));
        html += '<div class="sy-cl-card">';
        html += '<div class="sy-cl-head" data-ci="'+ci+'">';
        html += '<span class="sy-cl-label">'+_h(cl.label)+'</span>';
        html += '<span class="sy-badge" style="background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant)">'+cl.noteKeys.length+'</span>';
        if (cl.sugg) html += '<span class="sy-cl-sugg">Possibly: '+_h(cl.sugg.name.slice(0,18))+'</span>';
        html += '<span class="sy-chevron'+(open?' open':'')+'">&#9658;</span>';
        html += '</div>';
        html += '<div class="sy-cl-body'+(open?' open':'')+'">';
        // Group notes by heuristic register for preview
        var clByReg = {what:[],why:[],who:[],how:[]};
        cl.noteKeys.forEach(function(key){
          var r=SY.resolveNoteKey(key); if(!r) return;
          var reg = SY.suggestRegister(r.text);
          if(clByReg[reg]) clByReg[reg].push({key:key,r:r}); else clByReg.what.push({key:key,r:r});
        });
        var REG_LABEL_CL = {what:'WHAT?',why:'WHY?',who:'WHO?',how:'HOW?'};
        var REG_CLS_CL   = {what:'what',why:'why',who:'who',how:'how'};
        ['what','why','who','how'].forEach(function(reg){
          var items = clByReg[reg]; if(!items.length) return;
          html += '<div style="padding:5px 12px 2px;font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--md-sys-color-on-surface-variant)" class="sy-fw-cat '+REG_CLS_CL[reg]+'">'+REG_LABEL_CL[reg]+'</div>';
          items.forEach(function(item){
            var r=item.r, key=item.key;
            var _clp = typeof parseCitation==='function' ? parseCitation(r.text) : {body:r.text,citation:null};
            var _clpill = _clp.citation ? ' <span class="pp-cite-pill" style="background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant)">'+_h(_clp.citation)+'</span>' : '';
            html += '<div class="sy-cl-note"><div class="sy-cl-note-inner"><div class="sy-cl-note-text">'+_h(_clp.body)+_clpill+'</div><div class="sy-cl-note-src">'+_h(r.tabName)+(r.cats&&r.cats.filter(Boolean).length?' &rsaquo; '+r.cats.filter(Boolean).map(function(cc){return _h(cc);}).join(' &rsaquo; '):'')+'</div></div>';
            html += '<button class="sy-assign-btn" data-key="'+_h(key)+'">Assign</button></div>';
          });
        });
        html += '<div class="sy-cl-foot">';
        html += '<button class="sy-btn sy-btn-tonal" data-action="name-cl" data-ci="'+ci+'" style="height:26px;font-size:11px;padding:0 12px">Name this cluster</button>';
        if (cl.sugg) html += '<button class="sy-btn sy-btn-ghost" data-action="merge-cl" data-ci="'+ci+'" data-pid="'+_h(cl.sugg.id)+'" style="height:26px;font-size:11px;padding:0 10px">Merge into '+_h(cl.sugg.name.slice(0,16))+'</button>';
        html += '</div>';

        html += '</div></div>';
      });

      if (singletons.length){
        html += '<div class="sy-singleton-section"><div class="sy-singleton-label">Singletons ('+singletons.length+')</div><div class="sy-singleton-chips">';
        singletons.forEach(function(k){
          var r=SY.resolveNoteKey(k); if(!r) return;
          html += '<div class="sy-singleton" data-key="'+_h(k)+'" title="'+_h(r.text)+'"><span>'+_h(r.text.slice(0,40))+(r.text.length>40?'...':'')+'</span></div>';
        });
        html += '</div></div>';
      }
      if (notEmbedded.length) html += '<div style="padding:10px 14px;font-size:11px;color:var(--md-sys-color-on-surface-variant);font-style:italic">'+notEmbedded.length+' note'+(notEmbedded.length>1?'s':'')+' not yet embedded.</div>';
      if (!clusters.length && !singletons.length && !notEmbedded.length) html += '<div class="sy-empty" style="flex:none;padding:24px"><p>All notes are assigned.</p></div>';

      poolEl.innerHTML = html;
      _bindPoolEvents(poolEl, clusters);
    }

    function _bindPoolEvents(poolEl, clusters){
      poolEl.querySelectorAll('[data-ci]').forEach(function(el){
        if (!el.dataset.action) el.addEventListener('click',function(){
          var k=String(el.dataset.ci); if(_openCl.has(k)) _openCl.delete(k); else _openCl.add(k); renderPrinciples();
        });
      });
      poolEl.querySelectorAll('.sy-assign-btn').forEach(function(btn){
        btn.addEventListener('click',function(e){e.stopPropagation();var r=btn.getBoundingClientRect();_openAssignPop(btn.dataset.key,r.left,r.bottom+4);});
      });
      poolEl.querySelectorAll('.sy-singleton').forEach(function(chip){
        chip.addEventListener('click',function(){var r=chip.getBoundingClientRect();_openAssignPop(chip.dataset.key,r.left,r.bottom+4);});
      });
      poolEl.querySelectorAll('[data-action=name-cl]').forEach(function(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          var ci = btn.dataset.ci;
          var cl = clusters[parseInt(ci)];
          _openPModal('Name this cluster','',cl&&cl.sugg?cl.sugg.dimensionHint:'',function(name,dim){
            var p=SY.addPrinciple({name:name,dimensionHint:dim});
            if(cl) cl.noteKeys.forEach(function(k){SY.setAssignment(k,p.id,SY.suggestRegister((SY.resolveNoteKey(k)||{text:''}).text),'confirmed',null);});
            _clusters=null; _openP.add(p.id); renderAll();
          });
        });
      });

      poolEl.querySelectorAll('[data-action=merge-cl]').forEach(function(btn){
        btn.addEventListener('click',function(e){
          e.stopPropagation();
          var cl=clusters[parseInt(btn.dataset.ci)]; if(!cl) return;
          cl.noteKeys.forEach(function(k){SY.setAssignment(k,btn.dataset.pid,SY.suggestRegister((SY.resolveNoteKey(k)||{text:''}).text),'confirmed',null);});
          _clusters=null; _openP.add(btn.dataset.pid); renderAll();
        });
      });
    }

    function _setupPrincipleModal(){
      var _pModalCb = null;
      window._openPModal = function(title, defaultName, defaultDim, cb){
        _pModalCb = cb;
        document.getElementById('sy-p-modal-title').textContent = title||'New principle';
        document.getElementById('sy-p-modal-name').value = defaultName||'';
        var confirmBtn = document.getElementById('sy-p-modal-confirm');
        confirmBtn.textContent = (title&&title.startsWith('Rename')) ? 'Rename' : 'Create';
        document.querySelectorAll('.sy-p-dim-chip').forEach(function(ch){
          ch.classList.toggle('active', ch.dataset.dim===(defaultDim||''));
        });
        document.getElementById('sy-p-modal-bg').classList.add('open');
        setTimeout(function(){ var inp=document.getElementById('sy-p-modal-name'); inp.focus(); inp.select(); }, 60);
      };
      document.getElementById('sy-p-modal-cancel').addEventListener('click', function(){
        document.getElementById('sy-p-modal-bg').classList.remove('open'); _pModalCb=null;
      });
      document.getElementById('sy-p-modal-bg').addEventListener('click', function(e){
        if(e.target===e.currentTarget){ document.getElementById('sy-p-modal-bg').classList.remove('open'); _pModalCb=null; }
      });
      document.querySelectorAll('.sy-p-dim-chip').forEach(function(ch){
        ch.addEventListener('click',function(){
          document.querySelectorAll('.sy-p-dim-chip').forEach(function(x){x.classList.remove('active');});
          ch.classList.add('active');
        });
      });
      document.getElementById('sy-p-modal-confirm').addEventListener('click', function(){
        var name = document.getElementById('sy-p-modal-name').value.trim();
        if (!name){ document.getElementById('sy-p-modal-name').focus(); return; }
        var activeChip = document.querySelector('.sy-p-dim-chip.active');
        var dim = activeChip ? activeChip.dataset.dim : '';
        document.getElementById('sy-p-modal-bg').classList.remove('open');
        var cb = _pModalCb; _pModalCb = null;
        if (cb) cb(name, dim);
      });
      document.getElementById('sy-p-modal-name').addEventListener('keydown',function(e){
        if(e.key==='Enter') document.getElementById('sy-p-modal-confirm').click();
        if(e.key==='Escape'){ document.getElementById('sy-p-modal-bg').classList.remove('open'); _pModalCb=null; }
      });
    }

    function _setupNewPrincipleBtn(){
      // _openPModal is defined in _setupNewPrincipleBtn below
      document.getElementById('sy-new-p-btn').addEventListener('click',function(){
        _openPModal('New principle','','',function(name,dim){ var p=SY.addPrinciple({name:name,dimensionHint:dim}); _openP.add(p.id); renderAll(); });
      });
      var bulk=document.getElementById('sy-bulk-confirm-btn');
      if(bulk) bulk.addEventListener('click',function(){
        SY.getAssignments().filter(function(a){return a.status==='auto';}).forEach(function(a){SY.confirmAssignment(a.noteKey);});
        _clusters=null; renderAll();
      });
    }

    function _setupThreshold(){
      var sl=document.getElementById('sy-threshold'), vl=document.getElementById('sy-threshold-val');
      if(!sl) return;
      sl.addEventListener('input',function(){_thresh=parseInt(sl.value)/100;vl.textContent=sl.value+'%';_clusters=null;if(_view==='principles') renderPrinciples();});
    }

    // ══ ASSIGN POPOVER ════════════════════════════════════════════════════

    function _setupAssignPop(){
      document.addEventListener('click',function(e){if(!document.getElementById('sy-pop').contains(e.target)) _closePop();});
      document.getElementById('sy-pop-new').addEventListener('click',function(){
        if(!_assignCtx) return;
        var _savedCtx = _assignCtx;
        _closePop();
        _openPModal('New principle','','',function(name,dim){
          var p=SY.addPrinciple({name:name,dimensionHint:dim});
          var r=SY.resolveNoteKey(_savedCtx.key);
          SY.setAssignment(_savedCtx.key,p.id,r?SY.suggestRegister(r.text):'what','confirmed',null);
          _clusters=null; _openP.add(p.id); renderAll();
          if(_selectedKey===_savedCtx.key) _renderNoteDetail(_savedCtx.key);
        });
      });
    }

    function _openAssignPop(key, x, y){
      _assignCtx = {key:key};
      var ps=SY.getPrinciples().filter(function(p){return p.named&&!p.archived;});
      var listEl=document.getElementById('sy-pop-list'); listEl.innerHTML='';
      if(!ps.length){var it=document.createElement('div');it.className='sy-pop-item';it.style.color='var(--md-sys-color-on-surface-variant)';it.textContent='No named principles yet';listEl.appendChild(it);}
      ps.forEach(function(p){
        var it=document.createElement('div'); it.className='sy-pop-item';
        it.innerHTML='<span class="sy-pop-dot" style="background:'+_h(p.color)+'"></span>'+_h(p.name);
        it.addEventListener('click',function(){
          var r=SY.resolveNoteKey(key);
          SY.setAssignment(key,p.id,r?SY.suggestRegister(r.text):'what','confirmed',null);
          _clusters=null; _openP.add(p.id); _closePop(); renderAll();
          if(_selectedKey===key) _renderNoteDetail(key);
        });
        listEl.appendChild(it);
      });
      var pop=document.getElementById('sy-pop');
      pop.style.left=Math.min(x,window.innerWidth-200)+'px';
      pop.style.top=Math.min(y,window.innerHeight-250)+'px';
      pop.classList.add('open');
    }
    function _closePop(){ document.getElementById('sy-pop').classList.remove('open'); _assignCtx=null; }

    // ══ FRAMEWORK VIEW ════════════════════════════════════════════════════

    function renderFramework(){
      var ps = SY.getPrinciples().filter(function(p){return p.named&&!p.archived;});
      var as = SY.getAssignments().filter(function(a){return a.status==='confirmed';});
      var byDim={},dimOrder=[];
      ps.forEach(function(p){var d=p.dimensionHint||'Undimensioned';if(!byDim[d]){byDim[d]=[];dimOrder.push(d);}byDim[d].push(p);});

      var dimsEl=document.getElementById('sy-fw-dims');
      var dimHtml='<button class="sy-fw-dim-btn'+(_activeDim==='all'?' active':'')+'" data-dim="all">All</button>';
      dimOrder.forEach(function(d){dimHtml+='<button class="sy-fw-dim-btn'+(_activeDim===d?' active':'')+'" data-dim="'+_h(d)+'">'+_h(d)+'</button>';});
      dimsEl.innerHTML=dimHtml;
      dimsEl.querySelectorAll('.sy-fw-dim-btn').forEach(function(b){b.addEventListener('click',function(){_activeDim=b.dataset.dim;renderFramework();});});

      var fw=document.getElementById('sy-fw-body'); if(!fw) return;
      var filtered=ps.filter(function(p){return _activeDim==='all'||(p.dimensionHint||'Undimensioned')===_activeDim;});
      if(!filtered.length){fw.innerHTML='<div class="sy-empty"><p style="font-size:16px;font-weight:500;color:var(--md-sys-color-on-surface)">No named principles yet</p><p>Name clusters in the Principles view to build the framework.</p></div>';return;}

      var byDim2={},dimOrder2=[];
      filtered.forEach(function(p){var d=p.dimensionHint||'Undimensioned';if(!byDim2[d]){byDim2[d]=[];dimOrder2.push(d);}byDim2[d].push(p);});
      var byP={};
      as.forEach(function(a){if(!byP[a.principleId]) byP[a.principleId]=[]; byP[a.principleId].push(a);});
      var REGS=['what','why','who','how'],REG_LABEL={what:'WHAT?',why:'WHY?',who:'WHO?',how:'HOW?'};
      var html='';
      dimOrder2.forEach(function(dim){
        var dps=byDim2[dim], color=dps[0]?dps[0].color:'#555';
        html+='<div class="sy-fw-section">';
        html+='<div class="sy-fw-dim-hdr" style="background:'+_h(color)+'">The '+_h(dim)+' Dimension</div>';
        html+='<table class="sy-fw-table"><colgroup><col style="width:60px"><col style="width:70px"><col><col style="width:150px"><col style="width:150px"></colgroup>';
        html+='<thead><tr><th>ID</th><th>Category</th><th>Rule / Constraint</th><th>Move / Intervention</th><th>Metric / Proof</th></tr></thead><tbody>';
        dps.forEach(function(p){
          var pId='P-'+String(p.seq).padStart(2,'0');
          var pAs=byP[p.id]||[], byReg={what:[],why:[],who:[],how:[]};
          pAs.forEach(function(a){if(byReg[a.register]) byReg[a.register].push(a);});
          html+='<tr class="sy-fw-sep"><td colspan="5" style="padding:0;height:3px;background:var(--md-sys-color-surface-container)"></td></tr>';
          html+='<tr class="sy-fw-p-name-row"><td class="sy-fw-id">'+_h(pId)+'</td><td colspan="4">'+_h(p.name)+'</td></tr>';
          var mbr = p.moveByReg   || {what:'',why:'',who:'',how:''};
          var tbr = p.metricByReg || {what:'',why:'',who:'',how:''};
          REGS.forEach(function(reg){
            var regAs=byReg[reg];
            var ruleText = regAs.length ? (SY.resolveNoteKey(regAs[0].noteKey)||{text:''}).text : '';
            var hasNote  = !!ruleText;
            var ruleDisplay;
            if (hasNote) {
              var parsed = typeof parseCitation==='function' ? parseCitation(ruleText) : {body:ruleText,citation:null};
              var principleColor = p.color || '#555';
              var pillHtml = parsed.citation
                ? ' <span class="pp-cite-pill" style="background:'+_h(principleColor)+';color:#fff">'+_h(parsed.citation)+'</span>'
                : '';
              ruleDisplay = _h(parsed.body) + pillHtml;
              if(regAs.length>1) ruleDisplay += ' <span class="sy-badge" style="background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-on-surface-variant);font-size:10px">+'+(regAs.length-1)+'</span>';
            } else {
              ruleDisplay = 'No note assigned';
            }
            var mv = mbr[reg]||'', mt = tbr[reg]||'';
            html += '<tr>';
            html += '<td class="sy-fw-id"></td>';
            html += '<td class="sy-fw-cat '+reg+'">'+REG_LABEL[reg]+'</td>';
            html += '<td><div class="sy-fw-rule-edit'+(hasNote?' has-ref':' no-note')+'" contenteditable="'+(hasNote?'false':'true')+'" spellcheck="false" data-pid="'+_h(p.id)+'" data-reg="'+reg+'" data-field="rule">'+ruleDisplay+'</div></td>';
            html += '<td><div class="sy-fw-editable'+(mv?'':' gap')+'" contenteditable="true" spellcheck="false" data-pid="'+_h(p.id)+'" data-reg="'+reg+'" data-field="move">'+(mv||'Click to add...')+'</div></td>';
            html += '<td><div class="sy-fw-editable'+(mt?'':' gap')+'" contenteditable="true" spellcheck="false" data-pid="'+_h(p.id)+'" data-reg="'+reg+'" data-field="metric">'+(mt||'Click to add...')+'</div></td>';
            html += '</tr>';
          });
        });
        html+='</tbody></table></div>';
      });
      fw.innerHTML=html;

      fw.querySelectorAll('[contenteditable]').forEach(function(el){
        if (el.contentEditable === 'false') return;
        el.addEventListener('focus',function(){ if(el.textContent.trim()==='Click to add...') el.textContent=''; });
        el.addEventListener('blur',function(){
          var v   = el.textContent.trim();
          var pid = el.dataset.pid;
          var reg = el.dataset.reg;
          var field = el.dataset.field;
          if (!v){ el.textContent='Click to add...'; el.classList.add('gap'); }
          else el.classList.remove('gap');
          var val = (v==='Click to add...') ? '' : v;
          if (field==='move'){
            var p=SY.getPrinciples().find(function(x){return x.id===pid;}); if(!p) return;
            var mbr=Object.assign({},p.moveByReg||{what:'',why:'',who:'',how:''}); mbr[reg]=val;
            SY.updatePrinciple(pid,{moveByReg:mbr});
          } else if (field==='metric'){
            var p=SY.getPrinciples().find(function(x){return x.id===pid;}); if(!p) return;
            var tbr=Object.assign({},p.metricByReg||{what:'',why:'',who:'',how:''}); tbr[reg]=val;
            SY.updatePrinciple(pid,{metricByReg:tbr});
          }
        });
        el.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();el.blur();}});
      });
    }

    // ══ SYNC / WRITE ══════════════════════════════════════════════════════

    function _setupSync(){
      document.getElementById('sy-script-save-btn').addEventListener('click',function(){
        var url=document.getElementById('sy-script-url').value.trim();
        SY.setScriptUrl(url);
        document.getElementById('sy-script-status').textContent = url ? 'Saved.' : 'Cleared.';
        setTimeout(function(){document.getElementById('sy-script-status').textContent='';},2000);
      });
      document.getElementById('sy-fw-write-btn').addEventListener('click',_writeToSheet);
    }

    function _loadScriptUrl(){
      var url=SY.getScriptUrl();
      var inp=document.getElementById('sy-script-url');
      if(inp&&url) inp.value=url;
      var ls=SY.getLastSync();
      if(ls) document.getElementById('sy-sync-status').textContent='Last sync: '+new Date(ls).toLocaleString();
    }

    function _writeToSheet(){
      var scriptUrl=SY.getScriptUrl();
      if(!scriptUrl){alert('Paste your Apps Script URL in the panel at the bottom of this view, then save it.');return;}
      var sheetUrl=typeof getSavedSheetUrl==='function'?getSavedSheetUrl():'';
      if(!sheetUrl){alert('No sheet URL saved. Load a sheet from the home page first.');return;}

      var grid=SY.buildFrameworkGrid();
      _pendingWrite={scriptUrl:scriptUrl,sheetUrl:sheetUrl,tabName:'FRAMEWORK',grid:grid};

      // Get existing FRAMEWORK tab grid for diff
      var existing=SY.getFrameworkTabs().length?SY.getFrameworkTabs()[0].grid:null;
      var diff=SY.diffFramework(existing,grid);

      var body=document.getElementById('sy-diff-body');
      var html='<p><strong>'+diff.unchanged+'</strong> rows unchanged</p>';
      if(diff.added.length){html+='<p><strong>'+diff.added.length+'</strong> rows added:</p>';diff.added.slice(0,20).forEach(function(r){html+='<div class="sy-diff-line added">+ '+_h(r)+'</div>';});if(diff.added.length>20)html+='<div style="color:var(--md-sys-color-on-surface-variant);font-style:italic">...and '+(diff.added.length-20)+' more</div>';}
      if(diff.removed.length){html+='<p><strong>'+diff.removed.length+'</strong> rows removed:</p>';diff.removed.slice(0,20).forEach(function(r){html+='<div class="sy-diff-line removed">- '+_h(r)+'</div>';});}
      if(!diff.added.length&&!diff.removed.length) html+='<p style="color:var(--md-sys-color-on-surface-variant)">No structural changes. Move/Metric edits may still have been updated.</p>';
      body.innerHTML=html;
      document.getElementById('sy-diff-modal').classList.add('open');
    }

    document.getElementById('sy-diff-cancel').addEventListener('click',function(){document.getElementById('sy-diff-modal').classList.remove('open');_pendingWrite=null;});
    document.getElementById('sy-diff-confirm').addEventListener('click',async function(){
      if(!_pendingWrite) return;
      var btn=document.getElementById('sy-diff-confirm');
      btn.disabled=true; btn.textContent='Writing...';
      try{
        await SY.writeFramework(_pendingWrite.scriptUrl,_pendingWrite.sheetUrl,_pendingWrite.tabName,_pendingWrite.grid);
        document.getElementById('sy-diff-modal').classList.remove('open');
        document.getElementById('sy-sync-status').textContent='Written: '+new Date().toLocaleTimeString();
        _pendingWrite=null;
      }catch(e){
        alert('Write failed: '+e.message+'\n\nCheck the Apps Script URL and make sure the script is deployed as a web app accessible by "Anyone".');
      }
      btn.disabled=false; btn.textContent='Write to sheet';
    });

    function _setupExports(){
      document.getElementById('sy-fw-csv-btn').addEventListener('click',function(){_dl(SY.exportCSV(),'framework-'+Date.now()+'.csv','text/csv');});
      document.getElementById('sy-fw-md-btn').addEventListener('click',function(){_dl(SY.exportMarkdown(),'framework-'+Date.now()+'.md','text/markdown');});
    }
    function _dl(content,name,mime){var b=new Blob([content],{type:mime}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u);},2000);}

    window.addEventListener('load',function(){if(typeof injectToolNav==='function') injectToolNav('synthesis.html');});
  })();
  </script>
