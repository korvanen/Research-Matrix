<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensional Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  html, body {
    width:100%; height:100%; background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden; font-family:'Inter',sans-serif; user-select:none;
  }

  /* TOP BAR */
  .top-bar {
    position:relative; z-index:300; width:100%; background:#fff;
    box-shadow:0 1px 0 rgba(0,0,0,.08);
    display:flex; align-items:center; justify-content:center;
    padding:14px 24px; flex-shrink:0;
  }
  header { text-align:center; flex:1; }
  header h1 { font-weight:300; font-size:.72rem; letter-spacing:.42em; color:rgba(0,0,0,.38); text-transform:uppercase; }
  header p  { margin-top:5px; font-size:.44rem; letter-spacing:.16em; color:rgba(0,0,0,.2); text-transform:uppercase; }

  #status {
    position:absolute; left:24px; font-size:.42rem; letter-spacing:.12em;
    color:rgba(0,0,0,.28); text-transform:uppercase; font-weight:400;
    max-width:280px; line-height:1.4; transition:opacity 1.2s;
  }
  #status.err { color:#c0392b; }

  #view-toggle {
    position:absolute; right:24px;
    display:flex; align-items:center; gap:7px;
    background:transparent; border:1.5px solid rgba(0,0,0,.14); border-radius:20px;
    padding:6px 14px 6px 10px; cursor:pointer; font-family:'Inter',sans-serif;
    font-size:.48rem; font-weight:500; letter-spacing:.14em;
    color:rgba(0,0,0,.4); text-transform:uppercase;
    transition:background .2s,border-color .2s,color .2s; white-space:nowrap;
  }
  #view-toggle:hover  { background:rgba(0,0,0,.04); border-color:rgba(0,0,0,.22); color:rgba(0,0,0,.6); }
  #view-toggle.active { background:rgba(0,0,0,.06); border-color:rgba(0,0,0,.26); color:rgba(0,0,0,.7); }
  .toggle-icon { width:18px; height:14px; position:relative; flex-shrink:0; }
  .toggle-icon span { position:absolute; left:0; right:0; height:5px; border:1.5px solid currentColor; border-radius:1px; transition:transform .4s cubic-bezier(.4,0,.2,1); }
  .toggle-icon span:nth-child(1) { top:0; }
  .toggle-icon span:nth-child(2) { bottom:0; }
  #view-toggle.active .toggle-icon span:nth-child(1) { transform:perspective(40px) rotateX(20deg) translateX(3px); }
  #view-toggle.active .toggle-icon span:nth-child(2) { transform:perspective(40px) rotateX(20deg) translateX(-3px); }

  /* STAGE */
  #stage { flex:1; width:100%; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  #scene-inner {
    width:1360px; height:960px; flex-shrink:0;
    transform:scale(.5); transform-origin:center center; margin:-240px -340px;
  }
  .scene { width:1360px; height:960px; perspective:2800px; perspective-origin:50% 42%; }
  .stack {
    width:100%; height:100%; position:relative; transform-style:preserve-3d;
    transform:rotateX(0) rotateY(0); transition:transform .7s cubic-bezier(.4,0,.2,1); cursor:default;
  }

  /* PLANES */
  .plane {
    position:absolute; width:1280px; height:760px; left:40px; top:100px;
    transform-style:preserve-3d; border-radius:8px;
    transition:transform .7s cubic-bezier(.4,0,.2,1), opacity .5s ease; overflow:hidden;
  }
  .plane::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(160deg,rgba(255,255,255,.07) 0%,transparent 50%);
    pointer-events:none; border-radius:8px; z-index:10;
  }
  .plane-inner { position:absolute; inset:0; display:flex; flex-direction:column; padding:30px 38px 20px; }
  .plane-title { font-weight:600; font-size:1.08rem; letter-spacing:.2em; margin-bottom:16px; flex-shrink:0; text-transform:uppercase; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; flex:1; table-layout:fixed; }
  thead th {
    font-weight:500; text-transform:uppercase; letter-spacing:.1em;
    padding:8px 12px; text-align:left; font-size:.8rem;
    border-bottom:2px solid rgba(0,0,0,.1); white-space:nowrap;
  }
  thead th:first-child  { width:92px; }
  thead th:nth-child(2) { width:45%; }
  thead th:nth-child(3) { width:55%; }

  tbody tr { border-bottom:2px solid rgba(0,0,0,.06); }
  tbody tr:last-child { border-bottom:none; }
  tbody td { padding:0; vertical-align:top; }
  tbody td:first-child {
    font-weight:500; font-size:.74rem; letter-spacing:.14em;
    text-transform:uppercase; white-space:nowrap; padding:10px; vertical-align:middle;
  }

  /* Citation cell */
  .citation-cell { padding:8px 12px; overflow-y:auto; max-height:148px; }
  .citation-entry { display:flex; gap:8px; padding:4px 0; border-bottom:1px solid rgba(0,0,0,.07); font-size:.68rem; line-height:1.48; }
  .citation-entry:last-child { border-bottom:none; }
  .cid  { flex-shrink:0; font-weight:600; font-size:.6rem; letter-spacing:.04em; opacity:.38; padding-top:1px; min-width:20px; }
  .ctext { flex:1; }
  .no-data { padding:10px 12px; font-style:italic; opacity:.28; font-size:.7rem; }

  /* Subdimension cell — read-only display, same style as citation-cell */
  .subdimension-cell { padding:8px 12px; overflow-y:auto; max-height:148px; }
  .subdimension-entry { display:flex; gap:8px; padding:4px 0; border-bottom:1px solid rgba(0,0,0,.07); font-size:.68rem; line-height:1.48; }
  .subdimension-entry:last-child { border-bottom:none; }
  .stext { flex:1; }

  /* PLANE THEMES */
  .plane-1 { background:#e8f0ec; border:2px solid #81b29a; box-shadow:0 12px 80px rgba(129,178,154,.28); }
  .plane-1 .plane-title,.plane-1 thead th             { color:#3a6b52; }
  .plane-1 thead th                                   { border-bottom-color:rgba(58,107,82,.18); }
  .plane-1 thead th:first-child,.plane-1 tbody td:first-child { color:rgba(58,107,82,.4); }
  .plane-1 .citation-cell,.plane-1 .subdimension-cell { color:#2d5040; }
  .plane-1 .citation-entry,.plane-1 .subdimension-entry { border-bottom-color:rgba(58,107,82,.1); }

  .plane-2 { background:#d6d7e0; border:2px solid #3d405b; box-shadow:0 12px 80px rgba(61,64,91,.3); }
  .plane-2 .plane-title,.plane-2 thead th             { color:#1e2035; }
  .plane-2 thead th                                   { border-bottom-color:rgba(30,32,53,.18); }
  .plane-2 thead th:first-child,.plane-2 tbody td:first-child { color:rgba(30,32,53,.38); }
  .plane-2 .citation-cell,.plane-2 .subdimension-cell { color:#252740; }
  .plane-2 .citation-entry,.plane-2 .subdimension-entry { border-bottom-color:rgba(30,32,53,.1); }

  .plane-3 { background:#f7ebe6; border:2px solid #e07a5f; box-shadow:0 12px 80px rgba(224,122,95,.25); }
  .plane-3 .plane-title,.plane-3 thead th             { color:#8a3520; }
  .plane-3 thead th                                   { border-bottom-color:rgba(138,53,32,.18); }
  .plane-3 thead th:first-child,.plane-3 tbody td:first-child { color:rgba(138,53,32,.38); }
  .plane-3 .citation-cell,.plane-3 .subdimension-cell { color:#6b2a18; }
  .plane-3 .citation-entry,.plane-3 .subdimension-entry { border-bottom-color:rgba(138,53,32,.1); }

  .plane-4 { background:#fdfcf5; border:2px solid #c8c4a0; box-shadow:0 12px 80px rgba(180,174,130,.22); }
  .plane-4 .plane-title,.plane-4 thead th             { color:#5a5630; }
  .plane-4 thead th                                   { border-bottom-color:rgba(90,86,48,.14); }
  .plane-4 thead th:first-child,.plane-4 tbody td:first-child { color:rgba(90,86,48,.38); }
  .plane-4 .citation-cell,.plane-4 .subdimension-cell { color:#48451e; }
  .plane-4 .citation-entry,.plane-4 .subdimension-entry { border-bottom-color:rgba(90,86,48,.1); }

  /* BOTTOM BAR */
  .bottom-bar {
    position:relative; z-index:300; width:100%; background:#fff;
    box-shadow:0 -1px 0 rgba(0,0,0,.08);
    display:flex; flex-direction:column; align-items:center; gap:8px; padding:14px 24px 16px; flex-shrink:0;
  }
  .carousel-wrap { display:flex; align-items:center; width:240px; }
  .carousel-arrow {
    flex-shrink:0; width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer; color:rgba(0,0,0,.3);
    transition:color .18s; border-radius:50%; padding:0;
  }
  .carousel-arrow:hover { color:rgba(0,0,0,.65); }
  .dot-window { flex:1; display:flex; align-items:center; justify-content:center; gap:14px; height:28px; }
  .dot {
    width:12px; height:12px; border-radius:50%; cursor:pointer; flex-shrink:0;
    transition:opacity .3s ease, transform .3s cubic-bezier(.34,1.56,.64,1), outline .2s ease;
    outline:2px solid transparent; outline-offset:3px;
  }
  .dot:hover { opacity:.7!important; transform:scale(1.3)!important; }
  .dot.active { outline-color:rgba(0,0,0,.22); }
  .dot-label {
    font-size:.48rem; letter-spacing:.18em; color:rgba(0,0,0,.32);
    text-transform:uppercase; font-weight:400; text-align:center; min-height:1.1em; max-width:400px; transition:color .22s;
  }
</style>
</head>
<body>

<div class="top-bar">
  <span id="status">Fetching spreadsheet…</span>
  <header>
    <h1>Dimensional Framework</h1>
    <p>Click dot or arrows to switch dimension</p>
  </header>
  <button id="view-toggle" aria-pressed="false">
    <span class="toggle-icon"><span></span><span></span></span>
    3D View
  </button>
</div>

<div id="stage">
  <div id="scene-inner">
    <div class="scene">
      <div class="stack" id="stack"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="carousel-wrap">
    <button class="carousel-arrow" id="arr-left" aria-label="Previous">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M7 1L1 7L7 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="dot-window" id="dot-window"></div>
    <button class="carousel-arrow" id="arr-right" aria-label="Next">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none">
        <path d="M1 1L7 7L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="dot-label" id="hint-label"></div>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURATION — edit these if your tab names or column headers change
// ─────────────────────────────────────────────────────────────────────────────

const XLSX_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKom5SD7yrnPoGV4pzsf4f20uv0nkrZXEDRA6_-g_ZTogUVBNPzeDAr4Przl7WA9Y07ev5XNuZbhTz/pub?output=xlsx'

const PLANES = [
  { tab:'VALUES',         cls:'plane-1', color:'#81b29a', title:'The Dimension of Visions & Values' },
  { tab:'ORGANIZATIONAL', cls:'plane-2', color:'#3d405b', title:'The Organisational Dimension'      },
  { tab:'RELATIONAL',     cls:'plane-3', color:'#e07a5f', title:'The Relational Dimension'           },
  { tab:'PHYSICAL',       cls:'plane-4', color:'#c8c4a0', title:'The Physical Dimension'             },
];

const ROWS = [
  { label:'WHAT?', keys:['WHAT','MORPHOLOGY'] },
  { label:'WHO?',  keys:['WHO','AGENCY']       },
  { label:'WHY?',  keys:['WHY','TELEOLOGY']    },
  { label:'HOW?',  keys:['HOW','PRAXIS']       },
];

const COL_ID_KEYS           = ['ID','NO.','NO ','NUM','#'];
const COL_CITATION_KEYS     = ['CITATION','REFERENCE','SOURCE','FULL CIT','APA'];
const COL_SUBDIMENSION_KEYS = ['SUBDIMENSION', ,'SUB-DIMENSION','SUB DIMENSION','SUBDIM','DIMENSION'];
const COL_CATEGORY_KEYS     = ['CATEGORY','ROW','TYPE','DIMENSION ROW','One of the options'];

// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────

const GAP = 144, N = PLANES.length, VISIBLE = 3;
const VIEW_FLAT   = { rotX:0,   rotY:0  };
const VIEW_ANGLED = { rotX:-20, rotY:15 };
let is3D = false, order = [0,1,2,3], animating = false;

// ─────────────────────────────────────────────────────────────────────────────
// DOM REFS
// ─────────────────────────────────────────────────────────────────────────────

const stackEl   = document.getElementById('stack');
const hintLabel = document.getElementById('hint-label');
const toggleBtn = document.getElementById('view-toggle');
const dotWindow = document.getElementById('dot-window');
const arrLeft   = document.getElementById('arr-left');
const arrRight  = document.getElementById('arr-right');
const statusEl  = document.getElementById('status');

function setStatus(msg, isErr=false) {
  statusEl.textContent = msg;
  statusEl.classList.toggle('err', isErr);
  statusEl.style.opacity = '1';
}

// ─────────────────────────────────────────────────────────────────────────────
// BUILD PLANE HTML SHELLS
// ─────────────────────────────────────────────────────────────────────────────

const planeEls = PLANES.map((p, pi) => {
  const el = document.createElement('div');
  el.className = `plane ${p.cls}`;
  el.dataset.planeIdx = pi;

  el.innerHTML = `
    <div class="plane-inner">
      <div class="plane-title">${p.title}</div>
      <table>
        <thead><tr>
          <th></th>
          <th>Citation</th>
          <th>Subdimension</th>
        </tr></thead>
        <tbody>
          ${ROWS.map((r, ri) => `
            <tr>
              <td>${r.label}</td>
              <td class="citation-cell" id="cc-${pi}-${ri}">
                <span class="no-data">Loading…</span>
              </td>
              <td class="subdimension-cell" id="sc-${pi}-${ri}">
                <span class="no-data">Loading…</span>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  stackEl.appendChild(el);
  return el;
});

// ─────────────────────────────────────────────────────────────────────────────
// XLSX PARSING HELPERS
// ─────────────────────────────────────────────────────────────────────────────

const norm = s => String(s ?? '').toUpperCase().trim();

function findColIdx(headers, ...keyGroups) {
  const h = headers.map(norm);
  for (const keys of keyGroups) {
    for (let i = 0; i < h.length; i++) {
      if (keys.some(k => h[i].includes(k))) return i;
    }
  }
  return -1;
}

function matchRowLabel(cellVal) {
  const v = norm(cellVal);
  return ROWS.findIndex(r => r.keys.some(k => v.includes(k)));
}

function parseTab(ws, tabName) {
  // Returns { WHAT:[], WHO:[], WHY:[], HOW:[] }
  // Each array entry: { id, cit, sub }  ← sub is the new subdimension field
  const result = { WHAT:[], WHO:[], WHY:[], HOW:[] };
  const rowKeys = ['WHAT','WHO','WHY','HOW'];

  const aoa = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
  if (!aoa.length) { console.warn(`[${tabName}] Sheet is empty`); return result; }

  console.group(`[${tabName}] Raw sheet (first 8 rows):`);
  aoa.slice(0, 8).forEach((r, i) => console.log(`Row ${i}:`, r));
  console.groupEnd();

  // Header row is always row index 2 (the 3rd row)
  let hdrIdx = 2;

  if (hdrIdx >= 0) {
    const headers = aoa[hdrIdx];
    const iId  = findColIdx(headers, COL_ID_KEYS);
    const iCit = findColIdx(headers, COL_CITATION_KEYS);
    const iSub = findColIdx(headers, COL_SUBDIMENSION_KEYS);
    const iCat = findColIdx(headers, COL_CATEGORY_KEYS);

    console.log(`[${tabName}] Header row ${hdrIdx} → id:${iId} citation:${iCit} subdimension:${iSub} category:${iCat}`);
    console.log(`[${tabName}] Headers:`, headers);

    if (iSub < 0) console.warn(`[${tabName}] No subdimension column found. Headers:`, headers.map(norm));
    if (iCit < 0) console.warn(`[${tabName}] No citation column found. Headers:`, headers.map(norm));

    for (let i = hdrIdx + 1; i < aoa.length; i++) {
      const row = aoa[i];
      if (!row || row.every(c => !norm(c))) continue;

      // Need at least citation OR subdimension to be worth including
      const cit = iCit >= 0 ? String(row[iCit] ?? '').trim() : '';
      const sub = iSub >= 0 ? String(row[iSub] ?? '').trim() : '';
      if (!cit && !sub) continue;

      const id  = norm(iId >= 0 ? row[iId] : String(i - hdrIdx));
      const cat = norm(iCat >= 0 ? row[iCat] : '');
      const ri  = matchRowLabel(cat);

      const entry = { id: id || String(i - hdrIdx), cit, sub };

      if (ri >= 0) {
        result[rowKeys[ri]].push(entry);
      } else {
        // Fallback: try first column as category
        const firstColRi = matchRowLabel(row[0]);
        if (firstColRi >= 0) {
          result[rowKeys[firstColRi]].push(entry);
        }
      }
    }

  } else {
    // Strategy 2: no header — col A = category, col B = citation, col C = subdimension
    console.warn(`[${tabName}] No header row found. Trying fallback layout.`);
    for (let i = 0; i < aoa.length; i++) {
      const row = aoa[i];
      if (!row || row.every(c => !norm(c))) continue;
      const ri = matchRowLabel(row[0]);
      if (ri >= 0) {
        const cit = String(row[1] ?? '').trim();
        const sub = String(row[2] ?? '').trim();
        if (cit || sub) result[rowKeys[ri]].push({ id: String(i + 1), cit, sub });
      }
    }
  }

  console.log(`[${tabName}] Parsed:`, Object.fromEntries(Object.entries(result).map(([k,v])=>[k,v.length])));
  return result;
}

// ─────────────────────────────────────────────────────────────────────────────
// FILL PLANE CELLS
// ─────────────────────────────────────────────────────────────────────────────

function fillPlane(pi, data) {
  const rowKeys = ['WHAT','WHO','WHY','HOW'];
  ROWS.forEach((_, ri) => {
    const citCell = document.getElementById(`cc-${pi}-${ri}`);
    const subCell = document.getElementById(`sc-${pi}-${ri}`);
    const entries = data[rowKeys[ri]] || [];

    // ── Citation column ──
    if (citCell) {
      const citEntries = entries.filter(e => e.cit);
      if (!citEntries.length) {
        citCell.innerHTML = '<span class="no-data">—</span>';
      } else {
        citCell.innerHTML = citEntries.map(e =>
          `<div class="citation-entry">
            <span class="cid">${e.id}</span>
            <span class="ctext">${e.cit}</span>
          </div>`
        ).join('');
      }
    }

    // ── Subdimension column ──
    if (subCell) {
      const subEntries = entries.filter(e => e.sub);
      if (!subEntries.length) {
        subCell.innerHTML = '<span class="no-data">—</span>';
      } else {
        subCell.innerHTML = subEntries.map(e =>
          `<div class="subdimension-entry">
            <span class="cid">${e.id}</span>
            <span class="stext">${e.sub}</span>
          </div>`
        ).join('');
      }
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOAD
// ─────────────────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    setStatus('Fetching spreadsheet…');
    const res = await fetch(XLSX_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

    setStatus('Parsing…');
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });

    console.log('All sheet names:', wb.SheetNames);

    const findTab = target => {
      const t = norm(target);
      return wb.SheetNames.find(n => norm(n) === t)
          || wb.SheetNames.find(n => norm(n).includes(t) || t.includes(norm(n)));
    };

    let totalEntries = 0;

    for (let pi = 0; pi < PLANES.length; pi++) {
      const p       = PLANES[pi];
      const tabName = findTab(p.tab);

      if (!tabName) {
        console.error(`Tab "${p.tab}" not found. Available:`, wb.SheetNames);
        ROWS.forEach((_, ri) => {
          const cc = document.getElementById(`cc-${pi}-${ri}`);
          const sc = document.getElementById(`sc-${pi}-${ri}`);
          const msg = `<span class="no-data" style="color:#c0392b">Tab not found: "${p.tab}"</span>`;
          if (cc) cc.innerHTML = msg;
          if (sc) sc.innerHTML = msg;
        });
        continue;
      }

      const data = parseTab(wb.Sheets[tabName], tabName);
      fillPlane(pi, data);
      totalEntries += Object.values(data).reduce((s, a) => s + a.length, 0);
    }

    setStatus(`${totalEntries} entr${totalEntries !== 1 ? 'ies' : 'y'} loaded`);
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);

  } catch (err) {
    console.error('Failed to load spreadsheet:', err);
    setStatus(`Load failed: ${err.message}`, true);
    document.querySelectorAll('.no-data').forEach(el => { el.textContent = 'Error loading data'; });
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// CAROUSEL DOTS
// ─────────────────────────────────────────────────────────────────────────────

const dotEls = PLANES.map((p, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.style.background = p.color;
  dotWindow.appendChild(d);
  d.addEventListener('click', e => { e.stopPropagation(); if (!animating) bringToTop(i); });
  d.addEventListener('mouseenter', () => { hintLabel.textContent = p.title.toUpperCase(); hintLabel.style.color = 'rgba(0,0,0,.55)'; });
  d.addEventListener('mouseleave', refreshHint);
  return d;
});

arrLeft.addEventListener('click',  () => { if (!animating) bringToTop((order[0] + N - 1) % N); });
arrRight.addEventListener('click', () => { if (!animating) bringToTop((order[0] + 1) % N); });

function renderCarousel() {
  dotEls.forEach((d, i) => {
    const dist   = (i - order[0] + N) % N;
    const signed = dist > N / 2 ? dist - N : dist;
    const half   = Math.floor(VISIBLE / 2);
    if (Math.abs(signed) <= half) {
      d.style.display   = 'block';
      d.style.opacity   = signed === 0 ? '1' : String(Math.max(0, 0.35 - Math.abs(signed) * 0.05));
      d.style.transform = `scale(${signed === 0 ? 1.55 : Math.max(0.1, 1 - Math.abs(signed) * 0.22)})`;
      d.classList.toggle('active', signed === 0);
    } else {
      d.style.display = 'none';
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// STACK / CAROUSEL ANIMATION
// ─────────────────────────────────────────────────────────────────────────────

function getZ(sp) { return (N - 1 - sp) * GAP; }

function refreshHint() {
  hintLabel.textContent = PLANES[order[0]].title.toUpperCase();
  hintLabel.style.color = 'rgba(0,0,0,.3)';
}

function syncUI() {
  planeEls.forEach((el, i) => { el.dataset.top = order[0] === i ? 'true' : 'false'; });
  renderCarousel();
  refreshHint();
}

function applyPositions(animated = true) {
  order.forEach((pi, sp) => {
    const el = planeEls[pi];
    el.style.transition = animated ? 'transform .65s cubic-bezier(.4,0,.2,1), opacity .5s ease' : 'none';
    el.style.transform  = `translateZ(${getZ(sp)}px)`;
    el.style.zIndex     = N - sp;
    el.style.opacity    = sp === 0 ? '1' : (0.82 - sp * 0.08).toFixed(2);
  });
  syncUI();
}

function cycleOnce(done) {
  animating = true;
  if (document.activeElement?.classList.contains('cell')) document.activeElement.blur();
  const ti = order[0], el = planeEls[ti];
  el.style.transition = 'transform .4s cubic-bezier(.4,0,.2,1), opacity .3s ease';
  el.style.transform  = `translateZ(${getZ(0) + 400}px)`;
  el.style.opacity    = '0';
  setTimeout(() => {
    order.push(order.shift());
    el.style.transition = 'none';
    el.style.transform  = `translateZ(${getZ(N - 1) - 100}px)`;
    el.style.opacity    = '0';
    setTimeout(() => { applyPositions(true); animating = false; if (done) done(); }, 40);
  }, 380);
}

function bringToTop(t) {
  if (order[0] === t || animating) return;
  function step() { if (order[0] !== t) cycleOnce(step); }
  step();
}

// ─────────────────────────────────────────────────────────────────────────────
// VIEW TOGGLE
// ─────────────────────────────────────────────────────────────────────────────

function applyView() {
  const v = is3D ? VIEW_ANGLED : VIEW_FLAT;
  stackEl.style.transform = `rotateX(${v.rotX}deg) rotateY(${v.rotY}deg)`;
  toggleBtn.classList.toggle('active', is3D);
  toggleBtn.setAttribute('aria-pressed', is3D);
}

toggleBtn.addEventListener('click', () => { is3D = !is3D; applyView(); });

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────

applyPositions(false);
applyView();
renderCarousel();
refreshHint();
loadData();
</script>
</body>
</html>
