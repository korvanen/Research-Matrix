<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensional Framework</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;background:#fff;display:flex;flex-direction:column;align-items:center;overflow:hidden;font-family:'Inter',sans-serif}

  .top-bar{position:relative;z-index:300;width:100%;background:#fff;box-shadow:0 1px 0 rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;padding:14px 24px;flex-shrink:0}
  header{text-align:center;flex:1}
  header h1{font-weight:300;font-size:.72rem;letter-spacing:.42em;color:rgba(0,0,0,.38);text-transform:uppercase}
  header p{margin-top:5px;font-size:.44rem;letter-spacing:.16em;color:rgba(0,0,0,.2);text-transform:uppercase}
  #status{position:absolute;left:24px;font-size:.42rem;letter-spacing:.12em;color:rgba(0,0,0,.28);text-transform:uppercase;font-weight:400;max-width:260px;line-height:1.4;transition:opacity 1.2s}
  #status.err{color:#c0392b}
  .top-bar-right{position:absolute;right:24px;display:flex;align-items:center;gap:8px}
  .tbtn{display:flex;align-items:center;gap:7px;background:transparent;border:1.5px solid rgba(0,0,0,.14);border-radius:20px;padding:6px 14px 6px 10px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.48rem;font-weight:500;letter-spacing:.14em;color:rgba(0,0,0,.4);text-transform:uppercase;transition:background .2s,border-color .2s,color .2s;white-space:nowrap}
  .tbtn:hover{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.22);color:rgba(0,0,0,.6)}
  .tbtn.active{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.26);color:rgba(0,0,0,.7)}
  .toggle-icon{width:18px;height:14px;position:relative;flex-shrink:0}
  .toggle-icon span{position:absolute;left:0;right:0;height:5px;border:1.5px solid currentColor;border-radius:1px;transition:transform .4s cubic-bezier(.4,0,.2,1)}
  .toggle-icon span:nth-child(1){top:0}
  .toggle-icon span:nth-child(2){bottom:0}
  #view-toggle.active .toggle-icon span:nth-child(1){transform:perspective(40px) rotateX(20deg) translateX(3px)}
  #view-toggle.active .toggle-icon span:nth-child(2){transform:perspective(40px) rotateX(20deg) translateX(-3px)}
  .panel-icon{width:16px;height:13px;display:flex;flex-direction:column;justify-content:space-between;flex-shrink:0}
  .panel-icon span{display:block;height:1.5px;background:currentColor;border-radius:1px;transition:width .25s ease}
  .panel-icon span:nth-child(1){width:100%}
  .panel-icon span:nth-child(2){width:60%}
  .panel-icon span:nth-child(3){width:100%}
  #panel-open-btn.active .panel-icon span:nth-child(2){width:100%}

  #stage-wrap{flex:1;width:100%;display:flex;overflow:hidden;min-height:0}
  #stage{flex:1;min-width:0;overflow:hidden;min-height:0;display:flex;align-items:center;justify-content:center;position:relative}
  #scene-inner{position:absolute;top:50%;left:50%;transform-origin:center center}
  .scene{perspective:2800px;perspective-origin:50% 42%}
  .stack{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1)}

  #cluster-panel{width:0;flex-shrink:0;overflow:hidden;background:#f7f7f8;border-left:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;transition:width .52s cubic-bezier(.4,0,.2,1);z-index:200}
  #cluster-panel.open{width:380px}
  #panel-inner{width:380px;height:100%;display:flex;flex-direction:column;overflow:hidden}
  #panel-head{padding:18px 20px 14px;flex-shrink:0;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  #panel-head-text{flex:1;min-width:0}
  #panel-title{font-size:.52rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.55)}
  #panel-subtitle{margin-top:5px;font-size:.42rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.3);line-height:1.5}
  #panel-close{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.07);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,.4);transition:background .15s,color .15s;font-size:14px;line-height:1}
  #panel-close:hover{background:rgba(0,0,0,.14);color:rgba(0,0,0,.7)}
  #panel-body{flex:1;overflow-y:auto;padding:14px 16px 20px;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent;display:flex;flex-direction:column;gap:10px}
  #panel-body::-webkit-scrollbar{width:4px}
  #panel-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
  #highlight-toggle{display:none;align-items:center;gap:5px;background:transparent;border:1.5px solid rgba(0,0,0,.14);border-radius:14px;padding:4px 10px 4px 8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:.42rem;font-weight:500;letter-spacing:.12em;color:rgba(0,0,0,.38);text-transform:uppercase;transition:background .18s,border-color .18s,color .18s;white-space:nowrap;margin-top:8px}
  #highlight-toggle.visible{display:flex}
  #highlight-toggle:hover{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.22);color:rgba(0,0,0,.58)}
  #highlight-toggle.active{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.3);color:rgba(0,0,0,.7)}
  .hl-icon{width:12px;height:12px;flex-shrink:0;position:relative}
  .hl-icon::before,.hl-icon::after{content:'';position:absolute;left:0;right:0;height:2.5px;background:currentColor;border-radius:1px}
  .hl-icon::before{top:2px}
  .hl-icon::after{bottom:2px}
  mark.kw{background:transparent;color:inherit;border-bottom:2px solid var(--g-border,currentColor);padding:0;border-radius:0;font-weight:600}

  /* Each matched entry is now its own card */
  .panel-group{display:flex;flex-direction:column;gap:10px;margin-bottom:0}
  @keyframes grp-in{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
  .pe{border-radius:8px;overflow:hidden;border:1.5px solid var(--g-border);box-shadow:0 3px 18px var(--g-shadow);animation:pe-in .3s cubic-bezier(.34,1.2,.64,1) both;animation-delay:var(--ed,0ms);cursor:pointer}
  @keyframes pe-in{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
  .pe-head{padding:8px 14px 7px;background:var(--g-border);display:flex;align-items:center;gap:8px;flex-wrap:nowrap;position:relative}
  .pe-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.7)}
  .pe-dim{font-size:.42rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.9);flex:0 0 auto;min-width:0}
  .pe-cat-line{font-size:.4rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:500;width:auto;white-space:nowrap}
  .pe-body{padding:10px 14px;background:var(--g-bg);transition:background .15s}
  .pe:hover .pe-body{background:color-mix(in srgb,var(--g-bg) 88%,var(--g-border) 12%)}
  .pe.expanded .pe-body{background:color-mix(in srgb,var(--g-bg) 82%,var(--g-border) 18%)}
  .pe-field{font-size:.6rem;line-height:1.5;color:var(--g-text);word-break:break-word;margin-top:3px}
  .pe-field.srch{color:var(--g-label);font-style:italic}
  .pe-flabel{font-size:.38rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.55;margin-right:4px;color:var(--g-label)}
  .pe-goto{display:none;margin-top:10px;width:100%;padding:6px 0;border-radius:6px;border:1.5px solid var(--g-border);background:transparent;color:var(--g-border);font-family:'Inter',sans-serif;font-size:.42rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .15s,color .15s}
  .pe-goto:hover{background:var(--g-border);color:#fff}
  .pe.expanded .pe-goto{display:block}
  .pg-section{margin-bottom:16px}
  .pg-section:last-child{margin-bottom:0}

  #seed-card{border-radius:8px;overflow:hidden;border:2px solid var(--sc-border,rgba(0,0,0,.18));box-shadow:0 3px 18px var(--sc-shadow,rgba(0,0,0,.08));background:var(--sc-bg,#fff);animation:grp-in .28s cubic-bezier(.34,1.2,.64,1) both;flex-shrink:0}
  #sc-head{padding:8px 14px 7px;background:var(--sc-border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  #sc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.7)}
  #sc-label{font-size:.42rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.9);flex:1}
  #sc-cat{font-size:.4rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.65);font-weight:500}
  .sc-badge{font-size:.36rem;letter-spacing:.14em;text-transform:uppercase;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.22);color:rgba(255,255,255,.95);font-weight:700;flex-shrink:0;border:1px solid rgba(255,255,255,.3)}
  #sc-body{padding:10px 14px;background:var(--sc-bg)}
  .sc-field{font-size:.6rem;line-height:1.5;color:var(--sc-text);word-break:break-word;margin-top:4px}
  .sc-field.srch{color:var(--sc-label);font-style:italic}
  .sc-flabel{font-size:.38rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.55;margin-right:4px;color:var(--sc-label)}

  .plane{position:absolute;transform-style:preserve-3d;border-radius:8px;transition:transform .7s cubic-bezier(.4,0,.2,1),opacity .5s ease,width .52s cubic-bezier(.4,0,.2,1),height .52s cubic-bezier(.4,0,.2,1),left .52s cubic-bezier(.4,0,.2,1);overflow:hidden;font-size:16px;background:var(--p-bg);border:2px solid var(--p-border);color:var(--p-text)}
  .plane::after{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(255,255,255,.07) 0%,transparent 50%);pointer-events:none;border-radius:8px;z-index:10}
  .resize-handle{position:absolute;bottom:0;right:0;z-index:200;width:28px;height:28px;cursor:nwse-resize;display:flex;align-items:flex-end;justify-content:flex-end;padding:0 6px 6px 0;opacity:0;transition:opacity .2s;user-select:none;color:var(--p-label)}
  .plane:hover .resize-handle{opacity:1}
  .plane-inner{position:absolute;inset:0;display:flex;flex-direction:column;padding:30px 38px 20px}
  .plane-title{font-weight:600;font-size:1.08rem;letter-spacing:.2em;margin-bottom:12px;flex-shrink:0;text-transform:uppercase;color:var(--p-heading);user-select:none}

  .table-wrap{--w-cat:40px;--w-sub:80px}
  .table-wrap{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:var(--p-label) transparent;display:flex;flex-direction:column;padding-right:14px}
  .table-wrap::-webkit-scrollbar{width:5px}
  .table-wrap::-webkit-scrollbar-thumb{background:var(--p-label);border-radius:3px}

  .hdr-row{display:flex;border-bottom:2px solid var(--p-rule);position:sticky;top:0;z-index:5;background:var(--p-bg);flex-shrink:0}
  .hdr-gutter{flex-shrink:0;width:var(--w-cat)}
  .hdr-sub-gutter{flex-shrink:0;width:var(--w-sub)}
  .hdr-cells{flex:1;display:flex;min-width:0}
  .hdr-cell{flex-shrink:1;flex-basis:0;min-width:0;padding:6px 10px 5px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;border-left:1px solid var(--p-rule);cursor:pointer;user-select:none;position:relative}
  .hdr-cell:first-child{border-left:none}
  .hdr-cell-name{font-weight:500;text-transform:uppercase;letter-spacing:.1em;font-size:.75rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--p-heading);width:100%;padding:3px 6px;border-radius:12px;border:1.5px solid transparent;transition:border-color .25s,background .25s,color .25s}
  .hdr-cell.srch-on .hdr-cell-name{border-color:var(--p-border);background:rgba(0,0,0,.04);color:var(--p-border)}
  .srch-pill{font-size:.36rem;font-style:italic;letter-spacing:.1em;color:var(--p-border);font-weight:500;white-space:nowrap;padding:0 6px;opacity:0;pointer-events:none;transition:none}
  .hdr-cell.srch-on .srch-pill{animation:pill-flash 1.8s ease forwards}
  @keyframes pill-flash{0%{opacity:0;transform:translateY(3px)}15%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0}}

  .cat-group{display:flex;border-bottom:2px solid var(--p-rule)}
  .cat-group:last-child{border-bottom:none}
  .cat-label{flex-shrink:0;width:var(--w-cat);padding:10px 8px 10px 0;display:flex;align-items:flex-start;font-weight:600;font-size:.74rem;letter-spacing:.14em;text-transform:uppercase;color:var(--p-label);user-select:none;cursor:default}
  .cat-right{flex:1;display:flex;flex-direction:column;min-width:0;border-left:1px solid var(--p-rule)}
  .sub-group{display:flex;border-bottom:1px solid var(--p-entry-rule)}
  .sub-group:last-child{border-bottom:none}
  .sub-label{flex-shrink:0;width:var(--w-sub);padding:8px 6px 8px 8px;display:flex;align-items:flex-start;font-weight:500;font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--p-label);opacity:.7;user-select:none;cursor:default;border-right:1px solid var(--p-entry-rule)}
  .sub-entries{flex:1;display:flex;flex-direction:column;min-width:0}

  .entry-row{display:flex;width:100%;border-bottom:1px solid var(--p-entry-rule)}
  .entry-row:last-child{border-bottom:none}

  .ecell{flex-shrink:1;flex-basis:0;min-width:0;padding:7px 10px;font-size:.68rem;line-height:1.5;color:var(--p-text);word-break:break-word;border-left:1px solid var(--p-entry-rule);transition:background .22s,box-shadow .22s;cursor:pointer;position:relative}
  .ecell:first-child{border-left:none}
  .ecell:hover{background:var(--p-hover)}
  .ecell.not-searchable{cursor:default}
  .ecell-text{display:block;pointer-events:none}

  .entry-row.muted{opacity:.1;filter:saturate(.15);pointer-events:none}

  .ecell.seed-cell{background:var(--p-cluster-seed)!important;box-shadow:0 0 0 2px var(--p-border),0 0 20px var(--p-shadow);animation:spulse 2s ease-in-out infinite;z-index:1}
  .ecell.match-cell{background:var(--p-cluster-match)!important;box-shadow:0 0 0 1px var(--p-border-faint),0 0 12px var(--p-shadow-faint);animation:mglow 2.6s ease-in-out infinite;animation-delay:var(--gd,0s);z-index:1}
  .ecell.seed-cell+.ecell.seed-cell{border-left:none;clip-path:inset(-20px -20px -20px 0)}
  .ecell.seed-cell:has(+.ecell.seed-cell){clip-path:inset(-20px 0 -20px -20px)}
  .ecell.match-cell+.ecell.match-cell{border-left:none;clip-path:inset(-20px -20px -20px 0)}
  .ecell.match-cell:has(+.ecell.match-cell){clip-path:inset(-20px 0 -20px -20px)}
  @keyframes spulse{0%,100%{box-shadow:0 0 0 2px var(--p-border),0 0 18px var(--p-shadow)}50%{box-shadow:0 0 0 2px var(--p-border),0 0 40px var(--p-shadow)}}
  @keyframes mglow{0%,100%{box-shadow:0 0 0 1px var(--p-border-faint),0 0 8px var(--p-shadow-faint)}50%{box-shadow:0 0 0 1px var(--p-border-faint),0 0 24px var(--p-shadow-faint)}}

  .no-data{padding:10px 12px;font-style:italic;opacity:.28;font-size:.7rem}

  .bottom-bar{position:relative;z-index:300;width:100%;background:#fff;box-shadow:0 -1px 0 rgba(0,0,0,.08);display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 24px 16px;flex-shrink:0}
  .carousel-wrap{display:flex;align-items:center;width:240px}
  .carr-arrow{flex-shrink:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:rgba(0,0,0,.3);transition:color .18s;border-radius:50%;padding:0}
  .carr-arrow:hover{color:rgba(0,0,0,.65)}
  .dot-window{flex:1;display:flex;align-items:center;justify-content:center;gap:14px;height:28px}
  .dot{width:12px;height:12px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1),outline .2s;outline:2px solid transparent;outline-offset:3px}
  .dot:hover{opacity:.7!important;transform:scale(1.3)!important}
  .dot.active{outline-color:rgba(0,0,0,.22)}
  .dot-label{font-size:.48rem;letter-spacing:.18em;color:rgba(0,0,0,.32);text-transform:uppercase;font-weight:400;text-align:center;min-height:1.1em;max-width:400px;transition:color .22s}

  /* Overrides for sidebar field tags and single-line header */
  .pe-field, .sc-field { position: relative; padding-right: 56px; }
  .cell-tag {
    position: absolute; right: 0; bottom: 0;
    font-size: .36rem; letter-spacing: .14em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 10px; border: 1px solid currentColor; opacity: .85;
  }
  .pe .cell-tag { color: var(--g-label); border-color: var(--g-border); background: rgba(255,255,255,.14); }
  #seed-card .cell-tag { color: var(--sc-label); border-color: var(--sc-border); background: rgba(255,255,255,.14); }
  
  .empty-placeholder {
  opacity: .35;
  font-style: italic;
}
  
  
</style>
</head>
<body>
<div class="top-bar">
  <span id="status">Fetching spreadsheet…</span>
  <header>
    <h1>Dimensional Framework</h1>
    <p>Click any cell to add it to the match · click empty space to clear</p>
  </header>
  <div class="top-bar-right">
    <button id="panel-open-btn" class="tbtn" aria-pressed="false">
      <span class="panel-icon"><span></span><span></span><span></span></span>Related
    </button>
    <button id="view-toggle" class="tbtn" aria-pressed="false">
      <span class="toggle-icon"><span></span><span></span></span>3D View
    </button>
  </div>
</div>

<div id="stage-wrap">
  <div id="stage">
    <div id="scene-inner">
      <div class="scene"><div class="stack" id="stack"></div></div>
    </div>
  </div>
  <div id="cluster-panel">
    <div id="panel-inner">
      <div id="panel-head">
        <div id="panel-head-text">
          <div id="panel-title">Related Entries</div>
          <div id="panel-subtitle"></div>
          <button id="highlight-toggle"><span class="hl-icon"></span>Highlight keywords</button>
        </div>
        <button id="panel-close">✕</button>
      </div>
      <div id="panel-body"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="carousel-wrap">
    <button class="carr-arrow" id="arr-left" aria-label="Previous">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7L7 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="dot-window" id="dot-window"></div>
    <button class="carr-arrow" id="arr-right" aria-label="Next">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M1 1L7 7L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="dot-label" id="hint-label"></div>
</div>

<script>
'use strict';

function shift(hex,{h=0,s=0,l=0,a=1}={}){
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b);
  let hh=0,ss=0,ll=(mx+mn)/2;
  if(mx!==mn){const d=mx-mn;ss=ll>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:hh=((g-b)/d+(g<b?6:0))/6;break;case g:hh=((b-r)/d+2)/6;break;case b:hh=((r-g)/d+4)/6;break;}}
  hh=((hh*360+h)%360+360)%360;ss=Math.max(0,Math.min(100,ss*100+s));ll=Math.max(0,Math.min(100,ll*100+l));
  return a<1?`hsla(${hh.toFixed(1)},${ss.toFixed(1)}%,${ll.toFixed(1)}%,${a})`:`hsl(${hh.toFixed(1)},${ss.toFixed(1)}%,${ll.toFixed(1)}%)`;
}
function mkPlane(border){
  return{border,
    get bg(){return shift(this.border,{l:40})},get dot(){return this.border},
    get text(){return shift(this.border,{l:-20,s:-20})},get heading(){return shift(this.border,{l:-20,s:-20})},
    get label(){return shift(this.border,{l:-20,s:-20})},get rule(){return shift(this.border,{l:15})},
    get entryRule(){return shift(this.border,{l:20})},get hover(){return shift(this.border,{l:28,a:.55})},
    get shadow(){return shift(this.border,{a:.28})},get shadowFaint(){return shift(this.border,{l:10,a:.18})},
    get borderFaint(){return shift(this.border,{l:10,a:.5})},
    get clusterSeed(){return shift(this.border,{l:30,a:.65})},get clusterMatch(){return shift(this.border,{l:33,a:.40})},
  };
}
const PLANE_COLORS=[mkPlane('#81b29a'),{...mkPlane('#5a3f86'),get bg(){return shift(this.border,{l:60})}},mkPlane('#535fc1'),mkPlane('#bb463c')];

// extractTag: if the last whitespace-separated token of a string is exactly (something), return {display, tag}.
function extractTag(raw){
  const s=String(raw??'').trimEnd();
  const m=s.match(/^([\s\S]*?)(?:^| )(\([^()]+\))$/);
  if(!m)return{display:s,tag:''};
  const tag=m[2].slice(1,-1).trim();
  const display=m[1].trimEnd();
  return{display,tag};
}

function extractKW(text){
  return[...new Set(String(text).toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(w=>w.length>=MIN_KW&&!STOP_WORDS.has(w)))];
}
function highlightKW(text,kwSet){
  if(!kwSet||!kwSet.size)return escH(text);
  const pat=new RegExp(`\\b(${[...kwSet].map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')})\\b`,'gi');
  return escH(text).replace(pat,m=>`<mark class="kw">${m}</mark>`);
}
function emptyMsg(t='Click a cell to find related entries'){return`<div style="padding:24px 4px;font-size:.6rem;color:rgba(0,0,0,.3);text-align:center;letter-spacing:.1em;text-transform:uppercase;">${t}</div>`;}

function parseTab(ws){
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  if(aoa.length<2)return{cats:[],cols:[]};
  const row0=aoa[0];
  const includedCols=new Set();
  row0.forEach((cell,ci)=>{if(String(cell??'').toUpperCase().includes('COLUMN'))includedCols.add(ci);});
  let hdrRowIdx=-1;
  for(let ri=0;ri<aoa.length;ri++){if(String(aoa[ri][0]??'').trim()==='HEADER ROW'){hdrRowIdx=ri;break;}}
  if(hdrRowIdx<0||hdrRowIdx>=aoa.length-1)return{cats:[],cols:[]};
  const hdrRow=aoa[hdrRowIdx];
  const cols=[];
  for(let ci=3;ci<hdrRow.length;ci++){
    if(!includedCols.has(ci))continue;
    cols.push({ci,label:String(hdrRow[ci]??'').trim()||`Col ${ci}`,searchable:false});
  }
  const catOrder=[],catMap={};
  for(let ri=hdrRowIdx+1;ri<aoa.length;ri++){
    const row=aoa[ri];
    if(!row||row.every(c=>String(c??'').trim()===''))continue;
    const catVal=String(row[1]??'').trim();if(!catVal)continue;
    const subVal=String(row[2]??'').trim();
    if(!catMap[catVal]){catMap[catVal]={subOrder:[],subMap:{}};catOrder.push(catVal);}
    const cm=catMap[catVal];
    if(!cm.subMap[subVal]){cm.subMap[subVal]=[];cm.subOrder.push(subVal);}
    const values={};const tags={};
    cols.forEach(col=>{
      const raw=String(row[col.ci]??'').trim();
      const{display,tag}=extractTag(raw);
      values[col.ci]=display;
      if(tag)tags[col.ci]=tag;
    });
    cm.subMap[subVal].push({id:String(ri-hdrRowIdx),values,tags});
  }
  return{cats:catOrder.map(val=>({val,subs:catMap[val].subOrder.map(sv=>({val:sv,entries:catMap[val].subMap[sv]}))})),cols};
}

// Selection
let activeSeedCells=new Set();
let hlOn=true;

function toggleCell(ecell){
  if(activeSeedCells.has(ecell)){
    activeSeedCells.delete(ecell);
    ecell.classList.remove('seed-cell');
    if(activeSeedCells.size===0){
      clearMatchState();
      showPanelEmpty();
      return;
    }
  } else {
    activeSeedCells.add(ecell);
    ecell.classList.add('seed-cell');
  }
  runCluster();
}

function clearMatchState(){
  document.querySelectorAll('.entry-row.muted').forEach(r=>r.classList.remove('muted'));
  document.querySelectorAll('.ecell.match-cell').forEach(ec=>ec.classList.remove('match-cell'));
}

function clearAll(){
  activeSeedCells.forEach(ec=>ec.classList.remove('seed-cell'));
  activeSeedCells.clear();
  clearMatchState();
}

function showPanelEmpty(msg){
  panelSub.textContent=msg||'Click a cell to find related entries';
  panelBody.innerHTML=emptyMsg(msg);
  hlToggle.classList.remove('visible','active');
}

function runCluster(){
  if(activeSeedCells.size===0){clearAll();showPanelEmpty();return;}

  // Build per-cell seeds; and which categories are allowed per plane
  const seeds=[];
  const allKws=new Set();
  const allowedCatsByPlane=new Map();
  activeSeedCells.forEach(ec=>{
    const row=ec.closest('.entry-row'); if(!row) return;
    const pi=parseInt(ec.dataset.planeIdx);
    const ci=parseInt(ec.dataset.ci);
    const cat=row.dataset.catVal;
    const kws=new Set(extractKW(ec.querySelector('.ecell-text')?.textContent||''));
    seeds.push({pi,ci,cat,kws});
    kws.forEach(k=>allKws.add(k));
    if(!allowedCatsByPlane.has(pi))allowedCatsByPlane.set(pi,new Set());
    allowedCatsByPlane.get(pi).add(cat);
  });

  // Seed rows never muted
  const seedRows=new Set();
  activeSeedCells.forEach(ec=>{const r=ec.closest('.entry-row');if(r)seedRows.add(r);});
  document.querySelectorAll('.entry-row').forEach(r=>r.classList.toggle('muted',!seedRows.has(r)));

  // Clear old highlights
  document.querySelectorAll('.ecell.match-cell').forEach(ec=>ec.classList.remove('match-cell'));

  const byPlane=new Map();
  let total=0;const matchedKws=new Set();let delay=0;

  if(allKws.size>=1){
    document.querySelectorAll('.entry-row').forEach(row=>{
      if(seedRows.has(row))return;
      const rpi=parseInt(row.dataset.planeIdx);
      const allowedCats=allowedCatsByPlane.get(rpi);
      if(!allowedCats||!allowedCats.has(row.dataset.catVal))return;

      // Compare per selected cell column only
      const sharedByCi={}; // ci -> Set(keywords)
      let sharedCount=0;
      seeds.forEach(s=>{
        if(s.pi!==rpi)return;
        if(!allowedCats.has(row.dataset.catVal))return;
        const cellText=row.querySelector(`.ecell[data-ci="${s.ci}"] .ecell-text`)?.textContent||'';
        const rKws=new Set(extractKW(cellText));
        s.kws.forEach(k=>{
          if(rKws.has(k)){
            if(!sharedByCi[s.ci])sharedByCi[s.ci]=new Set();
            if(!sharedByCi[s.ci].has(k)){ sharedByCi[s.ci].add(k); sharedCount++; }
            matchedKws.add(k);
          }
        });
      });
      if(sharedCount<MIN_SHARED)return;

      // It's a match
      row.classList.remove('muted');
      Object.keys(sharedByCi).forEach(ci=>{
        const ec=row.querySelector(`.ecell[data-ci="${ci}"]`);
        if(ec){ec.classList.add('match-cell');ec.style.setProperty('--gd',`${Math.min(delay,1.2)}s`);}
      });
      delay+=0.08; total++;

      if(!byPlane.has(rpi))byPlane.set(rpi,[]);
      const rCols=planeEls[rpi]._cols||[];
      const fv={},ftags={};
      const rowTags=JSON.parse(row.dataset.tags||'{}');
      rCols.forEach(col=>{
        fv[col.ci]=row.querySelector(`.ecell[data-ci="${col.ci}"] .ecell-text`)?.textContent||'';
        if(rowTags[col.ci])ftags[col.ci]=rowTags[col.ci];
      });
      byPlane.get(rpi).push({id:row.dataset.entryId,cat:row.dataset.catVal,sub:row.dataset.subVal,fv,ftags,cols:rCols,sharedByCi});
    });
  }

  buildPanel(byPlane,matchedKws,total,allKws);
}

function buildPanel(byPlane,matchedKws,total,allKws){
  // If the user selected cell(s) but all are empty → show the simple message and nothing else
  const hasSelection = activeSeedCells.size > 0;
  const allSelectedEmpty = hasSelection && [...activeSeedCells].every(ec => {
    const t = ec.querySelector('.ecell-text')?.textContent || '';
    return t.trim()==='';
  });
  if(allSelectedEmpty){
    panelSub.textContent = ''; // no subtitle
    panelBody.innerHTML = emptyMsg('The cell is empty'); // same style as "No matches found"
    hlToggle.classList.remove('visible','active');
    const wasOpen=clusterPanel.classList.contains('open');
    clusterPanel.classList.add('open');syncPanelBtn();
    if(!wasOpen)fitScene();
    return;
  }

  // Normal path
  panelSub.textContent = total
    ? `${total} match${total===1?'':'es'} · shared: ${[...matchedKws].slice(0,4).join(', ')}`
    : 'No related entries found';
  panelBody.innerHTML='';

  // ── Seed card(s) — show ONLY the actually selected cells; skip empties ──
  const seedsByPlane=new Map();
  activeSeedCells.forEach(ec=>{
    const pi=parseInt(ec.dataset.planeIdx);
    if(!seedsByPlane.has(pi))seedsByPlane.set(pi,[]);
    seedsByPlane.get(pi).push(ec);
  });
  seedsByPlane.forEach((cells,pi)=>{
    const sc=PLANE_COLORS[pi];
    const card=document.createElement('div');card.id='seed-card';
    [['--sc-bg',sc.bg],['--sc-border',sc.border],['--sc-shadow',sc.shadow],['--sc-text',sc.text],['--sc-label',sc.label]].forEach(([k,v])=>card.style.setProperty(k,v));

    const row=cells[0].closest('.entry-row');
    const cat=row?.dataset.catVal||'',sub=row?.dataset.subVal||'';
    const seedCols=planeEls[pi]._cols||[];
    const rowTags=JSON.parse(row?.dataset.tags||'{}');

    // Selected column indexes for THIS plane; keep in sheet column order
    const selCIs=new Set(cells.map(ec=>parseInt(ec.dataset.ci)));
    const colOrder=new Map(seedCols.map((c,idx)=>[c.ci,idx]));
    const orderedSel=[...selCIs].sort((a,b)=>(colOrder.get(a)??0)-(colOrder.get(b)??0));

    let sFields='';
    orderedSel.forEach(ci=>{
      const col=seedCols.find(c=>c.ci===ci); if(!col) return;
      const val=row?.querySelector(`.ecell[data-ci="${ci}"] .ecell-text`)?.textContent||'';
      if(!val.trim()) return; // skip empty selected cells — message already handled above if all were empty
      const tag=rowTags && rowTags[ci] ? rowTags[ci] : '';
      const kwSet=new Set(extractKW(val));
      let inner=`<span class="sc-flabel">${escH(col.label)}</span>${highlightKW(val,kwSet)}`;
      if(tag){ inner+=`<span class="cell-tag">${escH(tag)}</span>`; }
      sFields+=`<div class="sc-field srch">${inner}</div>`;
    });

    // Only append the seed card if there is at least one non-empty selected field for this plane
    if(sFields){
      card.innerHTML=`<div id="sc-head">
          <div id="sc-dot"></div>
          <div id="sc-label">${escH(PLANES[pi].title)}</div>
          <span class="sc-badge">Selected</span>
          <div id="sc-cat">${escH(cat)}${sub?' · '+escH(sub):''}</div>
        </div>
        <div id="sc-body">${sFields}</div>`;
      panelBody.appendChild(card);
    }
  });

  // Matches
  if(!byPlane.size){
    panelBody.insertAdjacentHTML('beforeend',emptyMsg('No matches found'));
    hlToggle.classList.remove('visible','active');
  } else {
    hlToggle.classList.add('visible','active');
    const ic=document.createElement('span');ic.className='hl-icon';
    hlToggle.innerHTML='';hlToggle.appendChild(ic);hlToggle.appendChild(document.createTextNode(' Highlight keywords'));

    let globalDelay=0;
    [...byPlane.keys()].sort((a,b)=>a-b).forEach(pi=>{
      const entries=byPlane.get(pi);const c=PLANE_COLORS[pi];

      entries.forEach(e=>{
        const card=document.createElement('div');
        card.className='pe';
        card.style.setProperty('--ed',`${globalDelay}ms`);
        [['--g-bg',c.bg],['--g-border',c.border],['--g-shadow',c.shadow],['--g-heading',c.heading],['--g-text',c.text],['--g-label',c.label],['--g-rule',c.rule]].forEach(([k,v])=>card.style.setProperty(k,v));
        globalDelay+=60;

        const head=document.createElement('div');
        head.className='pe-head';
        head.innerHTML=`<div class="pe-dot"></div><div class="pe-dim">${escH(PLANES[pi].title)}</div><div class="pe-cat-line"> · ${escH(e.cat)}${e.sub?' · '+escH(e.sub):''}</div>`;

        const body=document.createElement('div');
        body.className='pe-body';
        e.cols.forEach(col=>{
          const val=e.fv[col.ci]||''; if(!val) return;
          const field=document.createElement('div');
          field.className='pe-field'+(col.searchable?' srch':'');
          const tag=(e.ftags&&e.ftags[col.ci])?e.ftags[col.ci]:'';
          const matchedSet=e.sharedByCi && e.sharedByCi[col.ci] ? e.sharedByCi[col.ci] : null;
          let html=`<span class="pe-flabel">${escH(col.label)}</span>`;
          html+=col.searchable && matchedSet ? highlightKW(val, matchedSet) : escH(val);
          if(tag){ html+=`<span class="cell-tag">${escH(tag)}</span>`; }
          field.innerHTML=html;
          body.appendChild(field);
        });

        const gotoBtn=document.createElement('button');gotoBtn.className='pe-goto';gotoBtn.textContent='Go to cell';
        body.appendChild(gotoBtn);

        card.appendChild(head);
        card.appendChild(body);

        card.addEventListener('click',ev=>{
          if(ev.target===gotoBtn)return;
          const isExp=card.classList.contains('expanded');
          panelBody.querySelectorAll('.pe.expanded').forEach(p=>{if(p!==card)p.classList.remove('expanded');});
          card.classList.toggle('expanded',!isExp);
        });

        gotoBtn.addEventListener('click',ev=>{
          ev.stopPropagation();
          const targetRow=document.querySelector(`.entry-row[data-plane-idx="${pi}"][data-entry-id="${e.id}"]`);
          if(!targetRow)return;
          if(order[0]!==pi)bringToTop(pi);
          setTimeout(()=>{
            const cols=planeEls[pi]._cols||[];
            const firstS=cols.find(c=>c.searchable);if(!firstS)return;
            const ec=targetRow.querySelector(`.ecell[data-ci="${firstS.ci}"]`);
            if(ec)toggleCell(ec);
          },order[0]===pi?0:700);
        });

        panelBody.appendChild(card);
      });
    });
  }

  const wasOpen=clusterPanel.classList.contains('open');
  clusterPanel.classList.add('open');syncPanelBtn();
  if(!wasOpen)fitScene();
}

hlToggle.addEventListener('click',()=>{
  hlOn=!hlOn;hlToggle.classList.toggle('active',hlOn);
  const ic=document.createElement('span');ic.className='hl-icon';
  hlToggle.innerHTML='';hlToggle.appendChild(ic);
  hlToggle.appendChild(document.createTextNode(hlOn?' Highlight keywords':' Show keywords'));
  panelBody.querySelectorAll('mark.kw').forEach(m=>{m.style.borderBottomColor=hlOn?'':'transparent';m.style.fontWeight=hlOn?'':'inherit';});
});

function closePanelCompletely(){
  clearAll();hlToggle.classList.remove('visible','active');
  clusterPanel.classList.remove('open');panelBody.innerHTML='';syncPanelBtn();setTimeout(fitScene,540);
}
function syncPanelBtn(){const o=clusterPanel.classList.contains('open');panelOpenBtn.classList.toggle('active',o);panelOpenBtn.setAttribute('aria-pressed',o);}

panelClose.addEventListener('click',closePanelCompletely);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanelCompletely();});
panelOpenBtn.addEventListener('click',()=>{
  if(clusterPanel.classList.contains('open')){closePanelCompletely();return;}
  showPanelEmpty();clusterPanel.classList.add('open');syncPanelBtn();fitScene();
});

stackEl.addEventListener('click',e=>{
  const isInteractive=e.target.closest('.ecell,.resize-handle,.hdr-cell');
  if(!isInteractive&&activeSeedCells.size>0){
    clearAll();showPanelEmpty();
  }
});

async function loadData(){
  try{
    setStatus('Fetching spreadsheet…');
    const res=await fetch(XLSX_URL,{cache:'no-store'});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    setStatus('Parsing…');
    const wb=XLSX.read(await res.arrayBuffer(),{type:'array'});
    const findTab=t=>{const tn=normStr(t);return wb.SheetNames.find(n=>normStr(n)===tn)||wb.SheetNames.find(n=>normStr(n).includes(tn)||tn.includes(normStr(n)));};
    let total=0;
    for(let pi=0;pi<PLANES.length;pi++){
      const tn=findTab(PLANES[pi].tab);
      if(!tn){document.getElementById(`body-${pi}`).innerHTML=`<div class="no-data" style="color:#c0392b">Tab "${PLANES[pi].tab}" not found</div>`;continue;}
      const parsed=parseTab(wb.Sheets[tn]);
      fillPlane(pi,parsed);
      total+=parsed.cats.reduce((s,c)=>s+c.subs.reduce((ss,sb)=>ss+sb.entries.length,0),0);
    }
    setStatus(`${total} entr${total!==1?'ies':'y'} loaded`);
    setTimeout(()=>{statusEl.style.opacity='0';},3000);
  }catch(err){console.error(err);setStatus(`Load failed: ${err.message}`,true);}
}

const dotEls=PLANES.map((p,i)=>{
  const d=document.createElement('div');d.className='dot';d.style.background=PLANE_COLORS[i].dot;
  dotWindow.appendChild(d);
  d.addEventListener('click',e=>{e.stopPropagation();if(!animating)bringToTop(i);});
  d.addEventListener('mouseenter',()=>{hintLabel.textContent=p.title.toUpperCase();hintLabel.style.color='rgba(0,0,0,.55)';});
  d.addEventListener('mouseleave',refreshHint);
  return d;
});
arrLeft.addEventListener('click',()=>{if(!animating)bringToTop((order[0]+N-1)%N);});
arrRight.addEventListener('click',()=>{if(!animating)bringToTop((order[0]+1)%N);});
function renderCarousel(){
  dotEls.forEach((d,i)=>{
    const dist=(i-order[0]+N)%N,signed=dist>N/2?dist-N:dist,half=Math.floor(VISIBLE/2);
    if(Math.abs(signed)<=half){d.style.display='block';d.style.opacity=signed===0?'1':String(Math.max(0,.35-Math.abs(signed)*.05));d.style.transform=`scale(${signed===0?1.55:Math.max(.1,1-Math.abs(signed)*.22)})`;d.classList.toggle('active',signed===0);}
    else d.style.display='none';
  });
}
const getZ=sp=>(N-1-sp)*GAP;
function refreshHint(){hintLabel.textContent=PLANES[order[0]].title.toUpperCase();hintLabel.style.color='rgba(0,0,0,.3)';}
function syncUI(){planeEls.forEach((el,i)=>{el.dataset.top=order[0]===i?'true':'false';});renderCarousel();refreshHint();}
function applyPositions(animated=true){
  order.forEach((pi,sp)=>{
    const el=planeEls[pi];
    el.style.transition=animated?'transform .65s cubic-bezier(.4,0,.2,1),opacity .5s ease':'none';
    el.style.transform=`translateZ(${getZ(sp)}px)`;el.style.zIndex=N-sp;el.style.opacity=sp===0?'1':(0.82-sp*.08).toFixed(2);
  });syncUI();
}
function cycleOnce(done){
  animating=true;const ti=order[0],el=planeEls[ti];
  el.style.transition='transform .4s cubic-bezier(.4,0,.2,1),opacity .3s ease';el.style.transform=`translateZ(${getZ(0)+400}px)`;el.style.opacity='0';
  setTimeout(()=>{order.push(order.shift());el.style.transition='none';el.style.transform=`translateZ(${getZ(N-1)-100}px)`;el.style.opacity='0';setTimeout(()=>{applyPositions(true);animating=false;if(done)done();},40);},380);
}
function bringToTop(t){if(order[0]===t||animating)return;function step(){if(order[0]!==t)cycleOnce(step);}step();}
function applyView(){const v=is3D?VIEW_3D:VIEW_FLAT;stackEl.style.transform=`rotateX(${v.rotX}deg) rotateY(${v.rotY}deg)`;toggleBtn.classList.toggle('active',is3D);toggleBtn.setAttribute('aria-pressed',is3D);}
toggleBtn.addEventListener('click',()=>{is3D=!is3D;applyView();});

let rsz=false,rsX,rsY,rsW,rsH;
document.addEventListener('mousedown',e=>{
  const h=e.target.closest('.resize-handle');if(!h)return;e.preventDefault();e.stopPropagation();
  const pl=h.closest('.plane');rsz=true;rsX=e.clientX;rsY=e.clientY;rsW=pl.offsetWidth;rsH=pl.offsetHeight;
  document.body.style.cursor='nwse-resize';document.body.style.userSelect='none';
  document.querySelectorAll('.plane').forEach(p=>p.style.transition='opacity .5s ease');
});
document.addEventListener('mousemove',e=>{
  if(!rsz)return;
  const maxW=Math.max(200,SCENE_W-PAD_X*2),maxH=Math.max(120,SCENE_H-PAD_Y*2);
  let w=Math.max(320,Math.min(maxW,rsW+e.clientX-rsX)),h=Math.max(200,Math.min(maxH,rsH+e.clientY-rsY));
  PLANE_W=w;PLANE_H=h;PLANE_L=Math.round((SCENE_W-w)/2);
  document.querySelectorAll('.plane').forEach(pl=>{pl.style.width=w+'px';pl.style.height=h+'px';pl.style.left=PLANE_L+'px';});
});
document.addEventListener('mouseup',()=>{
  if(!rsz)return;rsz=false;document.body.style.cursor='';document.body.style.userSelect='';
  document.querySelectorAll('.plane').forEach(p=>{p.style.transition='transform .7s cubic-bezier(.4,0,.2,1),opacity .5s ease';});
});

applyPositions(false);applyView();renderCarousel();refreshHint();fitScene();loadData();
</script>
</body>
</html>
