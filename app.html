<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimensional Framework</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    /* ── App shell ──────────────────────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .app-grid {
      display: grid;
      grid-template-rows: var(--topbar-height) 1fr auto;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "topbar  topbar"
        "main    sidebar"
        "bottom  sidebar";
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Topbar ─────────────────────────────────────────────── */
    #topbar {
      grid-area: topbar;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      height: var(--topbar-height);
      background: var(--color-bg-surface);
      border-bottom: 1px solid var(--color-border-subtle);
      box-shadow: 0 1px 0 rgba(0,0,0,0.04);
      overflow: hidden;
      z-index: 20;
    }

    #topbar-global {
      display: flex;
      align-items: center;
      padding: 0 12px;
      flex-shrink: 0;
      border-right: 1px solid var(--color-border-subtle);
    }

    #topbar-sheet {
      display: flex;
      align-items: center;
      padding: 0 8px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    /* ── Main area ──────────────────────────────────────────── */
    .main {
      grid-area: main;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-page);
      font-size: var(--font-size-sm);
      color: var(--color-text-muted);
      letter-spacing: -0.01em;
      z-index: 10;
    }

    /* ── Grid area (spreadsheet) ────────────────────────────── */
    .grid-area {
      display: grid;
      grid-template-rows: auto 1fr;
      grid-template-columns: auto 1fr;
      grid-template-areas:
        "corner  header"
        "cats    data";
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .corner {
      grid-area: corner;
      background: var(--color-bg-surface);
      border-right: 1px solid var(--color-border-subtle);
      border-bottom: 1px solid var(--color-border-subtle);
      z-index: 2;
    }

    .header-scroll {
      grid-area: header;
      overflow: hidden;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .cat-scroll {
      grid-area: cats;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: 1px solid var(--color-border-subtle);
    }
    .cat-scroll::-webkit-scrollbar { display: none; }

    .data-scroll {
      grid-area: data;
      overflow: auto;
    }
    .data-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    .data-scroll::-webkit-scrollbar-track {
      background: var(--color-bg-page);
    }
    .data-scroll::-webkit-scrollbar-thumb {
      background: var(--color-border-default);
      border-radius: var(--radius-full);
    }
    .data-scroll::-webkit-scrollbar-thumb:hover {
      background: var(--color-text-muted);
    }

    /* ── Sheet tables ───────────────────────────────────────── */
    .sheet {
      border-collapse: collapse;
      font-size: var(--font-size-sm);
      font-family: var(--font-family);
    }

    /* ── Bottom bar (tab strip) ─────────────────────────────── */
    .bottombar {
      grid-area: bottom;
      height: 36px;
      display: flex;
      align-items: stretch;
      background: var(--color-bg-surface);
      border-top: 1px solid var(--color-border-subtle);
      overflow: hidden;
      z-index: 10;
    }

    .tab-bar {
      display: flex;
      align-items: stretch;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 4px;
      gap: 2px;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      overflow: hidden;
      position: relative;
      z-index: 15;
    }

    .drag-handle {
      width: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-surface);
      border-left: 1px solid var(--color-border-subtle);
      cursor: col-resize;
      flex-shrink: 0;
      gap: 4px;
      user-select: none;
    }

    .handle-arrows {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .handle-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: none;
      border: none;
      color: var(--color-text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), background var(--transition-fast);
      padding: 0;
    }
    .handle-arrow:hover {
      color: var(--raw-black);
      background: var(--color-bg-hover);
    }
    .handle-arrow svg {
      width: 8px;
      height: 12px;
    }

    .sidebar-box {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Fixed drag handle overlay ──────────────────────────── */
    .drag-handle-fixed {
      position: fixed;
      top: var(--topbar-height);
      right: 0;
      bottom: 36px; /* bottombar height */
      width: 20px;
      z-index: 30;
      border-left: 1px solid var(--color-border-subtle);
      background: var(--color-bg-surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="app-grid">

    <div class="topbar" id="topbar">
      <div class="topbar-global" id="topbar-global"></div>
      <div class="topbar-sheet" id="topbar-sheet"></div>
    </div>

    <div class="main">
      <div class="loading-overlay" id="loading-overlay">Loading…</div>
      <div class="grid-area" id="grid-area">
        <div class="corner" id="corner"></div>
        <div class="header-scroll" id="header-scroll">
          <table class="sheet header-table" id="header-table">
            <thead><tr id="header-row"></tr></thead>
          </table>
        </div>
        <div class="cat-scroll" id="cat-scroll">
          <table class="sheet cat-table" id="cat-table">
            <tbody id="cat-body"></tbody>
          </table>
        </div>
        <div class="data-scroll" id="data-scroll">
          <table class="sheet data-table" id="data-table">
            <tbody id="data-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="bottombar">
      <div class="tab-bar" id="tab-bar"></div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="drag-handle" id="drag-handle">
        <div class="handle-arrows">
          <button class="handle-arrow" id="handle-arrow-open" aria-label="Open sidebar">
            <svg viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="7,2 2,8 7,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="handle-arrow" id="handle-arrow-close" aria-label="Close sidebar">
            <svg viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <polyline points="3,2 8,8 3,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="sidebar-box" id="sidebar-box"></div>
    </div>

    <!-- Fixed drag handle overlay -->
    <div class="drag-handle drag-handle-fixed" id="drag-handle-fixed">
      <div class="handle-arrows">
        <button class="handle-arrow" id="handle-arrow-open-fixed" aria-label="Open sidebar">
          <svg viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="7,2 2,8 7,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="handle-arrow" id="handle-arrow-close-fixed" aria-label="Close sidebar">
          <svg viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polyline points="3,2 8,8 3,14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="script.js"></script>
  <script src="utils-keywords.js"></script>
  <script src="utils-sidepanel.js"></script>
  <script src="utils-find-matches.js"></script>
  <script src="utils-clusters.js?v=2"></script>
  <script src="sidepanel-shell.js"></script>
  <script src="utils-concept-map.js?v=2"></script>
  <script src="embedding-bridge.js"></script>
  <script type="module" src="utils-embedding.js"></script>
  <script>
    // ── Start the embedding bridge host ───────────────────────────────────
    EmbeddingBridge.host();

    // ── Handle #goto= deep links from tool pages ──────────────────────────
    (function () {
      var hash = window.location.hash;
      if (!hash.startsWith('#goto=')) return;
      var parts = hash.slice(6).split(':');
      var tabIdx = +parts[0], rowIdx = +parts[1], colIdx = +(parts[2] || 0);
      window.history.replaceState(null, '', window.location.pathname);
      setTimeout(function () {
        if (typeof panelGoTo === 'function') {
          panelGoTo(
            { tabIdx: tabIdx, rowIdx: rowIdx, row: null, shared: new Set() },
            colIdx
          );
        }
      }, 400);
    })();
  </script>

</body>
</html>
