<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clusters</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-topbar:           #ffffff;
      --color-topbar-global: rgba(0,0,0,.35);
      --color-topbar-sheet:  #111111;
      --border-strong:       #e8e8e8;
      --bg-sidebar:          #f7f7f8;
      --sidebar-box-border:  rgba(0,0,0,.10);
      --scrollbar-thumb:     rgba(0,0,0,.18);
      --scrollbar-track:     #f0f0f0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
    }

    /* ── Top bar ── */
    #cl-topbar {
      flex-shrink: 0;
      background: var(--bg-topbar);
      border-bottom: 1px solid var(--border-strong);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      height: 48px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      z-index: 10;
    }
    #cl-back {
      display: flex; align-items: center; gap: 5px;
      border: none; background: transparent; cursor: pointer;
      font-size: 12px; font-weight: 600; letter-spacing: .04em;
      color: rgba(0,0,0,.4); padding: 4px 8px; border-radius: 6px;
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    #cl-back:hover { background: rgba(0,0,0,.06); color: rgba(0,0,0,.7); }
    #cl-back svg { flex-shrink: 0; }
    #cl-title {
      font-size: 13px; font-weight: 700; color: var(--color-topbar-sheet);
      letter-spacing: .02em; flex: 1;
    }
    #cl-connection-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
      transition: background .3s, color .3s;
    }
    #cl-connection-badge.connected    { background: rgba(40,180,80,.12);  color: rgba(20,140,50,.9); }
    #cl-connection-badge.waiting      { background: rgba(0,0,0,.06);       color: rgba(0,0,0,.4); }
    #cl-connection-badge.disconnected { background: rgba(200,60,60,.10);   color: rgba(160,30,30,.9); }

    /* ── Main pane — the cluster tool fills this ── */
    #cl-pane {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── No-host overlay ── */
    #cl-no-host {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(247,247,248,.92);
      backdrop-filter: blur(4px);
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 32px;
    }
    #cl-no-host.visible { display: flex; }
    #cl-no-host h2 {
      font-size: 14px; font-weight: 700; color: rgba(0,0,0,.6); letter-spacing: .02em;
    }
    #cl-no-host p {
      font-size: 12px; color: rgba(0,0,0,.4); line-height: 1.5; max-width: 280px;
    }
    #cl-no-host a {
      font-size: 12px; font-weight: 600; color: #5b7fa6; text-decoration: none;
    }
    #cl-no-host a:hover { text-decoration: underline; }

    /* ── Global slider styles (duplicated from style.css for standalone use) ── */
    .pp-group-label {
      font-size: 7px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(0,0,0,.28); line-height: 1; margin-bottom: 1px;
    }
    .pp-range-row { display: flex; align-items: center; gap: 3px; }
    .pp-range-label {
      font-size: 8px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(0,0,0,.35); flex-shrink: 0; width: 18px;
    }
    .pp-range-val {
      font-size: 9px; font-weight: 700; color: rgba(0,0,0,.55);
      flex-shrink: 0; width: 22px; text-align: right; font-variant-numeric: tabular-nums;
    }
    .pp-range {
      -webkit-appearance: none; appearance: none;
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; margin: 0; padding: 0; z-index: 2;
    }
    .pp-range-wrap {
      position: relative; flex: 1; min-width: 0; height: 18px;
    }
    .pp-range-track {
      position: absolute; top: 50%; left: 0; right: 0; height: 3px;
      transform: translateY(-50%); border-radius: 2px;
      background: rgba(0,0,0,.12); overflow: hidden; pointer-events: none;
      transition: background .18s ease;
    }
    .pp-range-wrap:hover .pp-range-track { background: rgba(0,0,0,.18); }
    .pp-range-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      border-radius: 2px; background: var(--color-topbar-sheet, #111);
      opacity: .30; pointer-events: none;
      transition: width .22s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .pp-range-thumb {
      position: absolute; top: 50%; left: 0%; width: 11px; height: 11px;
      border-radius: 50%; background: var(--color-topbar-sheet, #111);
      box-shadow: 0 1px 3px rgba(0,0,0,.22); transform: translate(-50%, -50%);
      pointer-events: none;
      transition: left .22s cubic-bezier(0.34, 1.4, 0.64, 1), transform .12s ease, box-shadow .12s ease;
    }
    .pp-range-wrap:hover .pp-range-thumb { transform: translate(-50%, -50%) scale(1.28); box-shadow: 0 2px 6px rgba(0,0,0,.28); }
    .pp-range-wrap.pp-range-dragging .pp-range-thumb { transition: transform .12s ease, box-shadow .12s ease; transform: translate(-50%, -50%) scale(1.28); }
    .pp-range-wrap.pp-range-dragging .pp-range-fill { transition: none; }
    .pp-range-wrap--accent .pp-range-thumb { background: #7c5cbf; box-shadow: 0 1px 4px rgba(124,92,191,.35); }
    .pp-range-wrap--accent .pp-range-fill  { background: #7c5cbf; }
    .pp-range-wrap--muted  .pp-range-thumb { background: rgba(0,0,0,.38); box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    .pp-range-wrap--muted  .pp-range-fill  { background: rgba(0,0,0,.38); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="cl-topbar">
    <button id="cl-back" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </button>
    <div id="cl-title">Cluster Map</div>
    <div id="cl-connection-badge" class="waiting">Connecting…</div>
  </div>

  <!-- Cluster tool pane -->
  <div id="cl-pane" style="position:relative;">
    <div id="cl-no-host">
      <h2>Main tab not detected</h2>
      <p>Open <a href="index.html">the main spreadsheet page</a> first, then come back here. The cluster tool receives its data over a live connection to that tab.</p>
    </div>
  </div>

  <!-- Scripts: utils first, then bridge, then the cluster tool -->
  <script src="keyword-utils.js"></script>
  <script src="sidepanel-utils.js"></script>
  <script src="embedding-bridge.js"></script>
  <script src="sidepanel-clusters.js"></script>

  <script>
    var _bridgeRows = null;

    function buildRowIndex() { return _bridgeRows || []; }

    function panelGoTo(match, colIdx) {
      window.location.href = 'index.html#goto=' + match.tabIdx + ':' + match.rowIdx + ':' + (colIdx || 0);
    }

    if (typeof parseCitation === 'undefined') {
      window.parseCitation = function(text) { return { body: String(text || ''), citation: null }; };
    }

    window.EmbeddingUtils = { isReady: function() { return !!_bridgeRows; } };

    var badge  = document.getElementById('cl-connection-badge');
    var noHost = document.getElementById('cl-no-host');
    function setBadge(state, text) { badge.className = state; badge.textContent = text; }

    var paneEl = document.getElementById('cl-pane');
    var clusterTool = initClustersTool(paneEl, null);

    EmbeddingBridge.guest(function(rows) {
      noHost.classList.remove('visible');
      setBadge('connected', rows.length + ' entries live');
      _bridgeRows = rows;
      clusterTool.reset();
      // Rows already have .vec attached — tryRender uses them directly
      window.dispatchEvent(new CustomEvent('embedder-ready'));
      setTimeout(function() {
        window.dispatchEvent(new CustomEvent('embedding-complete', { detail: { total: rows.length } }));
      }, 100);
    });

    window.addEventListener('bridge-no-host', function() {
      setBadge('disconnected', 'No data — open main page first');
      noHost.classList.add('visible');
    });
  </script>
</body>
</html>
