<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-topbar:           #ffffff;
      --color-topbar-global: rgba(0,0,0,.35);
      --color-topbar-sheet:  #111111;
      --border-strong:       #e8e8e8;
      --bg-sidebar:          #f7f7f8;
      --sidebar-box-border:  rgba(0,0,0,.10);
      --scrollbar-thumb:     rgba(0,0,0,.18);
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      font-size: 14px;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg-sidebar);
    }

    /* ── Top bar ── */
    #cm-topbar {
      flex-shrink: 0;
      background: var(--bg-topbar);
      border-bottom: 1px solid var(--border-strong);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 18px;
      height: 48px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      z-index: 10;
    }
    #cm-back {
      display: flex; align-items: center; gap: 5px;
      border: none; background: transparent; cursor: pointer;
      font-size: 12px; font-weight: 600; letter-spacing: .04em;
      color: rgba(0,0,0,.4); padding: 4px 8px; border-radius: 6px;
      transition: background .15s, color .15s; flex-shrink: 0;
    }
    #cm-back:hover { background: rgba(0,0,0,.06); color: rgba(0,0,0,.7); }
    #cm-back svg { flex-shrink: 0; }
    #cm-title {
      font-size: 13px; font-weight: 700; color: var(--color-topbar-sheet);
      letter-spacing: .02em; flex: 1;
    }
    #cm-connection-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 20px; flex-shrink: 0;
      transition: background .3s, color .3s;
    }
    #cm-connection-badge.connected    { background: rgba(40,180,80,.12);  color: rgba(20,140,50,.9); }
    #cm-connection-badge.waiting      { background: rgba(0,0,0,.06);       color: rgba(0,0,0,.4); }
    #cm-connection-badge.disconnected { background: rgba(200,60,60,.10);   color: rgba(160,30,30,.9); }

    /* ── Main pane ── */
    #cm-pane {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── No-host overlay ── */
    #cm-no-host {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(247,247,248,.92);
      backdrop-filter: blur(4px);
      z-index: 50;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 32px;
    }
    #cm-no-host.visible { display: flex; }
    #cm-no-host h2 { font-size: 14px; font-weight: 700; color: rgba(0,0,0,.6); letter-spacing: .02em; }
    #cm-no-host p  { font-size: 12px; color: rgba(0,0,0,.4); line-height: 1.5; max-width: 280px; }
    #cm-no-host a  { font-size: 12px; font-weight: 600; color: #5b7fa6; text-decoration: none; }
    #cm-no-host a:hover { text-decoration: underline; }

    /* ── Global slider styles ── */
    .pp-group-label {
      font-size: 7px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(0,0,0,.28); line-height: 1; margin-bottom: 1px;
    }
    .pp-range-row { display: flex; align-items: center; gap: 3px; }
    .pp-range-label {
      font-size: 8px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(0,0,0,.35); flex-shrink: 0; width: 18px;
    }
    .pp-range-val {
      font-size: 9px; font-weight: 700; color: rgba(0,0,0,.55);
      flex-shrink: 0; width: 22px; text-align: right; font-variant-numeric: tabular-nums;
    }
    .pp-range {
      -webkit-appearance: none; appearance: none;
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; margin: 0; padding: 0; z-index: 2;
    }
    .pp-range-wrap { position: relative; flex: 1; min-width: 0; height: 18px; }
    .pp-range-track {
      position: absolute; top: 50%; left: 0; right: 0; height: 3px;
      transform: translateY(-50%); border-radius: 2px;
      background: rgba(0,0,0,.12); overflow: hidden; pointer-events: none;
      transition: background .18s ease;
    }
    .pp-range-wrap:hover .pp-range-track { background: rgba(0,0,0,.18); }
    .pp-range-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
      border-radius: 2px; background: var(--color-topbar-sheet, #111);
      opacity: .30; pointer-events: none;
      transition: width .22s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .pp-range-thumb {
      position: absolute; top: 50%; left: 0%; width: 11px; height: 11px;
      border-radius: 50%; background: var(--color-topbar-sheet, #111);
      box-shadow: 0 1px 3px rgba(0,0,0,.22); transform: translate(-50%, -50%);
      pointer-events: none;
      transition: left .22s cubic-bezier(0.34, 1.4, 0.64, 1), transform .12s ease, box-shadow .12s ease;
    }
    .pp-range-wrap:hover .pp-range-thumb { transform: translate(-50%, -50%) scale(1.28); box-shadow: 0 2px 6px rgba(0,0,0,.28); }
    .pp-range-wrap.pp-range-dragging .pp-range-thumb { transition: transform .12s ease, box-shadow .12s ease; transform: translate(-50%, -50%) scale(1.28); }
    .pp-range-wrap.pp-range-dragging .pp-range-fill  { transition: none; }
    .pp-range-wrap--accent .pp-range-thumb { background: #7c5cbf; box-shadow: 0 1px 4px rgba(124,92,191,.35); }
    .pp-range-wrap--accent .pp-range-fill  { background: #7c5cbf; }
    .pp-range-wrap--muted  .pp-range-thumb { background: rgba(0,0,0,.38); box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    .pp-range-wrap--muted  .pp-range-fill  { background: rgba(0,0,0,.38); }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="cm-topbar">
    <button id="cm-back" onclick="window.location.href='index.html'">
      <svg viewBox="0 0 14 14" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 2L4 7l5 5"/>
      </svg>
      Back
    </button>
    <div id="cm-title">Concept Map</div>
    <div id="cm-connection-badge" class="waiting">Connecting…</div>
  </div>

  <!-- Concept map tool pane -->
  <div id="cm-pane" style="position:relative;">
    <div id="cm-no-host">
      <h2>Main tab not detected</h2>
      <p>Open <a href="index.html">the main spreadsheet page</a> first, then come back here. The concept map receives its data over a live connection to that tab.</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="keyword-utils.js"></script>
  <script src="sidepanel-utils.js"></script>
  <script src="embedding-bridge.js"></script>
  <script src="sidepanel-concept-map.js"></script>

  <script>
    // ── Shims so sidepanel-concept-map.js works standalone ───────────────
    var _bridgeRows = null;

    function buildRowIndex() { return _bridgeRows || []; }

    function panelGoTo(match, colIdx) {
      var url = 'index.html#goto=' + match.tabIdx + ':' + match.rowIdx + ':' + (colIdx || 0);
      window.open(url, '_blank');
    }

    if (typeof parseCitation === 'undefined') {
      window.parseCitation = function(text) { return { body: String(text || ''), citation: null }; };
    }

    // EmbeddingUtils shim — vecs come pre-attached via the bridge
    window.EmbeddingUtils = {
      isReady: function() { return !!_bridgeRows; },
      getCachedEmbedding: function(text) { return Promise.resolve(null); },
      getVectorSync: function() { return null; }
    };

    // ── UI helpers ────────────────────────────────────────────────────────
    var badge  = document.getElementById('cm-connection-badge');
    var noHost = document.getElementById('cm-no-host');

    function setBadge(state, text) { badge.className = state; badge.textContent = text; }

    // ── Init concept map tool ─────────────────────────────────────────────
    var paneEl = document.getElementById('cm-pane');
    var cmTool = initConceptMapTool(paneEl, null);

    // ── Connect bridge ────────────────────────────────────────────────────
    EmbeddingBridge.guest(function(rows) {
      noHost.classList.remove('visible');
      setBadge('connected', rows.length + ' entries live');
      _bridgeRows = rows;

      window.EmbeddingUtils.isReady = function() { return true; };

      // Provide getCachedEmbedding keyed by text lookup is impractical;
      // concept-map.js fetches embeddings by cell text. We pre-populate
      // EmbeddingUtils cache by patching getCachedEmbedding to use a
      // text→vec map built from the row data + a reverse text index.
      var textToVec = new Map();
      rows.forEach(function(r) {
        if (!r.vec) return;
        var cells = (r.row && r.row.cells) ? r.row.cells : (r.cells || []);
        var text = cells.join(' ').trim();
        if (text) textToVec.set(text, r.vec);
        // Also index individual cells
        cells.forEach(function(c) { if (c && c.trim()) textToVec.set(c.trim(), r.vec); });
      });

      window.EmbeddingUtils.getCachedEmbedding = function(text) {
        var vec = textToVec.get(text) || textToVec.get(text.trim());
        if (vec) return Promise.resolve(vec);
        // Fuzzy fallback: find closest key by prefix
        var t = text.trim().slice(0, 40);
        var found = null;
        textToVec.forEach(function(v, k) { if (!found && k.startsWith(t)) found = v; });
        return Promise.resolve(found || null);
      };

      cmTool.reset();
      window.dispatchEvent(new CustomEvent('embedder-ready'));
      setTimeout(function() {
        window.dispatchEvent(new CustomEvent('embedding-complete', { detail: { total: rows.length } }));
      }, 100);
    });

    window.addEventListener('bridge-no-host', function() {
      if (badge.className === 'waiting') {
        setBadge('disconnected', 'Main tab not open');
        noHost.classList.add('visible');
      }
    });

    window.addEventListener('embedding-progress', function(ev) {
      if (badge.className !== 'connected') {
        setBadge('waiting', 'Loading… ' + (ev.detail && ev.detail.pct ? ev.detail.pct + '%' : ''));
      }
    });
  </script>
</body>
</html>
